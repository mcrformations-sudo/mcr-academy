<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — MCR Academy</title>
<style>
  :root{--gold:#d6a338;--gold-2:#b9842a;--line:#262c34;--ink:#e8edf2;--muted:#9aa6b2;--bad:#ff8c82;--ok:#5ee9a0}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    font-family:system-ui,Segoe UI,Roboto,sans-serif;color:var(--ink);
    background:radial-gradient(900px 600px at 50% -10%,#1a2230,#0b0e13)}
  .box{width:min(400px,94vw);background:#12161c;border:1px solid var(--line);border-radius:20px;padding:34px 30px;box-shadow:0 30px 80px -20px #000}
  .crest{width:64px;height:64px;border-radius:50%;margin:0 auto 12px;background:linear-gradient(135deg,#1a1407,#0d0d0d);display:grid;place-items:center;border:2px solid var(--gold);font-size:30px}
  .sub{text-align:center;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:800}
  h1{text-align:center;font-size:21px;margin:10px 0 4px}
  .lead{text-align:center;color:var(--muted);font-size:13px;margin:0 0 20px}
  label{display:block;font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);margin:12px 0 5px}
  input{width:100%;background:#0f141a;border:1px solid var(--line);border-radius:11px;padding:12px 14px;color:var(--ink);font-size:14.5px;font-family:inherit}
  input:focus{outline:none;border-color:var(--gold)}
  .btn{width:100%;margin-top:18px;border:0;border-radius:12px;padding:13px;font-weight:800;font-size:15px;cursor:pointer;background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#1a1407;font-family:inherit}
  .btn:disabled{opacity:.6}
  .switch{text-align:center;margin-top:16px;font-size:13px;color:var(--muted)}
  .switch a{color:var(--gold);font-weight:700;cursor:pointer;text-decoration:none}
  .msg{min-height:18px;text-align:center;font-size:13px;margin-top:10px}
  .msg.err{color:var(--bad)} .msg.ok{color:var(--ok)}
  .hint{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.45}
  .consent{margin-top:14px}
  .consent .ck{display:flex;gap:9px;align-items:flex-start;font-size:11.8px;line-height:1.5;color:var(--muted);text-transform:none;letter-spacing:0;font-weight:500;cursor:pointer}
  .consent .ck input{width:auto;margin-top:2px;accent-color:var(--gold);flex:0 0 auto}
  .consent a{color:var(--gold);font-weight:700}
  .hidden{display:none!important}
</style>
</head>
<body>
  <div class="box">
    <div class="crest">🐦</div>
    <div class="sub">MCR Academy</div>
    <h1 id="title">Connexion</h1>
    <p class="lead" id="lead">Accédez à votre espace de formation.</p>

    <div id="signupFields" class="hidden">
      <label>Prénom</label><input id="prenom" autocomplete="given-name">
      <label>Nom</label><input id="nom" autocomplete="family-name">
      <label>Date de naissance</label><input id="naissance" type="date">
    </div>
    <label>Email</label><input id="email" type="email" autocomplete="email">
    <label>Mot de passe</label><input id="password" type="password" autocomplete="current-password">
    <div id="codeWrap" class="hidden">
      <label>Code d'accès</label><input id="code" placeholder="Code reçu de votre entreprise">
      <div class="hint">Code communiqué par votre employeur (stagiaire) ou par MCR Formations (RH / administrateur).</div>
    </div>
    <div id="consentWrap" class="hidden consent">
      <label class="ck"><input id="consent" type="checkbox">
        <span>J'accepte que mes données (nom, prénom, date de naissance, e-mail, progression) soient traitées par MCR Formations pour la gestion de mes formations, et j'ai pris connaissance de la <a href="politique-confidentialite.html" target="_blank">politique de confidentialité</a>.</span>
      </label>
    </div>

    <button class="btn" id="goBtn">Se connecter</button>
    <div id="msg" class="msg"></div>
    <div class="switch" id="switch">Pas encore de compte ? <a id="toggle">Créer un compte</a></div>
  </div>
