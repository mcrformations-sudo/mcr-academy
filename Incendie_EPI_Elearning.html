<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sécurité Incendie · Équipier de Première Intervention (EPI) — E-learning MCR Formations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --fs:1;
  --accent:#e11d2a;
  --accent-2:#f24430;
  --accent-3:#ff7a3d;
  --grad:linear-gradient(120deg,#b30f1c 0%,#e11d2a 50%,#ff7a3d 100%);
  --grad-soft:linear-gradient(120deg,#fdeceb 0%,#fff1ec 55%,#fff5ee 100%);
  --ink:#2a1714;
  --ink-2:#6b5650;
  --muted:#a99089;
  --line:#f0e3df;
  --line-2:#f7eeea;
  --ok:#15a05f;
  --bad:#e23b2e;
  --warn:#f59e0b;
  --r:22px;
  --r-sm:14px;
  --shadow-sm:0 2px 8px rgba(180,40,30,.07);
  --shadow:0 12px 34px -16px rgba(150,40,25,.28);
  --shadow-lg:0 30px 70px -28px rgba(150,40,25,.42);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--ink);min-height:100vh;
  background:
    radial-gradient(1100px 620px at 88% -8%,rgba(255,122,61,.12),transparent 60%),
    radial-gradient(960px 600px at 4% 4%,rgba(225,29,42,.10),transparent 58%),
    radial-gradient(700px 500px at 50% 110%,rgba(255,122,61,.07),transparent 60%),
    #fdf8f6;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.app{display:grid;grid-template-columns:312px 1fr;min-height:100vh;gap:0}

.sidebar{background:rgba(255,255,255,.82);backdrop-filter:blur(14px);border-right:1px solid var(--line);
  padding:24px 18px;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:40}
.brand{display:flex;align-items:center;gap:13px;padding:0 6px 4px}
.brand .logo{width:50px;height:auto;flex:none;filter:drop-shadow(0 6px 14px rgba(180,40,25,.22))}
.brand h1{font-size:14.5px;font-weight:800;line-height:1.15;color:var(--ink)}
.brand p{font-size:11px;color:var(--accent);margin-top:3px;font-weight:700;letter-spacing:.3px}
.ring-wrap{display:flex;align-items:center;gap:14px;background:var(--grad-soft);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px;margin:18px 6px}
.ring{position:relative;width:58px;height:58px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .lbl{position:absolute;inset:0;display:grid;place-items:center;font-size:14px;font-weight:800;color:var(--accent)}
.ring-wrap .txt .k{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:700}
.ring-wrap .txt .v{font-size:13px;font-weight:700;color:var(--ink);margin-top:2px}
.nav{margin-top:6px}
.nav .mod-h{display:flex;align-items:center;gap:10px;padding:16px 8px 6px;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.nav .mod-h .num{width:20px;height:20px;border-radius:7px;background:var(--grad);color:#fff;display:grid;place-items:center;font-size:11px;flex:none;font-weight:800}
.nav .mod-h.locked{opacity:.5}
.nav .mod-h.locked .num{background:#e0cdc8}
.nav .t{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:9px 10px;border-radius:11px;color:var(--ink-2);font-size:12.5px;font-weight:600;transition:.16s;margin-bottom:2px}
.nav .t:hover{background:#fdeeec;color:var(--ink)}
.nav .t.active{background:var(--grad);color:#fff;box-shadow:0 8px 22px -8px rgba(225,29,42,.5);font-weight:700}
.nav .t.quiz{font-weight:700;color:var(--accent)}
.nav .t.quiz.active{color:#fff}
.nav .t.locked{opacity:.42;cursor:not-allowed}
.nav .t.locked:hover{background:none;color:var(--ink-2)}
.nav .t .dot{width:18px;height:18px;border-radius:50%;border:2px solid #e7cfc9;flex:none;display:grid;place-items:center;font-size:9px;color:#fff;transition:.16s}
.nav .t.done .dot{background:var(--accent);border-color:var(--accent)}
.nav .t.active .dot{border-color:rgba(255,255,255,.6)}
.nav .t.active.done .dot{background:#fff;color:var(--accent);border-color:#fff}
.nav .t .lk{font-size:11px;margin-left:auto}
.reset{margin:16px 6px 6px;width:calc(100% - 12px);padding:10px;border-radius:11px;font-size:12px;font-weight:600;color:var(--muted);background:#faf4f2;border:1px solid var(--line)}
.reset:hover{color:var(--bad);border-color:#f6c9c4;background:#fff5f4}

.menu-btn{display:none;position:fixed;top:16px;left:16px;z-index:60;width:46px;height:46px;border-radius:13px;background:#fff;color:var(--accent);font-size:20px;align-items:center;justify-content:center;box-shadow:var(--shadow);border:1px solid var(--line)}
.scrim{display:none;position:fixed;inset:0;background:rgba(42,23,20,.45);z-index:35;backdrop-filter:blur(2px)}

.main{padding:40px 5vw;max-width:980px;margin:0 auto;width:100%}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.crumb{font-size:12px;color:var(--ink-2);font-weight:700}
.crumb b{color:var(--accent)}
.pill{font-size:11.5px;font-weight:800;padding:7px 14px;border-radius:99px;background:#fff;border:1px solid var(--line);color:var(--accent);box-shadow:var(--shadow-sm)}
.pill.q{background:var(--grad);color:#fff;border:none;box-shadow:0 0 16px rgba(225,29,42,.4)}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:40px 44px}
h2.title{font-size:29px;font-weight:800;letter-spacing:-.6px;line-height:1.14;margin-bottom:8px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 14px rgba(225,29,42,.26))}
.subtitle{color:var(--ink-2);font-size:14px;margin-bottom:24px;font-weight:600}
.narrate-bar{display:flex;align-items:center;gap:14px;margin:0 0 22px;flex-wrap:wrap}
.narrate-bar .narr{padding:11px 20px;font-size:13.5px}
.narrate-bar .narr.on{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 0 16px rgba(225,29,42,.4)}
.narr-hint{font-size:12px;color:var(--muted);font-weight:600}
.narr-sel{font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink-2);background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 10px;max-width:200px;cursor:pointer}
.narr-sel:focus{outline:none;border-color:var(--accent)}
.lesson p{font-size:15.5px;line-height:1.8;color:#4a3a35;margin:0 0 16px}
.lesson h3{font-size:17.5px;font-weight:800;margin:28px 0 11px;color:var(--ink);letter-spacing:-.2px}
.lesson ul{margin:0 0 18px;padding:0;list-style:none}
.lesson ul li{position:relative;padding:7px 0 7px 30px;font-size:15px;line-height:1.6;color:#4a3a35}
.lesson ul li::before{content:"";position:absolute;left:2px;top:13px;width:9px;height:9px;border-radius:50%;background:var(--grad)}
.lesson strong{color:var(--ink);font-weight:700}
.lesson table{width:100%;border-collapse:collapse;margin:20px 0;font-size:13px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.lesson th,.lesson td{border:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:top;line-height:1.5}
.lesson th{background:var(--grad-soft);font-weight:800;color:var(--ink);font-size:11.5px;text-transform:uppercase;letter-spacing:.3px}
.lesson td{color:#4a3a35}
.lesson tr:nth-child(even) td{background:#fdf8f6}
.lesson td strong{color:var(--accent)}
.callout{border-radius:var(--r-sm);padding:17px 20px 17px 22px;margin:22px 0;border:1px solid var(--line);background:#fffaf8;position:relative;overflow:hidden}
.callout::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px}
.callout .cot{font-size:11px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.callout p{font-size:13.5px;line-height:1.6;margin:0;color:#6b5650}
.callout.reg{background:#fdeeeb}.callout.reg::before{background:linear-gradient(180deg,#e11d2a,#ff7a3d)}.callout.reg .cot{color:#c01521}
.callout.key{background:#eefaf2}.callout.key::before{background:linear-gradient(180deg,#1cb56c,#15a05f)}.callout.key .cot{color:#0f7a4c}
.callout.danger{background:#fdeaea}.callout.danger::before{background:linear-gradient(180deg,#e23b2e,#b30f1c)}.callout.danger .cot{color:#b3261c}
.defbox{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:24px 0}
.defbox .d{background:var(--grad-soft);border:1px solid var(--line);border-radius:var(--r-sm);padding:18px}
.defbox .d h4{font-size:13px;color:var(--accent);font-weight:800;margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px}
.defbox .d p{font-size:13px;line-height:1.55;color:#6b5650;margin:0}

.nav-btns{display:flex;justify-content:space-between;align-items:center;margin-top:28px;gap:12px}
.btn{display:inline-flex;align-items:center;gap:9px;padding:13px 24px;border-radius:14px;font-size:14px;font-weight:700;transition:.18s}
.btn.primary{background:var(--grad);color:#fff;box-shadow:0 14px 28px -12px rgba(225,29,42,.6),0 0 18px rgba(255,122,61,.32)}
.btn.primary:hover{transform:translateY(-2px);box-shadow:0 18px 36px -12px rgba(225,29,42,.7),0 0 24px rgba(255,122,61,.42)}
.btn.ghost{background:#f8efec;color:var(--ink-2);border:1px solid var(--line)}
.btn.ghost:hover{color:var(--ink);background:#f2e6e2}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none}

.quiz-q{margin-bottom:24px}
.quiz-q .qn{font-size:11px;font-weight:800;color:var(--accent);letter-spacing:.6px;text-transform:uppercase}
.quiz-q .qt{font-size:16.5px;font-weight:800;margin:7px 0 14px;line-height:1.4}
.opt{display:flex;align-items:center;gap:14px;padding:14px 17px;border:1.5px solid var(--line);border-radius:13px;margin-bottom:10px;font-size:14.5px;transition:.15s;background:#fff;width:100%;text-align:left;font-weight:500}
.opt:hover{border-color:var(--accent);background:#fff6f4;transform:translateX(2px)}
.opt .mk{width:23px;height:23px;border-radius:7px;border:2px solid #e2cdc8;flex:none;display:grid;place-items:center;font-size:12px;color:#fff;transition:.15s;font-weight:800}
.opt.sel{border-color:var(--accent);background:#fdeeec}.opt.sel .mk{background:var(--accent);border-color:var(--accent)}
.opt.correct{border-color:var(--ok);background:#ecfdf3}.opt.correct .mk{background:var(--ok);border-color:var(--ok)}
.opt.wrong{border-color:var(--bad);background:#fef2f1}.opt.wrong .mk{background:var(--bad);border-color:var(--bad)}
.opt.disabled{pointer-events:none}
.explain{font-size:13px;color:#6b5650;background:var(--grad-soft);border-radius:11px;padding:12px 15px;margin-top:2px;line-height:1.6;border:1px solid var(--line)}
.result{text-align:center;padding:14px 0 22px}
.result .ring-big{width:118px;height:118px;margin:0 auto 14px;position:relative}
.result .ring-big .lbl{position:absolute;inset:0;display:grid;place-items:center;font-size:29px;font-weight:800}
.result .msg{font-size:15px;color:var(--ink-2);max-width:460px;margin:0 auto;line-height:1.55;font-weight:600}
.result .msg.pass b{color:var(--ok)}.result .msg.fail b{color:var(--bad)}

.hero{background:linear-gradient(135deg,#1c0f0d 0%,#2e1410 52%,#3d160c 100%);color:#fff;border-radius:28px;padding:46px 44px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-80px;top:-80px;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(255,122,61,.26),transparent 70%)}
.hero::before{content:"";position:absolute;right:90px;bottom:-100px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(225,29,42,.24),transparent 70%)}
.hero .hlogo{width:64px;height:auto;margin-bottom:18px;position:relative;z-index:1;filter:drop-shadow(0 6px 18px rgba(255,122,61,.5))}
.hero .tag{font-size:11.5px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:#ffc8a6;background:rgba(255,122,61,.18);display:inline-block;padding:6px 13px;border-radius:99px;position:relative;z-index:1;border:1px solid rgba(255,122,61,.32)}
.hero h2{font-size:36px;font-weight:800;letter-spacing:-1px;margin:16px 0 12px;line-height:1.08;max-width:640px;position:relative;z-index:1;text-shadow:0 0 24px rgba(255,90,40,.55)}
.hero p{font-size:15px;line-height:1.65;opacity:.9;max-width:580px;position:relative;z-index:1}
.hero .meta{display:flex;gap:28px;margin-top:28px;flex-wrap:wrap;position:relative;z-index:1}
.hero .meta .m .v{font-size:23px;font-weight:800;color:#ff9b6b;text-shadow:0 0 16px rgba(255,122,61,.5)}
.hero .meta .m .k{font-size:11px;opacity:.78;text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-top:2px}
.sec-h{font-size:14px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:30px 4px 14px}
.grid-mods{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
.modcard{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--shadow);transition:.2s;cursor:pointer;position:relative;overflow:hidden}
.modcard.lk{cursor:not-allowed;opacity:.65}
.modcard:not(.lk):hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:#ffd1c2}
.modcard .ic{width:48px;height:48px;border-radius:14px;background:var(--grad-soft);display:grid;place-items:center;font-size:22px;margin-bottom:14px}
.modcard .mnum{font-size:10.5px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
.modcard h3{font-size:15.5px;font-weight:800;margin:3px 0 7px;letter-spacing:-.2px;line-height:1.25}
.modcard p{font-size:13px;color:var(--ink-2);line-height:1.5;font-weight:500}
.modcard .ft{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-size:11.5px;color:var(--muted);font-weight:700}
.modcard .ft .st.ok{color:var(--ok)}
.modcard .mbar{height:6px;border-radius:99px;background:#f3e6e2;margin-top:11px;overflow:hidden}
.modcard .mbar>i{display:block;height:100%;background:var(--grad);width:0;transition:width .5s ease}

.cert{text-align:center;padding:14px;border:2px solid transparent;background:linear-gradient(#fff,#fff) padding-box,var(--grad) border-box;border-radius:24px}
.cert .clogo{width:90px;height:auto;margin:6px auto 4px;filter:drop-shadow(0 6px 16px rgba(180,40,25,.22))}
.cert h2{font-size:27px;font-weight:800}
.cert .name{font-size:32px;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;margin:16px 0;filter:drop-shadow(0 0 14px rgba(225,29,42,.28))}
.cert input{font-size:16px;padding:11px 16px;border:1.5px solid var(--line);border-radius:12px;text-align:center;width:300px;max-width:90%;margin-bottom:6px;font-family:inherit}
.cert input:focus{outline:none;border-color:var(--accent)}
.cert .meta-cert{display:flex;justify-content:center;gap:26px;flex-wrap:wrap;margin:14px 0 4px;font-size:12px;color:var(--muted);font-weight:700}
.cert .meta-cert b{color:var(--accent);display:block;font-size:14px;margin-top:2px}
.locked-note{display:flex;gap:11px;align-items:center;justify-content:center;color:var(--ink-2);font-size:14.5px;background:var(--grad-soft);border-radius:14px;padding:22px;border:1px dashed #ffd1c2;font-weight:600}

.totop{position:fixed;bottom:26px;right:26px;width:48px;height:48px;border-radius:50%;background:var(--grad);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-lg),0 0 20px rgba(255,122,61,.45);z-index:50;opacity:0;pointer-events:none;transform:translateY(12px);transition:.25s}
.totop.show{opacity:1;pointer-events:auto;transform:translateY(0)}

@media print{.sidebar,.nav-btns,.topbar,.menu-btn,.totop,.narrate-bar{display:none!important}.app{display:block}.main{max-width:100%}}
@media(max-width:900px){
  .app{grid-template-columns:1fr}.menu-btn{display:flex}.main{padding:78px 22px 40px}
  .defbox,.grid-mods{grid-template-columns:1fr}
  .sidebar{position:fixed;top:0;left:0;width:284px;height:100vh;transform:translateX(-104%);transition:transform .28s ease}
  .app.menu-open .sidebar{transform:translateX(0)}.app.menu-open .scrim{display:block}
  .card{padding:28px 22px}.hero{padding:34px 26px}.hero h2{font-size:28px}
  .lesson table{font-size:12px}.lesson th,.lesson td{padding:7px 8px}
}

/* ===== MCR UX enhancements ===== */
#main{zoom:var(--fs,1)}
.topbtn{padding:6px 12px;font-size:13px}
.pbar{height:5px;background:#eadfdb;border-radius:6px;margin:0 0 20px;overflow:hidden}
.pbar i{display:block;height:100%;background:var(--grad);border-radius:6px;transition:width .45s ease}
/* collapsible reg callout */
details.callout.reg{cursor:pointer}
details.callout.reg summary{list-style:none;display:flex;align-items:center;justify-content:space-between;gap:10px;font-weight:800}
details.callout.reg summary::-webkit-details-marker{display:none}
details.callout.reg .rev{font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap}
details.callout.reg[open] .rev{opacity:.5}
details.callout.reg p{margin-top:10px}
/* comfort button + panel */
.cfg-btn{position:fixed;right:18px;bottom:80px;z-index:70;width:54px;height:54px;border-radius:50%;background:var(--grad);color:#fff;font-size:24px;box-shadow:0 10px 26px -6px rgba(0,0,0,.45);border:2px solid #fff;display:flex;align-items:center;justify-content:center;animation:cfgpop 2.4s ease-in-out infinite}
@keyframes cfgpop{0%,100%{box-shadow:0 10px 26px -6px rgba(0,0,0,.45)}50%{box-shadow:0 10px 30px -4px rgba(0,0,0,.55),0 0 0 6px rgba(225,29,42,.18)}}
.cfg-panel{position:fixed;right:18px;bottom:128px;z-index:71;width:268px;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-lg);padding:14px 16px;display:none}
.cfg-panel.open{display:block}
.cfg-h{font-weight:800;font-size:14px;margin-bottom:10px;color:var(--ink)}
.cfg-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 0;font-size:13px;font-weight:600;color:var(--ink-2)}
.cfg-row+.cfg-row{border-top:1px solid var(--line-2)}
.cfg-fs{display:flex;align-items:center;gap:8px}
.cfg-fs button,.cfg-mini{width:30px;height:30px;border-radius:9px;border:1px solid var(--line);background:#fff;font-weight:800;color:var(--accent)}
.cfg-fs b{min-width:42px;text-align:center;font-size:12px;color:var(--ink)}
.cfg-tog{padding:6px 12px;border-radius:99px;border:1px solid var(--line);background:#f6efed;font-weight:700;font-size:12px;color:var(--ink-2)}
.cfg-tog.on{background:var(--accent);color:#fff;border-color:var(--accent)}
/* flip cards */
.demo-wrap{margin-top:22px;padding:18px;border:1px dashed var(--accent);border-radius:16px;background:var(--grad-soft)}
.demo-tag{font-size:11px;font-weight:800;letter-spacing:.4px;color:var(--accent);text-transform:uppercase;margin-bottom:12px}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:640px){.igrid{grid-template-columns:1fr}}
.flip{perspective:1000px;height:120px;cursor:pointer;outline:none}
.flip-in{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flip.on .flip-in{transform:rotateY(180deg)}
.flip-f,.flip-b{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:12px;text-align:center;border:1px solid var(--line);background:#fff}
.flip-f b,.flip-b b{font-size:14px;color:var(--ink)}.flip-f span,.flip-b span{font-size:12px;color:var(--ink-2)}
.flip-b{transform:rotateY(180deg);background:var(--accent);}.flip-b b,.flip-b span{color:#fff}
/* hotspots */
.hotspot-wrap{position:relative;border:1px solid var(--line);border-radius:14px;background:#fff;height:120px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.hs-img{font-size:46px;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--ink-2)}
.hs-cap{font-size:11px}
.hot{position:absolute;width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-weight:800;font-size:13px;box-shadow:0 4px 10px rgba(0,0,0,.2);animation:hotpulse 1.8s infinite}
@keyframes hotpulse{0%{box-shadow:0 0 0 0 rgba(225,29,42,.5)}70%{box-shadow:0 0 0 10px rgba(225,29,42,0)}100%{box-shadow:0 0 0 0 rgba(225,29,42,0)}}
.hot-pop{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);max-width:80%;background:var(--ink);color:#fff;font-size:12px;padding:8px 12px;border-radius:10px;line-height:1.4;z-index:5}
/* match game */
.matchgame{border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px}
.mg-h{font-size:13px;font-weight:700;color:var(--ink-2);margin-bottom:10px}
.mg-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mg-c{display:flex;flex-direction:column;gap:8px}
.mg-item,.mg-drop{padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:#faf6f5;font-weight:600;font-size:13px;text-align:left;color:var(--ink)}
.mg-item.sel{border-color:var(--accent);background:#fdeeec;color:var(--accent)}
.mg-item.done,.mg-drop.done{background:#e8f7ef;border-color:var(--ok);color:var(--ok);cursor:default}
.mg-drop.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.mg-msg{margin-top:10px;font-size:12px;font-weight:700;min-height:16px}
.matchgame.solved .mg-msg{color:var(--ok)}
/* dark mode */
[data-theme="dark"] body{background:#14181d;color:#e8edf2}
[data-theme="dark"] .sidebar{background:rgba(22,27,33,.92);border-color:#262c34}
[data-theme="dark"] .card,[data-theme="dark"] .hotspot-wrap,[data-theme="dark"] .matchgame,[data-theme="dark"] .flip-f,[data-theme="dark"] .cfg-panel,[data-theme="dark"] .cfg-btn,[data-theme="dark"] .pill,[data-theme="dark"] .menu-btn,[data-theme="dark"] .totop{background:#1b2127;border-color:#2b323b;color:#e8edf2}
[data-theme="dark"] .brand h1,[data-theme="dark"] .lesson .title,[data-theme="dark"] .mg-item,[data-theme="dark"] .mg-drop,[data-theme="dark"] .flip-f b{color:#e8edf2}
[data-theme="dark"] .mg-item,[data-theme="dark"] .mg-drop{background:#222932}
[data-theme="dark"] .opt{background:#222932;border-color:#2b323b;color:#e8edf2}
[data-theme="dark"] .subtitle,[data-theme="dark"] .crumb{color:#9aa7b4}
[data-theme="dark"] .cfg-tog{background:#222932;color:#cdd6df}

/* dark mode : cartes d'accueil des modules */
html[data-theme="dark"] .modcard{background:#1b2127!important;border-color:#2b323b!important}
html[data-theme="dark"] .modcard h3{color:#e8edf2!important}
html[data-theme="dark"] .modcard p,html[data-theme="dark"] .modcard .ft,html[data-theme="dark"] .modcard .mnum{color:#b9c3cd!important}
html[data-theme="dark"] .modcard .mbar{background:#2b323b!important}
html[data-theme="dark"] .defbox,html[data-theme="dark"] .defbox .d{background:#1b2127!important;border-color:#2b323b!important}
html[data-theme="dark"] .callout{background:#222932!important;border-color:#2b323b!important;color:#d7dee6!important}

.side-menu-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:14px 6px 12px;padding:11px 14px;border-radius:12px;background:var(--accent,#333);color:#fff;font-weight:800;font-size:13px;text-decoration:none;box-shadow:0 6px 16px -8px rgba(0,0,0,.4)}
.side-menu-btn:hover{filter:brightness(1.08)}
html[data-theme="dark"] .side-menu-btn{color:#fff!important}

/* ===== MCR — Mode sombre v2 : lisibilite + couleurs vives ===== */
html[data-theme="dark"]{
  --acc-lite: color-mix(in srgb, var(--accent,#10cfc0) 60%, #ffffff);
  --acc2-lite: color-mix(in srgb, var(--accent-2,#2bb6ff) 68%, #ffffff);
}
html[data-theme="dark"] .lesson p,
html[data-theme="dark"] .lesson li,
html[data-theme="dark"] .result .msg{color:#d3dce6!important}
html[data-theme="dark"] .lesson strong,
html[data-theme="dark"] .lesson b,
html[data-theme="dark"] strong{color:#ffffff!important;font-weight:800!important}
html[data-theme="dark"] .crumb b,
html[data-theme="dark"] .result .msg.pass b,
html[data-theme="dark"] .modcard .mnum{color:var(--acc-lite)!important}
html[data-theme="dark"] .callout{background:#1e2631!important;border-color:#333d4a!important}
html[data-theme="dark"] .callout p,
html[data-theme="dark"] .callout li{color:#dbe3ec!important}
html[data-theme="dark"] .callout .cot{color:var(--acc-lite)!important}
html[data-theme="dark"] .callout.key .cot{color:#3ce6a4!important}
html[data-theme="dark"] .callout.danger .cot{color:#ff8377!important}
html[data-theme="dark"] .defbox,
html[data-theme="dark"] .defbox .d{background:#1b2229!important;border-color:#2b323b!important}
html[data-theme="dark"] .defbox p,
html[data-theme="dark"] .defbox .d p{color:#cfd9e3!important}
html[data-theme="dark"] .explain{background:#1b2229!important;border-color:#2b323b!important;color:#cfd9e3!important}
html[data-theme="dark"] .opt.sel{border-color:var(--acc2-lite)!important;background:#172530!important}
html[data-theme="dark"] .opt.correct{border-color:#22c55e!important;background:#11241b!important;color:#d6ffe6!important}
html[data-theme="dark"] .opt.wrong{border-color:#ef4444!important;background:#2a1414!important;color:#ffdad5!important}
html[data-theme="dark"] .nav .t:hover{background:#232c37!important;color:#ffffff!important}
</style>
</head>

      { id:"m1l1", title:"La combustion et le triangle du feu", duration:"15 min",
        body:`
        <p>Le feu est le résultat visible d'une <strong>combustion</strong> : une réaction chimique d'oxydation, rapide et exothermique (qui dégage de la chaleur), entre un combustible et un comburant, déclenchée par une énergie d'activation.</p>
        <h3>Les trois éléments du triangle du feu</h3>
        <div class="defbox">
          <div class="d"><h4>Combustible</h4><p>Ce qui brûle : bois, papier, carton, plastiques, essence, solvants, gaz… Plus il est divisé (poussières, vapeurs), plus il s'enflamme vite.</p></div>
          <div class="d"><h4>Comburant</h4><p>Ce qui entretient la combustion : le plus souvent le dioxygène de l'air (≈ 21 %). Sous ~15 % d'O₂, la plupart des feux s'étouffent.</p></div>
          <div class="d"><h4>Énergie d'activation</h4><p>Le déclencheur : flamme, étincelle, point chaud (soudure, meulage), surface chaude, friction, électricité statique, cigarette…</p></div>
        </div>
        <p>Réunissez ces trois éléments et le feu prend. Une fois lancée, une 4ᵉ composante — la <strong>réaction en chaîne</strong> — l'auto-entretient : on parle de <strong>tétraèdre du feu</strong>.</p>
        <h3>Conséquence : comment on éteint</h3>
        <p>Supprimer un seul côté du triangle suffit à éteindre :</p>
        <table>
          <tr><th>Action</th><th>Côté supprimé</th><th>Exemple</th></tr>
          <tr><td><strong>Refroidir</strong></td><td>Chaleur / énergie</td><td>Eau sur un feu de bois</td></tr>
          <tr><td><strong>Étouffer</strong></td><td>Comburant (oxygène)</td><td>Couverture anti-feu, CO₂, mousse</td></tr>
          <tr><td><strong>Isoler</strong></td><td>Combustible</td><td>Couper l'arrivée de gaz</td></tr>
          <tr><td><strong>Inhiber</strong></td><td>Réaction en chaîne</td><td>Poudre extinctrice</td></tr>
        </table>`,
        vo:`Le feu est le résultat d'une combustion : une oxydation rapide et exothermique entre un combustible et un comburant, déclenchée par une énergie d'activation. Le combustible, c'est la matière qui brûle ; plus elle est divisée, en poussières ou en vapeurs, plus elle s'enflamme vite. Le comburant, c'est ce qui entretient la combustion, le plus souvent l'oxygène de l'air à environ vingt-et-un pour cent. L'énergie d'activation, c'est le déclencheur : flamme, étincelle, point chaud, friction ou cigarette. Réunissez ces trois éléments et le feu prend : c'est le triangle du feu. La bonne nouvelle, c'est qu'il suffit d'en supprimer un seul pour éteindre : refroidir, étouffer, isoler le combustible, ou inhiber la réaction en chaîne avec une poudre.`,
        callouts:[{type:"key",title:"À retenir",text:"Trois éléments réunis = un feu. Enlever un seul côté du triangle = extinction."}] },
      { id:"m1l2", title:"Les classes de feux (NF EN 2)", duration:"15 min",
        body:`
        <p>On classe les feux selon la nature de ce qui brûle (norme <strong>NF EN 2</strong>). On choisit l'agent extincteur en fonction de la classe : une erreur peut être inefficace, voire aggraver le feu.</p>
        <table>
          <tr><th>Classe</th><th>Combustible</th><th>Exemples en entreprise</th><th>Agent adapté</th><th>À éviter</th></tr>
          <tr><td><strong>A</strong></td><td>Solides à braises</td><td>Bois, papier, carton, textiles, plastiques solides</td><td>Eau, poudre ABC</td><td>—</td></tr>
          <tr><td><strong>B</strong></td><td>Liquides inflammables</td><td>Essence, fuel, solvants, peintures, alcools</td><td>Mousse, CO₂, poudre</td><td>Jet d'eau</td></tr>
          <tr><td><strong>C</strong></td><td>Gaz</td><td>Propane, butane, gaz naturel, acétylène</td><td>Poudre — couper d'abord le gaz</td><td>Éteindre sans couper la source</td></tr>
          <tr><td><strong>D</strong></td><td>Métaux</td><td>Magnésium, aluminium en poudre, sodium, lithium</td><td>Poudres spéciales D, sable sec</td><td>Eau, CO₂</td></tr>
          <tr><td><strong>F</strong></td><td>Huiles &amp; graisses de cuisson</td><td>Friteuses, sauteuses, cuisines collectives</td><td>Extincteur classe F, couverture anti-feu</td><td>Eau</td></tr>
        </table>
        <p>Il n'existe pas de « <strong>classe E</strong> » : un feu d'origine électrique n'est pas une classe (l'électricité est une <em>cause</em>). On coupe le courant, puis on traite selon le combustible.</p>`,
        vo:`On classe les feux selon ce qui brûle, suivant la norme NF EN 2. Classe A, les solides à braises comme le bois et le carton, éteints à l'eau. Classe B, les liquides inflammables comme l'essence et les solvants ; jamais de jet d'eau, qui étend le feu ; on utilise mousse, CO2 ou poudre. Classe C, les gaz : on coupe d'abord l'arrivée de gaz. Classe D, les métaux : surtout pas d'eau, on utilise des poudres spéciales. Classe F, les huiles et graisses de cuisson, typiquement les friteuses : jamais d'eau, qui projetterait l'huile en boule de feu ; on utilise un extincteur de classe F ou une couverture anti-feu. Notez qu'il n'existe pas de classe E : un feu électrique n'est pas une classe, l'électricité est une cause.`,
        callouts:[{type:"reg",title:"Norme NF EN 2",text:"A solides · B liquides · C gaz · D métaux · F huiles et graisses de cuisson."},
          {type:"danger",title:"Geste qui sauve",text:"Jamais d'eau sur un feu d'huile (F) ni de métaux (D). Sur un feu de gaz (C), couper d'abord l'arrivée de gaz."}] },
      { id:"m1l3", title:"Propagation du feu et causes en entreprise", duration:"15 min",
        body:`
        <p>Un départ de feu non maîtrisé devient un incendie en se propageant par <strong>quatre mécanismes</strong>.</p>
        <table>
          <tr><th>Mode</th><th>Mécanisme</th><th>Exemple</th></tr>
          <tr><td><strong>Conduction</strong></td><td>La chaleur traverse un solide</td><td>Une poutre métallique chauffée enflamme la pièce voisine</td></tr>
          <tr><td><strong>Convection</strong></td><td>Les fumées chaudes montent</td><td>Les fumées embrasent l'étage par la cage d'escalier</td></tr>
          <tr><td><strong>Rayonnement</strong></td><td>Chaleur transmise à distance, sans contact</td><td>Un bâtiment voisin s'enflamme</td></tr>
          <tr><td><strong>Projection</strong></td><td>Particules incandescentes projetées</td><td>Étincelles de soudure, débris d'explosion</td></tr>
        </table>
        <h3>Les principales causes en entreprise</h3>
        <ul>
          <li><strong>Causes électriques (1ʳᵉ cause) :</strong> installations vétustes, surcharges, courts-circuits.</li>
          <li><strong>Travaux par point chaud :</strong> soudage, meulage → <strong>permis de feu</strong> obligatoire.</li>
          <li><strong>Cigarettes</strong>, mauvais stockage de produits inflammables, défaut d'entretien.</li>
          <li><strong>Électricité statique, frictions</strong> et <strong>malveillance</strong>.</li>
        </ul>
        <p>La plupart de ces causes sont <strong>humaines ou techniques</strong>, donc <strong>évitables</strong>.</p>`,
        vo:`Un incendie se propage par quatre mécanismes. La conduction : la chaleur traverse les solides, surtout les métaux. La convection, la plus fréquente : les fumées chaudes montent et embrasent les étages par les cages d'escalier et les gaines. Le rayonnement : la chaleur se transmet à distance, sans contact, et enflamme les matériaux voisins. La projection : des particules incandescentes créent de nouveaux foyers plus loin. Côté causes, la première en entreprise est électrique, suivie des travaux par point chaud, du tabagisme, du mauvais stockage et du défaut d'entretien. La plupart sont évitables par l'ordre, la propreté et le respect des consignes.`,
        callouts:[{type:"key",title:"À retenir",text:"Conduction · convection · rayonnement · projection. La convection (fumées qui montent) est le vecteur le plus fréquent dans les bâtiments."}] }
    ],
    quiz:[
      {q:"Quels sont les trois éléments du triangle du feu ?",opts:["Combustible, fumée et lumière","Combustible, comburant et énergie d'activation","Comburant, eau et électricité","Combustible, oxygène et extincteur"],a:1,ex:"Combustible (ce qui brûle), comburant (souvent l'oxygène de l'air) et énergie d'activation (la source de chaleur). La fumée et la lumière sont des conséquences."},
      {q:"Pour éteindre un feu, il suffit de…",opts:["réunir les trois côtés du triangle","supprimer un seul des trois côtés du triangle","augmenter l'oxygène","ajouter du combustible"],a:1,ex:"En supprimer un seul stoppe le feu : refroidir, étouffer, isoler le combustible ou inhiber la réaction en chaîne."},
      {q:"L'huile d'une friteuse s'enflamme. Quelle classe, et que ne faut-il surtout pas faire ?",opts:["Classe B — ne pas utiliser de mousse","Classe F — surtout pas d'eau","Classe A — ne pas utiliser d'eau","Classe C — couper le gaz"],a:1,ex:"Feu de classe F. L'eau se vaporise et projette l'huile en boule de feu : on utilise un extincteur de classe F ou une couverture anti-feu."},
      {q:"Sur un feu de gaz (classe C), le premier geste est de…",opts:["jeter de l'eau","couper l'arrivée de gaz","éteindre la flamme immédiatement","ouvrir les fenêtres"],a:1,ex:"On coupe d'abord la source : éteindre la flamme alors que le gaz fuit le laisse s'accumuler puis exploser."},
      {q:"Les fumées montent dans la cage d'escalier et embrasent l'étage. Quel mode de propagation ?",opts:["Conduction","Convection","Rayonnement","Projection"],a:1,ex:"C'est la convection : les fumées chaudes, plus légères, montent et se propagent par les volumes verticaux."}
    ] },

  { id:"m2", icon:"🌫️", title:"Développement & fumées", desc:"Les phases de l'incendie et le danger n°1 : les fumées.", duration:"30 min",
    lessons:[
      { id:"m2l1", title:"Les phases de développement d'un incendie", duration:"15 min",
        body:`
        <p>Un incendie n'est pas instantané : il suit des <strong>phases</strong>. Les connaître permet de comprendre pourquoi il faut intervenir <strong>le plus tôt possible</strong>.</p>
        <ul>
          <li><strong>1. Naissance (ignition) :</strong> petit foyer localisé. À ce stade, un seul extincteur peut suffire.</li>
          <li><strong>2. Croissance :</strong> le feu s'étend, la température monte, les fumées se multiplient.</li>
          <li><strong>3. Embrasement généralisé éclair (flashover) :</strong> vers 500-600 °C, tous les matériaux de la pièce s'enflamment d'un coup. Au-delà, aucune intervention humaine n'est possible.</li>
          <li><strong>4. Plein développement :</strong> le feu brûle à pleine puissance, limité par l'oxygène ou le combustible disponible.</li>
          <li><strong>5. Déclin :</strong> le combustible s'épuise, le feu décroît.</li>
        </ul>
        <p>La fenêtre d'action de l'EPI se situe dans les <strong>premières minutes</strong> : un départ de feu maîtrisé tôt reste un incident, sinon il devient un sinistre.</p>`,
        vo:`Un incendie suit des phases. D'abord la naissance : un petit foyer localisé, où un seul extincteur peut suffire. Puis la croissance : le feu s'étend, la température et les fumées augmentent. Vient ensuite l'embrasement généralisé éclair, le flashover : vers cinq à six cents degrés, tout s'enflamme d'un coup dans la pièce, et plus aucune intervention humaine n'est possible. Suivent le plein développement, puis le déclin quand le combustible s'épuise. Ce qu'il faut retenir : la fenêtre d'action de l'équipier se situe dans les toutes premières minutes. Plus on agit tôt, plus l'extinction est facile.`,
        callouts:[{type:"danger",title:"Flashover",text:"Après l'embrasement généralisé (≈ 500-600 °C), il est trop tard pour intervenir : on évacue. D'où l'importance d'agir dès la naissance du feu."}] },
      { id:"m2l2", title:"Les fumées : le danger numéro un", duration:"15 min",
        body:`
        <p>Dans un incendie, <strong>la majorité des décès sont dus aux fumées</strong>, pas aux flammes. Comprendre leur danger est vital.</p>
        <h3>Trois dangers cumulés</h3>
        <ul>
          <li><strong>Toxicité :</strong> les fumées contiennent du monoxyde de carbone (CO), de l'acide cyanhydrique et d'autres gaz qui asphyxient et intoxiquent en quelques respirations.</li>
          <li><strong>Opacité :</strong> elles plongent les locaux dans le noir, on perd ses repères et le chemin vers les issues.</li>
          <li><strong>Chaleur :</strong> très chaudes, elles brûlent les voies respiratoires et propagent le feu.</li>
        </ul>
        <p>Les fumées sont aussi <strong>très rapides</strong> : elles montent et envahissent un étage en quelques secondes. L'air le plus respirable se trouve <strong>près du sol</strong>.</p>`,
        vo:`Dans un incendie, la majorité des décès sont dus aux fumées, et non aux flammes. Les fumées cumulent trois dangers. La toxicité : elles contiennent du monoxyde de carbone et d'autres gaz qui asphyxient en quelques respirations. L'opacité : elles plongent les locaux dans le noir et on perd le chemin des issues. La chaleur : très chaudes, elles brûlent les voies respiratoires et propagent le feu. Les fumées sont aussi très rapides et envahissent un étage en quelques secondes. Retenez ce geste vital : l'air le plus respirable se trouve près du sol, il faut donc se baisser pour se déplacer.`,
        callouts:[{type:"key",title:"Geste qui sauve",text:"Face aux fumées : se baisser, l'air respirable est près du sol. Fermer les portes derrière soi ralentit leur propagation."},
          {type:"reg",title:"Chiffre clé",text:"La majorité des victimes d'incendie meurent des fumées (intoxication, asphyxie), souvent avant l'arrivée des flammes."}] }
    ],
    quiz:[
      {q:"À partir de quel phénomène toute intervention humaine devient impossible ?",opts:["La naissance du feu","La croissance","L'embrasement généralisé éclair (flashover)","Le déclin"],a:2,ex:"Au flashover (≈ 500-600 °C), tous les matériaux s'enflamment simultanément : on n'intervient plus, on évacue."},
      {q:"Dans un incendie, la principale cause de décès est…",opts:["les flammes","les fumées (asphyxie, intoxication)","l'effondrement du bâtiment","le bruit"],a:1,ex:"La majorité des victimes meurent des fumées, souvent avant même d'être atteintes par les flammes."},
      {q:"Pourquoi les fumées sont-elles si dangereuses ?",opts:["Elles sont seulement salissantes","Elles sont toxiques, opaques et chaudes","Elles éteignent le feu","Elles sont inoffensives si on retient sa respiration"],a:1,ex:"Trois dangers cumulés : toxicité (CO et gaz mortels), opacité (perte des repères) et chaleur, le tout très rapidement."},
      {q:"Pour se déplacer dans un local enfumé, il faut…",opts:["courir debout vers la sortie","se baisser, l'air respirable est près du sol","ouvrir toutes les portes","attendre que les fumées montent"],a:1,ex:"L'air le plus respirable est près du sol : on se baisse, et on ferme les portes derrière soi pour ralentir les fumées."},
      {q:"Quand l'extinction par un EPI est-elle la plus efficace ?",opts:["au plein développement","dès la naissance du feu","après le flashover","quand les pompiers arrivent"],a:1,ex:"Plus on intervient tôt, plus c'est facile : à la naissance, un seul extincteur peut suffire."}
    ] },

  { id:"m3", icon:"🧯", title:"Les moyens d'extinction", desc:"Agents, extincteurs, RIA et règles d'emploi.", duration:"50 min",
    lessons:[
      { id:"m3l1", title:"Les agents extincteurs et leur action", duration:"15 min",
        body:`
        <p>Chaque agent extincteur agit sur un ou plusieurs côtés du triangle du feu. Choisir le bon agent, c'est agir efficacement et sans danger.</p>
        <table>
          <tr><th>Agent</th><th>Action principale</th><th>Classes</th><th>Points clés</th></tr>
          <tr><td><strong>Eau pulvérisée</strong></td><td>Refroidit</td><td>A</td><td>Économique ; inefficace seule sur liquides</td></tr>
          <tr><td><strong>Eau + additif</strong></td><td>Refroidit + étouffe</td><td>A (et B)</td><td>Additif moussant, plus efficace</td></tr>
          <tr><td><strong>Mousse</strong></td><td>Étouffe (tapis isolant)</td><td>A, B</td><td>Idéale sur liquides inflammables</td></tr>
          <tr><td><strong>CO₂ (dioxyde de carbone)</strong></td><td>Étouffe</td><td>B (et électrique)</td><td>Propre, sans résidu ; pour appareils sous tension</td></tr>
          <tr><td><strong>Poudre</strong></td><td>Inhibe la réaction en chaîne</td><td>ABC ou BC</td><td>Très polyvalente ; salissante</td></tr>
        </table>
        <p>Sur un appareil <strong>électrique sous tension</strong>, on privilégie le <strong>CO₂</strong> (ou la poudre) : <strong>jamais d'eau en jet</strong> tant que le courant n'est pas coupé.</p>`,
        vo:`Chaque agent extincteur agit sur le triangle du feu. L'eau refroidit : elle est idéale sur les solides de classe A. La mousse étouffe en formant un tapis isolant : parfaite sur les liquides de classe B. Le dioxyde de carbone, le CO2, étouffe sans laisser de résidu : c'est l'agent des appareils électriques sous tension. La poudre inhibe la réaction en chaîne et reste très polyvalente, mais elle est salissante. Règle de sécurité : sur un appareil électrique encore sous tension, on privilégie le CO2 ou la poudre, jamais de jet d'eau tant que le courant n'est pas coupé.`,
        callouts:[{type:"danger",title:"Électrique",text:"Sur un équipement sous tension : CO₂ ou poudre, jamais d'eau en jet. Couper le courant dès que possible."}] },
      { id:"m3l2", title:"Les extincteurs : types et mode d'emploi", duration:"18 min",
        body:`
        <p>L'extincteur est le moyen de première intervention par excellence. Il faut savoir le reconnaître et l'utiliser.</p>
        <h3>Types</h3>
        <ul>
          <li><strong>Portatifs :</strong> jusqu'à 20 kg, transportables à la main (les plus courants).</li>
          <li><strong>Mobiles :</strong> sur roues, pour de plus gros volumes d'agent.</li>
          <li><strong>À pression permanente</strong> ou <strong>à pression auxiliaire</strong> (sparklet à percuter).</li>
        </ul>
        <p>Un <strong>pictogramme</strong> indique les classes de feux sur lesquelles l'extincteur est efficace. Vérifiez-le avant d'agir.</p>
        <h3>Mode d'emploi : les 4 gestes</h3>
        <ul>
          <li><strong>1. Dégoupiller</strong> (retirer la goupille de sécurité).</li>
          <li><strong>2. Viser la base</strong> des flammes (pas le sommet).</li>
          <li><strong>3. Presser</strong> la poignée.</li>
          <li><strong>4. Balayer</strong> de gauche à droite, en progressant.</li>
        </ul>
        <p>On attaque le feu <strong>dos à une issue</strong>, à <strong>1 à 2 mètres</strong>, vent ou courant d'air dans le dos. Un extincteur se vide en quelques secondes : on vise juste.</p>`,
        vo:`L'extincteur est le moyen de première intervention par excellence. Les modèles portatifs, jusqu'à vingt kilos, sont les plus courants ; les modèles mobiles sont sur roues. Un pictogramme indique les classes de feux sur lesquelles l'extincteur est efficace : vérifiez-le avant d'agir. Pour l'utiliser, quatre gestes : dégoupiller en retirant la goupille, viser la base des flammes et non le sommet, presser la poignée, puis balayer de gauche à droite en progressant. On attaque toujours dos à une issue, à un ou deux mètres, le courant d'air dans le dos. Attention : un extincteur se vide en quelques secondes, il faut viser juste.`,
        callouts:[{type:"key",title:"Les 4 gestes",text:"Dégoupiller · Viser la base · Presser · Balayer. Attaque dos à l'issue, à 1-2 m."},
          {type:"reg",title:"Vérification",text:"Les extincteurs font l'objet d'une vérification annuelle par un organisme compétent (et d'un contrôle visuel régulier)."}] },
      { id:"m3l3", title:"RIA, couverture et extinction automatique", duration:"17 min",
        body:`
        <p>L'extincteur n'est pas le seul moyen. D'autres équipements complètent la première intervention.</p>
        <ul>
          <li><strong>Le RIA (Robinet d'Incendie Armé) :</strong> un tuyau relié au réseau d'eau, à débit <strong>continu</strong> et illimité (contrairement à l'extincteur). Il s'utilise à deux idéalement et permet d'attaquer un feu plus important. Réservé aux feux de classe A (et B avec précaution) — jamais sur l'électrique sous tension.</li>
          <li><strong>La couverture anti-feu :</strong> étouffe un petit foyer (poêle, friteuse, début de feu sur une personne).</li>
          <li><strong>L'extinction automatique (sprinkleurs) :</strong> des têtes se déclenchent seules sous l'effet de la chaleur et arrosent la zone.</li>
          <li><strong>Colonnes sèches / humides :</strong> canalisations fixes alimentant les étages, à l'usage des <strong>sapeurs-pompiers</strong>.</li>
        </ul>
        <p>L'EPI utilise surtout l'<strong>extincteur</strong> et le <strong>RIA</strong>. Le choix dépend de la classe de feu, de son ampleur et de la sécurité de l'intervenant.</p>`,
        vo:`L'extincteur n'est pas le seul moyen. Le RIA, robinet d'incendie armé, est un tuyau relié au réseau d'eau, à débit continu et illimité, contrairement à l'extincteur : il permet d'attaquer un feu plus important, idéalement à deux, sur les feux de classe A, jamais sur l'électrique sous tension. La couverture anti-feu étouffe un petit foyer, comme une friteuse. L'extinction automatique par sprinkleurs se déclenche seule sous l'effet de la chaleur. Enfin, les colonnes sèches et humides alimentent les étages et sont réservées aux sapeurs-pompiers. L'équipier de première intervention utilise surtout l'extincteur et le RIA, en fonction de la classe de feu et de sa propre sécurité.`,
        callouts:[{type:"key",title:"RIA vs extincteur",text:"L'extincteur a une réserve limitée (quelques secondes) ; le RIA offre un débit d'eau continu pour un feu plus important — surtout classe A."}] }
    ],
    quiz:[
      {q:"Sur un appareil électrique resté sous tension, quel agent privilégier ?",opts:["L'eau en jet","Le CO₂ (ou la poudre)","La mousse","Rien, on attend les pompiers"],a:1,ex:"Le CO₂ (ou la poudre) : pas de résidu et adapté au matériel sous tension. Jamais d'eau en jet tant que le courant n'est pas coupé."},
      {q:"L'eau agit principalement par…",opts:["étouffement","refroidissement","inhibition de la réaction en chaîne","projection"],a:1,ex:"L'eau refroidit le foyer : c'est l'agent de référence des feux de classe A (solides)."},
      {q:"Quelle est la bonne méthode d'utilisation d'un extincteur ?",opts:["Viser le sommet des flammes","Dégoupiller, viser la base, presser, balayer","Arroser le plafond","Vider l'extincteur d'un coup au centre"],a:1,ex:"Les 4 gestes : dégoupiller, viser la base des flammes, presser, balayer — dos à une issue, à 1-2 m."},
      {q:"Quel est l'avantage du RIA par rapport à l'extincteur ?",opts:["Il est plus léger","Il offre un débit d'eau continu et illimité","Il fonctionne sur l'électrique sous tension","Il ne nécessite aucune eau"],a:1,ex:"Le RIA est relié au réseau d'eau : débit continu, contrairement à l'extincteur dont la réserve dure quelques secondes."},
      {q:"Le CO₂ a pour particularité de…",opts:["laisser beaucoup de résidus","étouffer sans résidu, utilisable sur matériel sous tension","refroidir comme l'eau","être réservé aux feux de métaux"],a:1,ex:"Le CO₂ étouffe le feu, ne laisse pas de résidu et convient aux appareils électriques sous tension."}
    ] },
  { id:"m4", icon:"🚨", title:"Détection & moyens de secours", desc:"La détection, l'alarme et la sécurité du bâtiment.", duration:"35 min",
    lessons:[
      { id:"m4l1", title:"Détecter le feu et donner l'alarme", duration:"10 min",
        body:`
        <p>Avant d'éteindre ou d'évacuer, il faut <strong>détecter</strong> le feu et <strong>donner l'alarme</strong> au plus vite. C'est l'affaire de chacun dans l'entreprise.</p>
        <h3>La détection</h3>
        <ul>
          <li><strong>Automatique :</strong> détecteurs de fumée ou de chaleur, qui repèrent un départ de feu sans intervention humaine.</li>
          <li><strong>Manuelle :</strong> les <strong>déclencheurs manuels</strong> — ces boîtiers rouges « bris de glace » qui permettent à <strong>toute personne</strong> de donner l'alarme dès qu'elle découvre un feu.</li>
        </ul>
        <h3>L'alarme</h3>
        <p>Un <strong>signal sonore</strong> (parfois visuel) ordonne l'<strong>évacuation</strong> de tous les occupants. Au signal d'alarme, on n'attend pas de « voir » le feu : on <strong>évacue immédiatement</strong>.</p>
        <p><em>Ces équipements font partie du Système de Sécurité Incendie du bâtiment, qui fait l'objet d'une formation dédiée.</em></p>`,
        vo:`Avant d'éteindre ou d'évacuer, il faut détecter le feu et donner l'alarme au plus vite. La détection peut être automatique, par des détecteurs de fumée ou de chaleur, ou manuelle, grâce aux déclencheurs manuels, ces boîtiers rouges qui permettent à toute personne de donner l'alarme dès qu'elle découvre un feu. L'alarme est un signal sonore, parfois visuel, qui ordonne l'évacuation de tous les occupants. Retenez l'essentiel : au signal d'alarme, on n'attend pas de voir le feu, on évacue immédiatement. Ces équipements font partie du Système de Sécurité Incendie du bâtiment, qui fait l'objet d'une formation spécifique.`,
        callouts:[{type:"reg",title:"Déclencheur manuel",text:"Les boîtiers rouges (déclencheurs manuels d'alarme) permettent à toute personne de déclencher l'alarme dès la découverte d'un feu."},
          {type:"key",title:"À retenir",text:"Au signal d'alarme : on évacue, sans attendre de voir les flammes."}] },
      { id:"m4l2", title:"Désenfumage, compartimentage, éclairage de sécurité", duration:"17 min",
        body:`
        <p>Le bâtiment lui-même participe à la sécurité : plusieurs dispositifs limitent la propagation et protègent l'évacuation.</p>
        <h3>Le désenfumage</h3>
        <p>Évacuer les fumées toxiques et opaques vers l'extérieur (exutoires en toiture, ouvrants, ventilateurs) pour maintenir les chemins d'évacuation praticables.</p>
        <h3>Le compartimentage</h3>
        <p>Limiter la propagation du feu et des fumées grâce à des <strong>parois et portes coupe-feu</strong>. Ces portes ne doivent <strong>jamais être calées</strong> en position ouverte.</p>
        <h3>L'éclairage de sécurité &amp; les dégagements</h3>
        <p>Les <strong>BAES</strong> (blocs autonomes d'éclairage de sécurité) balisent les issues en cas de coupure de courant. Les <strong>issues de secours</strong> et cheminements doivent rester <strong>dégagés, signalés et déverrouillables</strong> à tout moment.</p>`,
        vo:`Le bâtiment participe à la sécurité. Le désenfumage évacue les fumées toxiques et opaques vers l'extérieur, pour garder les chemins d'évacuation praticables. Le compartimentage limite la propagation du feu et des fumées grâce à des parois et des portes coupe-feu ; ces portes ne doivent jamais être calées en position ouverte. L'éclairage de sécurité, les blocs BAES, balise les issues en cas de coupure de courant. Enfin, les issues de secours et les cheminements doivent rester en permanence dégagés, signalés et déverrouillables.`,
        callouts:[{type:"danger",title:"Portes coupe-feu",text:"Ne jamais caler une porte coupe-feu : ouverte, elle laisse passer le feu et les fumées d'un compartiment à l'autre."},
          {type:"key",title:"À retenir",text:"Issues de secours toujours dégagées, signalées et déverrouillables — jamais encombrées."}] },
      { id:"m4l3", title:"Risques particuliers : électricité & batteries lithium", duration:"8 min",
        body:`
        <p>Certains feux exigent des réflexes spécifiques. Les connaître évite d'aggraver l'accident.</p>
        <h3>Feux d'origine électrique</h3>
        <p><strong>Couper le courant</strong> si possible, puis utiliser un extincteur <strong>CO₂ ou à poudre</strong>. <strong>Jamais d'eau en jet</strong> sur un appareil sous tension : risque d'électrisation.</p>
        <h3>Batteries lithium-ion</h3>
        <p>Téléphones, ordinateurs, vélos et trottinettes : une batterie endommagée ou en surcharge peut partir en <strong>emballement thermique</strong> — chaleur intense, flammes, projections et fumées toxiques. Le feu se <strong>réactive</strong> facilement.</p>
        <ul>
          <li>Ne jamais recharger sans surveillance ni sur un matériel abîmé.</li>
          <li>En cas de départ de feu : <strong>alerter et évacuer</strong>, éloigner les objets combustibles si c'est sans danger ; l'extinction d'une batterie en feu relève des secours.</li>
        </ul>
        <h3>Liquides inflammables &amp; points chauds</h3>
        <p>Stocker les liquides inflammables à l'écart des sources de chaleur ; les travaux par <strong>point chaud</strong> (soudage, meulage) imposent un <strong>permis de feu</strong> et une surveillance après travaux.</p>`,
        vo:`Certains feux exigent des réflexes particuliers. Pour un feu d'origine électrique, on coupe le courant si c'est possible, puis on utilise un extincteur au dioxyde de carbone ou à poudre ; jamais d'eau en jet sur un appareil sous tension, à cause du risque d'électrisation. Les batteries lithium-ion, présentes dans les téléphones, les ordinateurs, les vélos et les trottinettes, peuvent partir en emballement thermique lorsqu'elles sont endommagées ou en surcharge : chaleur intense, flammes, projections et fumées toxiques, avec un feu qui se réactive facilement. On ne recharge jamais sans surveillance ni sur un matériel abîmé ; en cas de départ de feu, on alerte et on évacue, l'extinction relevant des secours. Enfin, les liquides inflammables se stockent à l'écart des sources de chaleur, et les travaux par point chaud, comme le soudage ou le meulage, imposent un permis de feu et une surveillance après travaux.`,
        callouts:[{type:"danger",title:"Batterie lithium en feu",text:"Emballement thermique : flammes et fumées toxiques, réactivation possible. On alerte, on évacue — l'extinction relève des secours."},
          {type:"key",title:"Feu électrique",text:"Couper le courant, extincteur CO₂ ou poudre, jamais d'eau en jet sous tension."}] }
    ],
    quiz:[
      {q:"À quoi sert un déclencheur manuel (boîtier rouge) ?",opts:["À appeler l'ascenseur","À permettre à toute personne de donner l'alarme","À éteindre le feu","À couper l'électricité"],a:1,ex:"Le déclencheur manuel permet à chacun de déclencher l'alarme d'évacuation dès qu'il découvre un feu, sans attendre la détection automatique."},
      {q:"Au déclenchement de l'alarme sonore, il faut…",opts:["attendre de voir le feu","évacuer immédiatement","continuer à travailler","ouvrir les fenêtres"],a:1,ex:"L'alarme ordonne l'évacuation : on quitte les lieux immédiatement, sans chercher à confirmer la présence de flammes."},
      {q:"À quoi sert le compartimentage ?",opts:["À éclairer les couloirs","À limiter la propagation du feu et des fumées","À déclencher les sprinkleurs","À ventiler les bureaux"],a:1,ex:"Parois et portes coupe-feu cloisonnent le bâtiment pour freiner la propagation du feu et des fumées."},
      {q:"Une porte coupe-feu doit…",opts:["être calée en position ouverte","pouvoir se fermer librement, jamais calée","être verrouillée en permanence","rester ouverte la nuit"],a:1,ex:"Calée ouverte, elle ne joue plus son rôle : une porte coupe-feu doit pouvoir se fermer pour bloquer feu et fumées."},
      {q:"Les BAES (éclairage de sécurité) servent à…",opts:["détecter la fumée","baliser les issues en cas de coupure de courant","déclencher l'alarme","fermer les portes"],a:1,ex:"Les blocs autonomes d'éclairage de sécurité éclairent et balisent les cheminements d'évacuation même sans courant."},
      {q:"Face à une batterie lithium-ion en feu, le bon réflexe est…",opts:["l'arroser abondamment et continuer à travailler","alerter, évacuer et laisser l'extinction aux secours","la couvrir et la ranger dans un tiroir","la prendre à mains nues pour la sortir"],a:1,ex:"L'emballement thermique est violent et se réactive : on alerte et on évacue, l'extinction relève des secours."}
    ] },

  { id:"m5", icon:"📢", title:"Conduite à tenir & alerte", desc:"Donner l'alarme, alerter les secours, attaquer un feu en sécurité.", duration:"35 min",
    lessons:[
      { id:"m5l1", title:"Donner l'alarme et alerter les secours", duration:"17 min",
        body:`
        <p>Découvrir un feu impose deux actions immédiates et distinctes : <strong>l'alarme</strong> et <strong>l'alerte</strong>.</p>
        <ul>
          <li><strong>L'alarme</strong> est <strong>interne</strong> : elle prévient les occupants pour qu'ils <strong>évacuent</strong> (déclencheur manuel, signal sonore).</li>
          <li><strong>L'alerte</strong> est <strong>externe</strong> : elle prévient les <strong>secours</strong>.</li>
        </ul>
        <h3>Les numéros d'urgence</h3>
        <ul>
          <li><strong>18</strong> — sapeurs-pompiers</li>
          <li><strong>112</strong> — numéro d'urgence européen (depuis n'importe quel téléphone)</li>
          <li><strong>114</strong> — par SMS, pour les personnes sourdes ou malentendantes</li>
        </ul>
        <h3>Le message d'alerte</h3>
        <p>Transmettre clairement : <strong>qui</strong> vous êtes, l'<strong>adresse précise</strong>, la <strong>nature</strong> du sinistre, les <strong>victimes</strong> éventuelles et les <strong>risques</strong> particuliers. <strong>Ne raccrochez jamais le premier</strong> : laissez l'opérateur terminer.</p>`,
        vo:`Découvrir un feu impose deux actions immédiates et distinctes : l'alarme et l'alerte. L'alarme est interne : elle prévient les occupants pour qu'ils évacuent, par un déclencheur manuel ou un signal sonore. L'alerte est externe : elle prévient les secours. Les numéros à connaître : le 18 pour les sapeurs-pompiers, le 112, numéro d'urgence européen depuis n'importe quel téléphone, et le 114 par SMS pour les personnes sourdes ou malentendantes. Dans votre message d'alerte, indiquez qui vous êtes, l'adresse précise, la nature du sinistre, les victimes éventuelles et les risques particuliers. Et surtout, ne raccrochez jamais le premier : laissez l'opérateur terminer.`,
        callouts:[{type:"reg",title:"Numéros d'urgence",text:"18 sapeurs-pompiers · 112 urgence européenne · 114 par SMS pour personnes sourdes/malentendantes."},
          {type:"key",title:"À retenir",text:"Alarme = faire évacuer (interne). Alerte = prévenir les secours (externe). Ne pas raccrocher le premier."}] },
      { id:"m5l2", title:"Attaquer un feu en sécurité (EPI)", duration:"18 min",
        body:`
        <p>L'équipier de première intervention peut tenter d'éteindre un <strong>départ de feu</strong>, mais seulement <strong>après avoir donné l'alarme</strong> et <strong>sans jamais se mettre en danger</strong>.</p>
        <h3>Les règles d'or</h3>
        <ul>
          <li><strong>Donner l'alarme d'abord</strong> et faire alerter les secours.</li>
          <li>Prendre l'<strong>extincteur adapté à la classe</strong> de feu.</li>
          <li>Attaquer <strong>dos à une issue</strong>, pour ne jamais se laisser couper la retraite.</li>
          <li>Rester à <strong>1 à 2 m</strong>, viser la <strong>base</strong> des flammes, balayer.</li>
          <li>Ne pas traverser les fumées ; ne pas ouvrir une porte chaude.</li>
          <li><strong>Si le feu dépasse</strong> un extincteur ou que les fumées gênent : <strong>renoncer et évacuer</strong>.</li>
        </ul>
        <p>Un EPI ne combat qu'un feu <strong>naissant</strong> : sa sécurité passe toujours avant le matériel.</p>`,
        vo:`L'équipier de première intervention peut tenter d'éteindre un départ de feu, mais seulement après avoir donné l'alarme, et sans jamais se mettre en danger. Les règles d'or : donner l'alarme d'abord et faire alerter les secours ; prendre l'extincteur adapté à la classe de feu ; attaquer dos à une issue, pour ne jamais se laisser couper la retraite ; rester à un ou deux mètres, viser la base des flammes et balayer ; ne pas traverser les fumées et ne pas ouvrir une porte chaude. Et surtout : si le feu dépasse la capacité d'un extincteur ou que les fumées gênent, il faut renoncer et évacuer. Un équipier ne combat qu'un feu naissant : sa sécurité passe avant le matériel.`,
        callouts:[{type:"danger",title:"Porte chaude",text:"Avant d'ouvrir une porte, tester sa chaleur du dos de la main : si elle est chaude, ne pas l'ouvrir — le feu est derrière."},
          {type:"key",title:"À retenir",text:"Alarme d'abord · extincteur adapté · dos à l'issue · viser la base · renoncer et évacuer si ça dépasse."}] }
    ],
    quiz:[
      {q:"Quelle est la différence entre l'alarme et l'alerte ?",opts:["Il n'y en a pas","Alarme = faire évacuer (interne) ; alerte = prévenir les secours (externe)","Alarme = pompiers ; alerte = police","Alarme = de jour ; alerte = de nuit"],a:1,ex:"L'alarme est interne (faire évacuer les occupants), l'alerte est externe (prévenir les secours)."},
      {q:"Quel numéro pour joindre les sapeurs-pompiers ?",opts:["15","17","18 (ou 112)","114 uniquement"],a:2,ex:"Le 18 pour les pompiers ; le 112 est le numéro d'urgence européen. Le 114 est dédié aux personnes sourdes ou malentendantes (par SMS)."},
      {q:"Lors de l'appel aux secours, il faut…",opts:["raccrocher vite pour libérer la ligne","donner l'adresse précise, la nature, les victimes, et ne pas raccrocher le premier","donner seulement son nom","attendre qu'ils rappellent"],a:1,ex:"On transmet un message complet (qui, où, quoi, victimes, risques) et on laisse l'opérateur terminer : ne jamais raccrocher le premier."},
      {q:"Avant d'attaquer un feu, l'EPI doit d'abord…",opts:["donner l'alarme","prendre une photo","fermer les fenêtres","prévenir ses collègues par e-mail"],a:0,ex:"On donne l'alarme (et on fait alerter les secours) avant toute tentative d'extinction."},
      {q:"Si le feu dépasse la capacité de l'extincteur, l'EPI doit…",opts:["insister coûte que coûte","renoncer et évacuer","aller chercher de l'eau","ouvrir les portes pour aérer"],a:1,ex:"La sécurité avant tout : si le feu dépasse ou que les fumées gênent, on renonce et on évacue. Un EPI ne combat qu'un feu naissant."}
    ] },

  { id:"m6", icon:"🚪", title:"Évacuation & prévention", desc:"Évacuer, les rôles guide-file/serre-file, et la prévention au quotidien.", duration:"45 min",
    lessons:[
      { id:"m6l1", title:"L'évacuation et le point de rassemblement", duration:"15 min",
        body:`
        <p>Au signal d'évacuation, chacun quitte les lieux <strong>sans panique</strong> et rejoint un lieu sûr.</p>
        <h3>Les bons réflexes</h3>
        <ul>
          <li>Cesser toute activité ; ne pas perdre de temps à rassembler ses affaires.</li>
          <li><strong>Ne jamais prendre l'ascenseur</strong> : emprunter les escaliers.</li>
          <li><strong>Fermer les portes</strong> derrière soi (sans les verrouiller) pour freiner le feu et les fumées.</li>
          <li>En présence de fumées, <strong>se baisser</strong> : l'air respirable est près du sol.</li>
          <li>Rejoindre le <strong>point de rassemblement</strong> et <strong>y rester</strong>.</li>
        </ul>`,
        vo:`Au signal d'évacuation, chacun quitte les lieux sans panique et rejoint un lieu sûr. Les bons réflexes : cesser toute activité sans perdre de temps à rassembler ses affaires ; ne jamais prendre l'ascenseur, mais les escaliers ; fermer les portes derrière soi, sans les verrouiller, pour freiner le feu et les fumées ; en présence de fumées, se baisser, car l'air respirable est près du sol ; enfin, rejoindre le point de rassemblement et y rester. Et la règle absolue : une fois dehors, on ne retourne jamais à l'intérieur.`,
        callouts:[{type:"danger",title:"Ne jamais revenir",text:"Une fois dehors, on ne retourne jamais à l'intérieur, même pour un objet ou un collègue : on signale les absents aux secours."},
          {type:"key",title:"À retenir",text:"Escaliers (jamais l'ascenseur) · fermer les portes · se baisser sous les fumées · point de rassemblement."}] },
      { id:"m6l2", title:"Les rôles : guide-file et serre-file", duration:"13 min",
        body:`
        <p>L'évacuation est organisée par des personnes désignées et formées.</p>
        <ul>
          <li><strong>Le guide-file :</strong> ouvre la marche et <strong>guide</strong> le groupe vers l'issue et le cheminement les plus sûrs.</li>
          <li><strong>Le serre-file :</strong> ferme la marche, <strong>vérifie que personne ne reste</strong> (bureaux, sanitaires, locaux), ferme les portes et <strong>signale les absents</strong>.</li>
          <li><strong>Le responsable d'évacuation :</strong> coordonne, <strong>recense les présents</strong> au point de rassemblement et fait le lien avec les secours.</li>
        </ul>
        <p>Ces rôles complémentaires garantissent que <strong>personne n'est oublié</strong>.</p>`,
        vo:`L'évacuation est organisée par des personnes désignées et formées. Le guide-file ouvre la marche et guide le groupe vers l'issue et le cheminement les plus sûrs. Le serre-file ferme la marche : il vérifie que personne ne reste dans les bureaux, les sanitaires ou les locaux, ferme les portes et signale les absents. Le responsable d'évacuation coordonne l'ensemble, recense les présents au point de rassemblement et fait le lien avec les secours. Ces rôles complémentaires garantissent que personne n'est oublié.`,
        callouts:[{type:"key",title:"À retenir",text:"Guide-file devant (il guide) · serre-file derrière (il vérifie que tout le monde est sorti et ferme les portes)."}] },
      { id:"m6l3", title:"La prévention au quotidien & les obligations", duration:"17 min",
        body:`
        <p>La meilleure intervention reste celle qu'on n'a pas à faire : la prévention au quotidien évite la majorité des départs de feu.</p>
        <h3>Au quotidien</h3>
        <ul>
          <li>Ordre et propreté ; ne pas accumuler de combustibles ; ne pas <strong>encombrer les issues</strong>.</li>
          <li>Respecter les interdictions de fumer ; surveiller les appareils électriques et les multiprises.</li>
          <li><strong>Permis de feu</strong> obligatoire pour les travaux par point chaud (soudage, meulage), avec surveillance après travaux.</li>
        </ul>
        <h3>Les obligations de l'employeur</h3>
        <ul>
          <li><strong>Code du travail :</strong> moyens d'extinction adaptés, consignes affichées, <strong>formation</strong> du personnel.</li>
          <li><strong>Exercices d'évacuation</strong> périodiques (au moins tous les 6 mois dans de nombreux établissements).</li>
          <li><strong>Vérification</strong> régulière des extincteurs et du SSI ; tenue du <strong>registre de sécurité</strong>.</li>
        </ul>`,
        vo:`La meilleure intervention reste celle qu'on n'a pas à faire : la prévention au quotidien évite la majorité des départs de feu. Au quotidien : maintenir l'ordre et la propreté, ne pas accumuler de combustibles, ne jamais encombrer les issues, respecter les interdictions de fumer et surveiller les appareils électriques. Les travaux par point chaud, comme le soudage ou le meulage, exigent un permis de feu et une surveillance après travaux. Côté obligations, le Code du travail impose des moyens d'extinction adaptés, des consignes affichées, la formation du personnel, des exercices d'évacuation périodiques, la vérification régulière des extincteurs et du SSI, et la tenue d'un registre de sécurité.`,
        callouts:[{type:"reg",title:"Cadre réglementaire",text:"Code du travail : moyens de secours, consignes affichées, formation, exercices d'évacuation périodiques et registre de sécurité à jour."},
          {type:"key",title:"À retenir",text:"Prévenir = ordre et propreté, issues dégagées, permis de feu, vérifications et exercices réguliers."}] }
    ],
    quiz:[
      {q:"Pendant une évacuation, on doit…",opts:["prendre l'ascenseur pour aller plus vite","emprunter les escaliers, jamais l'ascenseur","rassembler ses affaires d'abord","attendre les consignes par e-mail"],a:1,ex:"Jamais l'ascenseur (risque de blocage et de piège à fumées) : on emprunte les escaliers."},
      {q:"Quel est le rôle du serre-file ?",opts:["Guider le groupe vers la sortie","Fermer la marche et vérifier que personne ne reste","Appeler les pompiers","Compter les voitures du parking"],a:1,ex:"Le serre-file ferme la marche, vérifie bureaux et sanitaires, ferme les portes et signale les absents."},
      {q:"Une fois au point de rassemblement, il faut…",opts:["retourner chercher ses collègues","y rester et ne jamais revenir en arrière","rentrer chez soi","reprendre le travail"],a:1,ex:"On reste au point de rassemblement pour être recensé ; on ne retourne jamais à l'intérieur."},
      {q:"Les travaux par point chaud (soudage, meulage) nécessitent…",opts:["aucune précaution","un permis de feu et une surveillance après travaux","seulement des gants","de travailler la nuit"],a:1,ex:"Le permis de feu encadre ces travaux à fort risque d'inflammation, avec une surveillance maintenue après l'opération."},
      {q:"Face à des fumées pendant l'évacuation, le bon réflexe est…",opts:["courir debout","se baisser et fermer les portes derrière soi","ouvrir grand les fenêtres","retenir sa respiration et accélérer sans se baisser"],a:1,ex:"L'air respirable est près du sol : on se baisse, et on ferme les portes derrière soi pour ralentir les fumées."}
    ] }
]};

const STORE_KEY="incendie_epi_progress_v1";
let state=loadState();
function shuffleQuiz(src){return src.map(function(q){var idx=q.opts.map(function(_,i){return i;});for(var i=idx.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=idx[i];idx[i]=idx[j];idx[j]=t;}return {q:q.q,ex:q.ex,opts:idx.map(function(i){return q.opts[i];}),a:idx.indexOf(q.a)};});}
function loadState(){try{const s=JSON.parse(localStorage.getItem(STORE_KEY))||{};return{done:s.done||{},quiz:s.quiz||{},viewed:s.viewed||{},name:s.name||"",fs:s.fs||1,dark:!!s.dark,tts:s.tts!==false};}catch(e){return{done:{},quiz:{},viewed:{},name:"",fs:1,dark:false,tts:true};}}
function saveState(){localStorage.setItem(STORE_KEY,JSON.stringify(state));}

/* ---- Voix off — sélection automatique des voix neuronales (Edge/Chrome en ligne), plus naturelles ---- */
const TTS_PREF_KEY="mcr_tts_pref";
function ttsPref(){try{return JSON.parse(localStorage.getItem(TTS_PREF_KEY))||{};}catch(e){return{};}}
function ttsSavePref(p){localStorage.setItem(TTS_PREF_KEY,JSON.stringify(p));}
const TTS={supported:('speechSynthesis'in window),voices:[],voice:null,rate:0.95,chunks:[],i:0,state:'idle',onstate:null,
  score(v){let s=0;const n=(v.name||'').toLowerCase();if(/fr[-_]?fr/i.test(v.lang))s+=20;else if(/^fr/i.test(v.lang))s+=8;if(n.includes('natural'))s+=100;if(n.includes('online'))s+=40;if(/(denise|vivienne|henri|remy|eloise|charline|yves|brigitte)/.test(n))s+=20;if(v.localService===false)s+=15;return s;},
  refresh(){const all=window.speechSynthesis.getVoices();const fr=all.filter(v=>/^fr/i.test(v.lang));this.voices=(fr.length?fr:all).slice().sort((a,b)=>this.score(b)-this.score(a));const p=ttsPref();this.voice=(p.voice&&this.voices.find(v=>v.name===p.voice))||this.voices[0]||null;this.rate=p.rate||0.95;},
  setVoice(name){this.voice=this.voices.find(v=>v.name===name)||this.voice;const p=ttsPref();p.voice=name;ttsSavePref(p);},
  setRate(r){this.rate=+r;const p=ttsPref();p.rate=this.rate;ttsSavePref(p);},
  _next(){if(this.i>=this.chunks.length){this.state='idle';this.onstate&&this.onstate('idle');return;}const u=new SpeechSynthesisUtterance(this.chunks[this.i]);u.lang=(this.voice&&this.voice.lang)||'fr-FR';if(this.voice)u.voice=this.voice;u.rate=this.rate;u.pitch=1;u.onend=()=>{if(this.state==='playing'){this.i++;this._next();}};u.onerror=()=>{if(this.state==='playing'){this.i++;this._next();}};window.speechSynthesis.speak(u);},
  play(text,onstate){this.stop();this.onstate=onstate;this.chunks=(text.replace(/\s+/g,' ').match(/[^.!?…:;]+[.!?…:;]*/g)||[text]).map(s=>s.trim()).filter(Boolean);this.i=0;this.state='playing';this.onstate&&this.onstate('playing');this._next();},
  pause(){if(this.state==='playing'){this.state='paused';window.speechSynthesis.pause();this.onstate&&this.onstate('paused');}},
  resume(){if(this.state==='paused'){this.state='playing';window.speechSynthesis.resume();this.onstate&&this.onstate('playing');}},
  stop(){this.state='idle';this.chunks=[];this.i=0;if(this.supported)window.speechSynthesis.cancel();}
};
if(TTS.supported){TTS.refresh();window.speechSynthesis.onvoiceschanged=()=>{TTS.refresh();if(typeof refreshVoiceUI==='function')refreshVoiceUI();};}
function lessonNarration(o){if(o.vo)return o.vo;const d=document.createElement('div');d.innerHTML=o.body;let x=o.title+'. '+d.textContent.replace(/\s+/g,' ').trim();(o.callouts||[]).forEach(c=>{x+=' '+c.title+'. '+c.text;});return x;}
function ttsUpdateBtn(s){const b=document.getElementById('ttsBtn');if(!b)return;b.classList.toggle('on',s!=='idle');b.innerHTML=s==='playing'?'⏸ Pause':(s==='paused'?'▶ Reprendre':'🔊 Écouter le cours');}
function refreshVoiceUI(){const vs=document.getElementById('ttsVoice');if(vs){vs.innerHTML=TTS.voices.map(v=>{const label=v.name.replace('Microsoft ','').replace(/ - .*$/,'').replace(/ \(.*\)$/,'');return '<option value="'+v.name.replace(/"/g,'&quot;')+'"'+(TTS.voice&&v.name===TTS.voice.name?' selected':'')+'>'+label+(/natural|online/i.test(v.name)?' ✨':'')+'</option>';}).join('');}const rs=document.getElementById('ttsRate');if(rs)rs.value=String(TTS.rate);const h=document.getElementById('ttsHint');if(h){const good=TTS.voice&&/natural|online/i.test(TTS.voice.name);h.innerHTML=good?'✨ Voix neuronale active':'Astuce : ouvrir dans Edge (en ligne) pour une voix plus naturelle';}}
function wireTts(getText){const tb=document.getElementById('ttsBtn');if(tb)tb.onclick=()=>{if(TTS.state==='idle')TTS.play(getText(),ttsUpdateBtn);else if(TTS.state==='playing')TTS.pause();else TTS.resume();};refreshVoiceUI();const vs=document.getElementById('ttsVoice');if(vs)vs.onchange=()=>{TTS.setVoice(vs.value);if(TTS.state!=='idle'){TTS.stop();ttsUpdateBtn('idle');}};const rs=document.getElementById('ttsRate');if(rs)rs.onchange=()=>{TTS.setRate(rs.value);if(TTS.state!=='idle'){TTS.stop();ttsUpdateBtn('idle');}};}

/* ---- structure de navigation ---- */
const STEPS=[];
COURSE.modules.forEach(m=>{m.lessons.forEach(l=>STEPS.push({type:'lesson',mid:m.id,id:l.id}));STEPS.push({type:'quiz',mid:m.id,id:m.id+'q'});});
let current="home";
function moduleOf(mid){return COURSE.modules.find(m=>m.id===mid);}
function moduleIndex(mid){return COURSE.modules.findIndex(m=>m.id===mid);}
function findLesson(id){for(const m of COURSE.modules){const l=m.lessons.find(x=>x.id===id);if(l)return{m,l};}return null;}
function quizModule(id){return COURSE.modules.find(m=>m.id+'q'===id);}
function isQuizId(id){return COURSE.modules.some(m=>m.id+'q'===id);}
function moduleDone(mid){return !!state.done[mid];}
function moduleUnlocked(mid){const i=moduleIndex(mid);return i<=0?true:moduleDone(COURSE.modules[i-1].id);}
function allComplete(){return COURSE.modules.every(m=>moduleDone(m.id));}
function stepIndex(id){return STEPS.findIndex(s=>s.id===id);}
function nextStep(id){const i=stepIndex(id);return i>=0&&i<STEPS.length-1?STEPS[i+1]:null;}
function prevStep(id){const i=stepIndex(id);return i>0?STEPS[i-1]:null;}
function totalSteps(){let n=0;COURSE.modules.forEach(m=>n+=m.lessons.length+1);return n;}
function doneSteps(){let n=0;COURSE.modules.forEach(m=>{m.lessons.forEach(l=>{if(state.viewed[l.id])n++;});if(moduleDone(m.id))n++;});return n;}
function globalProgress(){return Math.round(doneSteps()/totalSteps()*100);}
