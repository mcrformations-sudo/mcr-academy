<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guide-File, Serre-File & Mission Évacuation — E-learning MCR Formations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#15803d;
  --accent-2:#22c55e;
  --accent-3:#4ade80;
  --grad:linear-gradient(120deg,#0f5132 0%,#15803d 50%,#22c55e 100%);
  --grad-soft:linear-gradient(120deg,#eafaef 0%,#f0fdf4 55%,#f3fdf6 100%);
  --ink:#102a1c;
  --ink-2:#3f5a49;
  --muted:#7e988a;
  --line:#dcefe2;
  --line-2:#edf8f0;
  --ok:#15a05f;
  --bad:#e23b2e;
  --warn:#f59e0b;
  --r:22px;
  --r-sm:14px;
  --shadow-sm:0 2px 8px rgba(20,120,60,.08);
  --shadow:0 12px 34px -16px rgba(15,110,55,.28);
  --shadow-lg:0 30px 70px -28px rgba(15,110,55,.42);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--ink);min-height:100vh;
  background:
    radial-gradient(1100px 620px at 88% -8%,rgba(255,122,61,.12),transparent 60%),
    radial-gradient(960px 600px at 4% 4%,rgba(225,29,42,.10),transparent 58%),
    radial-gradient(700px 500px at 50% 110%,rgba(255,122,61,.07),transparent 60%),
    #f6fdf9;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.app{display:grid;grid-template-columns:312px 1fr;min-height:100vh;gap:0}

.sidebar{background:rgba(255,255,255,.82);backdrop-filter:blur(14px);border-right:1px solid var(--line);
  padding:24px 18px;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:40}
.brand{display:flex;align-items:center;gap:13px;padding:0 6px 4px}
.brand .logo{width:50px;height:auto;flex:none;filter:drop-shadow(0 6px 14px rgba(180,40,25,.22))}
.brand h1{font-size:14.5px;font-weight:800;line-height:1.15;color:var(--ink)}
.brand p{font-size:11px;color:var(--accent);margin-top:3px;font-weight:700;letter-spacing:.3px}
.ring-wrap{display:flex;align-items:center;gap:14px;background:var(--grad-soft);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px;margin:18px 6px}
.ring{position:relative;width:58px;height:58px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .lbl{position:absolute;inset:0;display:grid;place-items:center;font-size:14px;font-weight:800;color:var(--accent)}
.ring-wrap .txt .k{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:700}
.ring-wrap .txt .v{font-size:13px;font-weight:700;color:var(--ink);margin-top:2px}
.nav{margin-top:6px}
.nav .mod-h{display:flex;align-items:center;gap:10px;padding:16px 8px 6px;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.nav .mod-h .num{width:20px;height:20px;border-radius:7px;background:var(--grad);color:#fff;display:grid;place-items:center;font-size:11px;flex:none;font-weight:800}
.nav .mod-h.locked{opacity:.5}
.nav .mod-h.locked .num{background:#c8e0d1}
.nav .t{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:9px 10px;border-radius:11px;color:var(--ink-2);font-size:12.5px;font-weight:600;transition:.16s;margin-bottom:2px}
.nav .t:hover{background:#ecfdf2;color:var(--ink)}
.nav .t.active{background:var(--grad);color:#fff;box-shadow:0 8px 22px -8px rgba(225,29,42,.5);font-weight:700}
.nav .t.quiz{font-weight:700;color:var(--accent)}
.nav .t.quiz.active{color:#fff}
.nav .t.locked{opacity:.42;cursor:not-allowed}
.nav .t.locked:hover{background:none;color:var(--ink-2)}
.nav .t .dot{width:18px;height:18px;border-radius:50%;border:2px solid #c9e7d4;flex:none;display:grid;place-items:center;font-size:9px;color:#fff;transition:.16s}
.nav .t.done .dot{background:var(--accent);border-color:var(--accent)}
.nav .t.active .dot{border-color:rgba(255,255,255,.6)}
.nav .t.active.done .dot{background:#fff;color:var(--accent);border-color:#fff}
.nav .t .lk{font-size:11px;margin-left:auto}
.reset{margin:16px 6px 6px;width:calc(100% - 12px);padding:10px;border-radius:11px;font-size:12px;font-weight:600;color:var(--muted);background:#f2faf5;border:1px solid var(--line)}
.reset:hover{color:var(--bad);border-color:#c4f6d6;background:#f4fff8}

.menu-btn{display:none;position:fixed;top:16px;left:16px;z-index:60;width:46px;height:46px;border-radius:13px;background:#fff;color:var(--accent);font-size:20px;align-items:center;justify-content:center;box-shadow:var(--shadow);border:1px solid var(--line)}
.scrim{display:none;position:fixed;inset:0;background:rgba(42,23,20,.45);z-index:35;backdrop-filter:blur(2px)}

.main{padding:40px 5vw;max-width:980px;margin:0 auto;width:100%}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.crumb{font-size:12px;color:var(--ink-2);font-weight:700}
.crumb b{color:var(--accent)}
.pill{font-size:11.5px;font-weight:800;padding:7px 14px;border-radius:99px;background:#fff;border:1px solid var(--line);color:var(--accent);box-shadow:var(--shadow-sm)}
.pill.q{background:var(--grad);color:#fff;border:none;box-shadow:0 0 16px rgba(225,29,42,.4)}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:40px 44px}
h2.title{font-size:29px;font-weight:800;letter-spacing:-.6px;line-height:1.14;margin-bottom:8px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 14px rgba(225,29,42,.26))}
.subtitle{color:var(--ink-2);font-size:14px;margin-bottom:24px;font-weight:600}
.narrate-bar{display:flex;align-items:center;gap:14px;margin:0 0 22px;flex-wrap:wrap}
.narrate-bar .narr{padding:11px 20px;font-size:13.5px}
.narrate-bar .narr.on{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 0 16px rgba(225,29,42,.4)}
.narr-hint{font-size:12px;color:var(--muted);font-weight:600}
.narr-sel{font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink-2);background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 10px;max-width:200px;cursor:pointer}
.narr-sel:focus{outline:none;border-color:var(--accent)}
.lesson p{font-size:15.5px;line-height:1.8;color:#354a3d;margin:0 0 16px}
.lesson h3{font-size:17.5px;font-weight:800;margin:28px 0 11px;color:var(--ink);letter-spacing:-.2px}
.lesson ul{margin:0 0 18px;padding:0;list-style:none}
.lesson ul li{position:relative;padding:7px 0 7px 30px;font-size:15px;line-height:1.6;color:#354a3d}
.lesson ul li::before{content:"";position:absolute;left:2px;top:13px;width:9px;height:9px;border-radius:50%;background:var(--grad)}
.lesson strong{color:var(--ink);font-weight:700}
.lesson table{width:100%;border-collapse:collapse;margin:20px 0;font-size:13px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.lesson th,.lesson td{border:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:top;line-height:1.5}
.lesson th{background:var(--grad-soft);font-weight:800;color:var(--ink);font-size:11.5px;text-transform:uppercase;letter-spacing:.3px}
.lesson td{color:#354a3d}
.lesson tr:nth-child(even) td{background:#f6fdf9}
.lesson td strong{color:var(--accent)}
.callout{border-radius:var(--r-sm);padding:17px 20px 17px 22px;margin:22px 0;border:1px solid var(--line);background:#f8fffb;position:relative;overflow:hidden}
.callout::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px}
.callout .cot{font-size:11px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.callout p{font-size:13.5px;line-height:1.6;margin:0;color:#506b5a}
.callout.reg{background:#ebfdf2}.callout.reg::before{background:linear-gradient(180deg,#1de165,#3dff84)}.callout.reg .cot{color:#15c054}
.callout.key{background:#eefaf2}.callout.key::before{background:linear-gradient(180deg,#1cb56c,#15a05f)}.callout.key .cot{color:#0f7a4c}
.callout.danger{background:#eafdf1}.callout.danger::before{background:linear-gradient(180deg,#e23b2e,#0fb34b)}.callout.danger .cot{color:#1cb353}
.defbox{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:24px 0}
.defbox .d{background:var(--grad-soft);border:1px solid var(--line);border-radius:var(--r-sm);padding:18px}
.defbox .d h4{font-size:13px;color:var(--accent);font-weight:800;margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px}
.defbox .d p{font-size:13px;line-height:1.55;color:#506b5a;margin:0}

.nav-btns{display:flex;justify-content:space-between;align-items:center;margin-top:28px;gap:12px}
.btn{display:inline-flex;align-items:center;gap:9px;padding:13px 24px;border-radius:14px;font-size:14px;font-weight:700;transition:.18s}
.btn.primary{background:var(--grad);color:#fff;box-shadow:0 14px 28px -12px rgba(225,29,42,.6),0 0 18px rgba(255,122,61,.32)}
.btn.primary:hover{transform:translateY(-2px);box-shadow:0 18px 36px -12px rgba(225,29,42,.7),0 0 24px rgba(255,122,61,.42)}
.btn.ghost{background:#ecf8f0;color:var(--ink-2);border:1px solid var(--line)}
.btn.ghost:hover{color:var(--ink);background:#e2f2e8}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none}

.quiz-q{margin-bottom:24px}
.quiz-q .qn{font-size:11px;font-weight:800;color:var(--accent);letter-spacing:.6px;text-transform:uppercase}
.quiz-q .qt{font-size:16.5px;font-weight:800;margin:7px 0 14px;line-height:1.4}
.opt{display:flex;align-items:center;gap:14px;padding:14px 17px;border:1.5px solid var(--line);border-radius:13px;margin-bottom:10px;font-size:14.5px;transition:.15s;background:#fff;width:100%;text-align:left;font-weight:500}
.opt:hover{border-color:var(--accent);background:#f4fff8;transform:translateX(2px)}
.opt .mk{width:23px;height:23px;border-radius:7px;border:2px solid #c8e2d2;flex:none;display:grid;place-items:center;font-size:12px;color:#fff;transition:.15s;font-weight:800}
.opt.sel{border-color:var(--accent);background:#ecfdf2}.opt.sel .mk{background:var(--accent);border-color:var(--accent)}
.opt.correct{border-color:var(--ok);background:#ecfdf3}.opt.correct .mk{background:var(--ok);border-color:var(--ok)}
.opt.wrong{border-color:var(--bad);background:#f1fef6}.opt.wrong .mk{background:var(--bad);border-color:var(--bad)}
.opt.disabled{pointer-events:none}
.explain{font-size:13px;color:#506b5a;background:var(--grad-soft);border-radius:11px;padding:12px 15px;margin-top:2px;line-height:1.6;border:1px solid var(--line)}
.result{text-align:center;padding:14px 0 22px}
.result .ring-big{width:118px;height:118px;margin:0 auto 14px;position:relative}
.result .ring-big .lbl{position:absolute;inset:0;display:grid;place-items:center;font-size:29px;font-weight:800}
.result .msg{font-size:15px;color:var(--ink-2);max-width:460px;margin:0 auto;line-height:1.55;font-weight:600}
.result .msg.pass b{color:var(--ok)}.result .msg.fail b{color:var(--bad)}

.hero{background:linear-gradient(135deg,#0d1c12 0%,#102e1b 52%,#0c3d1e 100%);color:#fff;border-radius:28px;padding:46px 44px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-80px;top:-80px;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(255,122,61,.26),transparent 70%)}
.hero::before{content:"";position:absolute;right:90px;bottom:-100px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(225,29,42,.24),transparent 70%)}
.hero .hlogo{width:64px;height:auto;margin-bottom:18px;position:relative;z-index:1;filter:drop-shadow(0 6px 18px rgba(255,122,61,.5))}
.hero .tag{font-size:11.5px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:#a6ffc7;background:rgba(255,122,61,.18);display:inline-block;padding:6px 13px;border-radius:99px;position:relative;z-index:1;border:1px solid rgba(255,122,61,.32)}
.hero h2{font-size:36px;font-weight:800;letter-spacing:-1px;margin:16px 0 12px;line-height:1.08;max-width:640px;position:relative;z-index:1;text-shadow:0 0 24px rgba(255,90,40,.55)}
.hero p{font-size:15px;line-height:1.65;opacity:.9;max-width:580px;position:relative;z-index:1}
.hero .meta{display:flex;gap:28px;margin-top:28px;flex-wrap:wrap;position:relative;z-index:1}
.hero .meta .m .v{font-size:23px;font-weight:800;color:#6bffa1;text-shadow:0 0 16px rgba(255,122,61,.5)}
.hero .meta .m .k{font-size:11px;opacity:.78;text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-top:2px}
.sec-h{font-size:14px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:30px 4px 14px}
.grid-mods{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
.modcard{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--shadow);transition:.2s;cursor:pointer;position:relative;overflow:hidden}
.modcard.lk{cursor:not-allowed;opacity:.65}
.modcard:not(.lk):hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:#c2ffd8}
.modcard .ic{width:48px;height:48px;border-radius:14px;background:var(--grad-soft);display:grid;place-items:center;font-size:22px;margin-bottom:14px}
.modcard .mnum{font-size:10.5px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
.modcard h3{font-size:15.5px;font-weight:800;margin:3px 0 7px;letter-spacing:-.2px;line-height:1.25}
.modcard p{font-size:13px;color:var(--ink-2);line-height:1.5;font-weight:500}
.modcard .ft{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-size:11.5px;color:var(--muted);font-weight:700}
.modcard .ft .st.ok{color:var(--ok)}
.modcard .mbar{height:6px;border-radius:99px;background:#e2f3e8;margin-top:11px;overflow:hidden}
.modcard .mbar>i{display:block;height:100%;background:var(--grad);width:0;transition:width .5s ease}

.cert{text-align:center;padding:14px;border:2px solid transparent;background:linear-gradient(#fff,#fff) padding-box,var(--grad) border-box;border-radius:24px}
.cert .clogo{width:90px;height:auto;margin:6px auto 4px;filter:drop-shadow(0 6px 16px rgba(180,40,25,.22))}
.cert h2{font-size:27px;font-weight:800}
.cert .name{font-size:32px;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;margin:16px 0;filter:drop-shadow(0 0 14px rgba(225,29,42,.28))}
.cert input{font-size:16px;padding:11px 16px;border:1.5px solid var(--line);border-radius:12px;text-align:center;width:300px;max-width:90%;margin-bottom:6px;font-family:inherit}
.cert input:focus{outline:none;border-color:var(--accent)}
.cert .meta-cert{display:flex;justify-content:center;gap:26px;flex-wrap:wrap;margin:14px 0 4px;font-size:12px;color:var(--muted);font-weight:700}
.cert .meta-cert b{color:var(--accent);display:block;font-size:14px;margin-top:2px}
.locked-note{display:flex;gap:11px;align-items:center;justify-content:center;color:var(--ink-2);font-size:14.5px;background:var(--grad-soft);border-radius:14px;padding:22px;border:1px dashed #c2ffd8;font-weight:600}

.totop{position:fixed;bottom:26px;right:26px;width:48px;height:48px;border-radius:50%;background:var(--grad);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-lg),0 0 20px rgba(255,122,61,.45);z-index:50;opacity:0;pointer-events:none;transform:translateY(12px);transition:.25s}
.totop.show{opacity:1;pointer-events:auto;transform:translateY(0)}

@media print{.sidebar,.nav-btns,.topbar,.menu-btn,.totop,.narrate-bar{display:none!important}.app{display:block}.main{max-width:100%}}
@media(max-width:900px){
  .app{grid-template-columns:1fr}.menu-btn{display:flex}.main{padding:78px 22px 40px}
  .defbox,.grid-mods{grid-template-columns:1fr}
  .sidebar{position:fixed;top:0;left:0;width:284px;height:100vh;transform:translateX(-104%);transition:transform .28s ease}
  .app.menu-open .sidebar{transform:translateX(0)}.app.menu-open .scrim{display:block}
  .card{padding:28px 22px}.hero{padding:34px 26px}.hero h2{font-size:28px}
  .lesson table{font-size:12px}.lesson th,.lesson td{padding:7px 8px}
}

/* --- Scénario interactif --- */
.scen-choices{display:flex;flex-direction:column;gap:10px;margin:16px 0}
.scen-opt{text-align:left;white-space:normal;line-height:1.5;height:auto;padding:14px 16px;font-weight:600}
.scen-opt.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-2) inset}
.scen-feedback{margin-top:8px}
.scen-retry{font-size:13px;color:var(--ink-2);margin-top:10px;font-style:italic}

/* ===== MCR Confort universel ===== */
#main{zoom:var(--fs,1)}
.cfg-btn{position:fixed;right:18px;bottom:80px;z-index:80;width:54px;height:54px;border-radius:50%;background:var(--accent,#333);color:#fff;font-size:24px;box-shadow:0 10px 26px -6px rgba(0,0,0,.45);border:2px solid #fff;display:flex;align-items:center;justify-content:center;cursor:pointer;animation:cfgpop 2.4s ease-in-out infinite}
@keyframes cfgpop{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.cfg-panel{position:fixed;right:18px;bottom:142px;z-index:81;width:272px;background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:16px;box-shadow:0 24px 60px -18px rgba(0,0,0,.5);padding:14px 16px;display:none;font-family:inherit;color:#222}
.cfg-panel.open{display:block}
.cfg-h{font-weight:800;font-size:14px;margin-bottom:10px}
.cfg-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;font-size:13px;font-weight:600}
.cfg-row+.cfg-row{border-top:1px solid rgba(0,0,0,.08)}
.cfg-fs{display:flex;align-items:center;gap:8px}
.cfg-fs button,.cfg-mini{width:30px;height:30px;border-radius:9px;border:1px solid rgba(0,0,0,.15);background:#fff;font-weight:800;color:var(--accent,#333);cursor:pointer}
.cfg-fs b{min-width:42px;text-align:center;font-size:12px}
.cfg-tog{padding:6px 12px;border-radius:99px;border:1px solid rgba(0,0,0,.15);background:#eee;font-weight:700;font-size:12px;cursor:pointer}
.cfg-tog.on{background:var(--accent,#333);color:#fff;border-color:var(--accent,#333)}
/* mode sombre universel */
html[data-theme="dark"] body{background:#14181d!important;color:#e8edf2!important}
html[data-theme="dark"] .sidebar{background:#161b21!important;border-color:#262c34!important}
html[data-theme="dark"] .card,html[data-theme="dark"] .cfg-panel,html[data-theme="dark"] .pill,html[data-theme="dark"] .opt,html[data-theme="dark"] .menu-btn,html[data-theme="dark"] .totop,html[data-theme="dark"] .narrate-bar,html[data-theme="dark"] .narr-sel{background:#1b2127!important;border-color:#2b323b!important;color:#e8edf2!important}
html[data-theme="dark"] .cfg-panel{color:#e8edf2!important}
html[data-theme="dark"] .cfg-tog{background:#222932!important;color:#cdd6df!important}
html[data-theme="dark"] h1,html[data-theme="dark"] h2,html[data-theme="dark"] h3,html[data-theme="dark"] .title,html[data-theme="dark"] .crumb,html[data-theme="dark"] .nav .t{color:#e8edf2!important}
html[data-theme="dark"] .subtitle,html[data-theme="dark"] p,html[data-theme="dark"] li{color:#b9c3cd!important}
/* voix off */
html[data-tts="off"] .narrate-bar{display:none!important}

/* dark mode : cartes d'accueil des modules */
html[data-theme="dark"] .modcard{background:#1b2127!important;border-color:#2b323b!important}
html[data-theme="dark"] .modcard h3{color:#e8edf2!important}
html[data-theme="dark"] .modcard p,html[data-theme="dark"] .modcard .ft,html[data-theme="dark"] .modcard .mnum{color:#b9c3cd!important}
html[data-theme="dark"] .modcard .mbar{background:#2b323b!important}
html[data-theme="dark"] .defbox,html[data-theme="dark"] .defbox .d{background:#1b2127!important;border-color:#2b323b!important}
html[data-theme="dark"] .callout{background:#222932!important;border-color:#2b323b!important;color:#d7dee6!important}

html[data-theme="dark"] .callout li{color:#dbe3ec!important}

html[data-theme="dark"] .defbox .d{background:#1b2229!important;border-color:#2b323b!important}

html[data-theme="dark"] .defbox .d p{color:#cfd9e3!important}

      { id:"m1l1", title:"Pourquoi et quand évacuer — le cadre légal", duration:"20 min",
        body:`
        <p>Évacuer un bâtiment n'a rien d'instinctif. En situation réelle — incendie, fumées, fuite de gaz, attentat, effondrement — les comportements spontanés sont souvent <strong>dangereux</strong> : on retourne chercher ses affaires, on emprunte l'ascenseur, on se fige, on suit la foule au lieu de suivre le balisage. L'évacuation se <strong>prépare</strong> et s'<strong>organise</strong> : c'est précisément le rôle du guide-file et du serre-file.</p>

        <h3>Ce que dit le Code du travail</h3>
        <p>L'organisation de l'évacuation repose sur une chaîne d'articles, des articles <strong>R4227-28 à R4227-39</strong> du Code du travail.</p>
        <div class="defbox">
          <div class="d"><h4>R4227-28</h4><p>L'employeur prend les mesures nécessaires pour que <em>tout commencement d'incendie</em> puisse être <em>rapidement et efficacement combattu dans l'intérêt du sauvetage des travailleurs</em>. C'est le fondement : protéger les personnes avant les biens.</p></div>
          <div class="d"><h4>R4227-34 à 36</h4><p>Les locaux concernés sont équipés d'un <em>système d'alarme sonore</em>. Le signal sonore d'alarme générale doit être audible partout et reconnaissable de tous : c'est lui qui déclenche l'évacuation.</p></div>
          <div class="d"><h4>R4227-37</h4><p>Une <em>consigne de sécurité incendie</em> est établie et affichée dans les établissements où sont réunies plus de 50 personnes, ainsi que ceux manipulant des matières inflammables.</p></div>
          <div class="d"><h4>R4227-38</h4><p>La consigne désigne notamment, <em>pour chaque local, les personnes chargées de diriger l'évacuation</em> des travailleurs et du public — c'est la base légale des rôles de guide-file et de serre-file — et prévoit les <em>mesures pour les personnes handicapées</em> (espaces d'attente sécurisés).</p></div>
          <div class="d"><h4>R4227-39</h4><p>La consigne prévoit des <em>exercices</em> au cours desquels les travailleurs apprennent à reconnaître le signal d'alarme et à exécuter les manœuvres. Ces exercices ont lieu <em>au moins tous les six mois</em> et sont consignés sur un registre tenu à disposition de l'inspection du travail.</p></div>
        </div>

        <h3>Guide-file et serre-file : des rôles d'organisation</h3>
        <p>Attention à une nuance importante : les termes « guide-file » et « serre-file » ne figurent pas tels quels dans le Code du travail. Ce sont des <strong>fonctions d'organisation</strong>, issues de la culture de sécurité incendie, qui permettent à l'employeur de remplir concrètement son obligation de l'article R4227-38 (« désigner les personnes chargées de diriger l'évacuation »). En clair : la loi impose de désigner des personnes ; le guide-file et le serre-file sont la façon reconnue de le faire.</p>

        <h3>Les trois temps d'une évacuation</h3>
        <table>
          <tr><th>Temps</th><th>Ce qui se passe</th><th>Qui agit</th></tr>
          <tr><td><strong>1. Alarme</strong></td><td>Signal sonore général. Tout le monde s'arrête et se prépare à partir.</td><td>Détection / déclencheur manuel</td></tr>
          <tr><td><strong>2. Évacuation</strong></td><td>Déplacement calme et rapide vers les sorties par les cheminements balisés.</td><td>Guide-file (devant) · Serre-file (derrière)</td></tr>
          <tr><td><strong>3. Rassemblement</strong></td><td>Comptage des présents au point de rassemblement, information des secours.</td><td>Responsable d'évacuation</td></tr>
        </table>`,
        vo:`Évacuer un bâtiment n'a rien d'instinctif. En situation réelle, les comportements spontanés sont souvent dangereux : on retourne chercher ses affaires, on prend l'ascenseur, on se fige. L'évacuation se prépare et s'organise, et c'est tout le rôle du guide-file et du serre-file. Le Code du travail encadre cette organisation à travers les articles R4227-28 à R4227-39. L'article R4227-28 pose le principe : l'employeur prend les mesures pour que tout commencement d'incendie soit rapidement combattu dans l'intérêt du sauvetage des travailleurs. Les articles R4227-34 à 36 imposent un système d'alarme sonore audible et reconnaissable de tous. L'article R4227-37 impose une consigne de sécurité incendie affichée. L'article R4227-38 est central : la consigne désigne, pour chaque local, les personnes chargées de diriger l'évacuation. C'est la base légale du guide-file et du serre-file. Enfin l'article R4227-39 impose des exercices d'évacuation au moins tous les six mois, consignés sur un registre tenu à disposition de l'inspection du travail. Retenez que les termes guide-file et serre-file ne sont pas écrits dans la loi : ce sont les fonctions d'organisation qui permettent de répondre concrètement à l'obligation de désigner les personnes chargées de diriger l'évacuation.`,

      { id:"m1l2", title:"Le Guide-File : chef d'orchestre du déplacement", duration:"20 min",
        body:`
        <p>Le <strong>guide-file ouvre la marche</strong>. C'est lui qui mène le groupe, de l'alarme jusqu'au point de rassemblement, en empruntant l'itinéraire le plus sûr. On le compare souvent à un <strong>chef d'orchestre</strong> : il donne le tempo, la direction, et maintient le calme.</p>

        <h3>Ses missions, dans l'ordre</h3>
        <div class="defbox">
          <div class="d"><h4>1. Donner l'exemple</h4><p>Dès le signal d'alarme, il se lève, annonce clairement « <em>On évacue, suivez-moi, au calme</em> » et se positionne en tête de groupe.</p></div>
          <div class="d"><h4>2. Choisir l'itinéraire</h4><p>Il connaît par cœur le <em>cheminement principal</em> ET l'itinéraire de secours. Si une issue est enfumée ou bloquée, il bascule sans hésiter sur la solution de repli.</p></div>
          <div class="d"><h4>3. Guider et rythmer</h4><p>Il avance d'un pas sûr, ni course ni traîne, en suivant le balisage (blocs verts « sortie de secours »). Il empêche les retours en arrière et les arrêts.</p></div>
          <div class="d"><h4>4. Sécuriser le passage</h4><p>Il signale les obstacles (marche, porte lourde, sol glissant), maintient les portes coupe-feu, et ne laisse personne emprunter l'ascenseur.</p></div>
          <div class="d"><h4>5. Mener au point de rassemblement</h4><p>Il conduit le groupe jusqu'au lieu prévu et le maintient regroupé, à distance du bâtiment, pour faciliter le comptage.</p></div>
        </div>

        <h3>Sa posture</h3>
        <p>Le guide-file est <strong>calme, audible et visible</strong>. La panique est contagieuse : son sang-froid l'est tout autant. Il parle fort mais sans crier, donne des consignes courtes (« on continue », « à droite », « on ne s'arrête pas »). On l'identifie souvent par un <strong>brassard ou un gilet</strong> de couleur.</p>

        <h3>Ce qu'il ne fait jamais</h3>
        <ul>
          <li>Il ne laisse personne <strong>revenir en arrière</strong> chercher un objet.</li>
          <li>Il n'emprunte <strong>jamais l'ascenseur</strong> ni les escaliers mécaniques.</li>
          <li>Il ne force pas un passage manifestement dangereux : il prend l'itinéraire de secours.</li>
        </ul>`,
        vo:`Le guide-file ouvre la marche. C'est lui qui mène le groupe, de l'alarme jusqu'au point de rassemblement, en empruntant l'itinéraire le plus sûr. On le compare à un chef d'orchestre : il donne le tempo, la direction, et maintient le calme. Ses missions, dans l'ordre. D'abord, donner l'exemple : dès l'alarme, il se lève, annonce clairement qu'on évacue et se place en tête. Ensuite, choisir l'itinéraire : il connaît par cœur le cheminement principal et l'itinéraire de secours, et bascule sans hésiter si une issue est enfumée. Puis guider et rythmer : il avance d'un pas sûr, ni course ni traîne, en suivant les blocs verts de sortie de secours, et il empêche tout retour en arrière. Il sécurise le passage en signalant les obstacles et en interdisant l'ascenseur. Enfin, il mène le groupe au point de rassemblement et le maintient regroupé à distance du bâtiment. Sa posture : calme, audible, visible. La panique est contagieuse, mais son sang-froid l'est tout autant. On l'identifie souvent par un brassard ou un gilet de couleur. Ce qu'il ne fait jamais : laisser quelqu'un revenir en arrière, emprunter l'ascenseur, ou forcer un passage dangereux.`,
        callouts:[
          {type:"danger",title:"Réflexe vital",text:"Jamais d'ascenseur en évacuation : en cas de coupure ou de fumées, il devient un piège mortel. Toujours les escaliers."},
          {type:"key",title:"À retenir",text:"Guide-file = en tête, donne la direction et le rythme, connaît l'itinéraire principal ET de secours, maintient le calme."}
        ] },

      { id:"m1l3", title:"Le Serre-File : le dernier à sortir", duration:"25 min",
        body:`
        <p>Si le guide-file ouvre la marche, le <strong>serre-file la ferme</strong>. Il est le <strong>dernier à quitter la zone</strong>, et sa mission tient en une phrase : <strong>s'assurer que personne ne reste derrière</strong>. C'est le dernier rempart entre une personne oubliée et le danger.</p>

        <h3>Sa mission n°1 : la fouille de la zone</h3>
        <p>Avant de quitter son secteur, le serre-file <strong>vérifie systématiquement tous les locaux</strong> où une personne pourrait se trouver, isolée et inconsciente du danger :</p>
        <div class="defbox">
          <div class="d"><h4>Les bureaux</h4><p>Y compris ceux dont la porte est fermée. Une personne au casque, concentrée, peut ne pas avoir entendu l'alarme.</p></div>
          <div class="d"><h4>Les sanitaires / toilettes</h4><p>Le point le plus souvent oublié. On vérifie chaque cabine.</p></div>
          <div class="d"><h4>Salles de réunion, vestiaires, archives</h4><p>Locaux isolés ou peu fréquentés où l'on peut être seul.</p></div>
          <div class="d"><h4>Recoins et zones techniques</h4><p>Local copieur, cuisine, réserve : partout où quelqu'un a pu s'isoler.</p></div>
        </div>

        <h3>Fermer les portes derrière soi</h3>
        <p>À mesure qu'il vérifie et vide les locaux, le serre-file <strong>ferme les portes derrière lui — sans les verrouiller</strong>. Une porte fermée ralentit la propagation des fumées et du feu, ce qui protège les cheminements d'évacuation. Mais elle ne doit jamais être verrouillée : les secours doivent pouvoir entrer.</p>

        <h3>L'accompagnement des personnes en difficulté</h3>
        <p>Le serre-file repère les personnes à mobilité réduite, blessées, ou en difficulté. Lorsqu'une évacuation immédiate est impossible (fauteuil et escaliers, par exemple), il les conduit vers un <strong>espace d'attente sécurisé</strong> (zone protégée du feu et des fumées prévue par R4227-38) et <strong>signale impérativement leur présence et leur localisation</strong> au responsable et aux secours.</p>

        <h3>Rendre compte</h3>
        <p>Une fois sa zone vide et sécurisée, le serre-file rejoint le point de rassemblement et <strong>rend compte au responsable d'évacuation</strong> : « secteur vérifié, RAS » ou « il reste une personne en salle 12, en espace d'attente sécurisé ». Cette information est <strong>capitale</strong> pour les pompiers.</p>

        <h3>Sa règle d'or : ne jamais se mettre en danger</h3>
        <p>Le serre-file <strong>n'est pas un pompier</strong>. Il ne traverse pas les fumées denses, ne force pas une porte chaude, ne joue pas les héros. Si la zone devient dangereuse, il sort et transmet l'information. Un serre-file blessé devient une victime de plus à secourir.</p>`,
        vo:`Si le guide-file ouvre la marche, le serre-file la ferme. Il est le dernier à quitter la zone, et sa mission tient en une phrase : s'assurer que personne ne reste derrière. C'est le dernier rempart entre une personne oubliée et le danger. Sa mission numéro un, c'est la fouille de la zone. Avant de quitter son secteur, il vérifie systématiquement tous les locaux où quelqu'un pourrait se trouver : les bureaux, même portes fermées, car une personne concentrée peut ne pas avoir entendu l'alarme ; les sanitaires et toilettes, le point le plus souvent oublié, cabine par cabine ; les salles de réunion, vestiaires et archives ; et tous les recoins et zones techniques. À mesure qu'il vide les locaux, il ferme les portes derrière lui, sans les verrouiller : une porte fermée ralentit les fumées, mais les secours doivent pouvoir entrer. Il accompagne les personnes en difficulté : quand l'évacuation immédiate est impossible, il les conduit vers un espace d'attente sécurisé et signale impérativement leur présence et leur localisation. Puis il rejoint le point de rassemblement et rend compte au responsable : secteur vérifié, ou il reste une personne à tel endroit. Cette information est capitale pour les pompiers. Sa règle d'or : ne jamais se mettre en danger. Le serre-file n'est pas un pompier. Il ne traverse pas les fumées denses, ne force pas une porte chaude. Un serre-file blessé devient une victime de plus.`,
        callouts:[
          {type:"danger",title:"Le point oublié",text:"Les toilettes et les bureaux portes fermées sont les lieux n°1 des personnes oubliées. On les vérifie SYSTÉMATIQUEMENT."},
          {type:"reg",title:"Cadre légal",text:"Les espaces d'attente sécurisés pour personnes ne pouvant évacuer seules découlent de l'article R4227-38. Leur présence doit être signalée aux secours."},
          {type:"key",title:"À retenir",text:"Serre-file = dernier à sortir, fouille tous les locaux, ferme (sans verrouiller) les portes, signale qui reste, ne prend aucun risque."}
        ] },

    ],
    quiz:[
      {q:"Quel article du Code du travail fonde l'obligation de désigner les personnes chargées de diriger l'évacuation ?",opts:["R4227-28","R4227-34","R4227-38","R4227-39"],a:2,ex:"L'article R4227-38 précise que la consigne de sécurité incendie désigne, pour chaque local, les personnes chargées de diriger l'évacuation — base légale des guide-files et serre-files."},
      {q:"Quelle est la mission principale du serre-file ?",opts:["Ouvrir la marche et donner la direction","Éteindre le départ de feu avec un extincteur","S'assurer que personne ne reste dans la zone et fermer la marche","Appeler les pompiers depuis le point de rassemblement"],a:2,ex:"Le serre-file ferme la marche : il fouille tous les locaux, ferme les portes derrière lui et sort en dernier."},
      {q:"Pendant la fouille, quel lieu est le plus souvent oublié et doit être vérifié systématiquement ?",opts:["Le hall d'entrée","Les sanitaires / toilettes","La cage d'escalier","Le parking"],a:1,ex:"Les toilettes (et les bureaux portes fermées) sont les lieux n°1 des personnes oubliées : on les vérifie systématiquement."}
    ] },

  { id:"m2", icon:"🧭", title:"Procédures & mise en situation", desc:"Guidage, point de rassemblement et mise en situation de serre-file.", duration:"1h00",
    lessons:[
      { id:"m1l4", title:"Guidage, cheminements et point de rassemblement", duration:"25 min",
        body:`
        <p>Connaître les rôles ne suffit pas : il faut maîtriser la <strong>procédure de déplacement</strong>, du déclenchement de l'alarme jusqu'au comptage final.</p>

        <h3>Au signal d'alarme — les bons réflexes</h3>
        <table>
          <tr><th>On fait</th><th>On ne fait pas</th></tr>
          <tr><td>Cesser immédiatement son activité</td><td>Finir « juste un dernier truc »</td></tr>
          <tr><td>Partir sans ses affaires</td><td>Retourner chercher sac, manteau, téléphone</td></tr>
          <tr><td>Suivre le guide-file et le balisage vert</td><td>Suivre la foule au hasard</td></tr>
          <tr><td>Prendre les escaliers</td><td>Prendre l'ascenseur</td></tr>
          <tr><td>Marcher d'un pas vif et calme</td><td>Courir, bousculer, crier</td></tr>
        </table>

        <h3>Se déplacer dans les cheminements</h3>
        <p>Les <strong>cheminements d'évacuation</strong> sont balisés par les blocs lumineux verts (pictogramme de la silhouette qui court vers une porte). Ils mènent toujours vers une <strong>issue de secours</strong>. Le guide-file les suit, le groupe le suit.</p>
        <p><strong>En présence de fumées</strong> : l'air respirable se trouve près du sol. On se <strong>baisse</strong>, on progresse le long des murs, et on <strong>ferme les portes derrière soi</strong>. Si un cheminement est totalement enfumé, on bascule sur l'itinéraire de secours.</p>

        <h3>Le point de rassemblement</h3>
        <div class="defbox">
          <div class="d"><h4>Où ?</h4><p>Un lieu prédéfini, <em>à distance suffisante</em> du bâtiment, qui <em>ne gêne pas l'accès des secours</em> (jamais sur la voie pompiers). Il est connu de tous et signalé.</p></div>
          <div class="d"><h4>Pourquoi ?</h4><p>Pour <em>compter les présents</em> et vérifier que tout le monde est sorti. C'est l'unique façon de savoir s'il manque quelqu'un.</p></div>
          <div class="d"><h4>Le comptage</h4><p>Le responsable d'évacuation fait l'appel ou compte les présents par secteur, en recoupant avec les comptes-rendus des serre-files.</p></div>
        </div>

        <h3>Transmettre aux secours</h3>
        <p>À l'arrivée des pompiers, le responsable transmet une information claire : <strong>combien de personnes manquent, qui, et où elles ont été vues pour la dernière fois</strong> (ou dans quel espace d'attente sécurisé). C'est cette information qui oriente et accélère les recherches.</p>

        <h3>La règle absolue</h3>
        <p><strong>On ne retourne JAMAIS dans le bâtiment</strong>, pour aucun motif, tant que les secours n'ont pas donné leur accord. On reste au point de rassemblement.</p>`,
        vo:`Connaître les rôles ne suffit pas : il faut maîtriser la procédure de déplacement, du déclenchement de l'alarme jusqu'au comptage final. Au signal d'alarme, les bons réflexes : on cesse immédiatement son activité, on part sans ses affaires, on suit le guide-file et le balisage vert, on prend les escaliers et jamais l'ascenseur, on marche d'un pas vif et calme sans courir ni bousculer. Pour se déplacer, on suit les cheminements d'évacuation balisés par les blocs verts qui mènent toujours vers une issue de secours. En présence de fumées, l'air respirable est près du sol : on se baisse, on longe les murs, et on ferme les portes derrière soi. Le point de rassemblement est un lieu prédéfini, à distance suffisante du bâtiment, qui ne gêne pas l'accès des secours. Il sert à compter les présents : c'est la seule façon de savoir s'il manque quelqu'un. Le responsable fait l'appel en recoupant avec les comptes-rendus des serre-files. À l'arrivée des pompiers, il transmet une information claire : combien de personnes manquent, qui, et où elles ont été vues pour la dernière fois. La règle absolue : on ne retourne jamais dans le bâtiment, pour aucun motif, tant que les secours n'ont pas donné leur accord.`,
        callouts:[
          {type:"danger",title:"Règle absolue",text:"On ne retourne JAMAIS dans le bâtiment avant l'accord des secours, quel que soit le motif."},
          {type:"key",title:"À retenir",text:"Balisage vert → issue de secours · fumées → se baisser · point de rassemblement à distance + comptage · info précise aux pompiers."}
        ] },

      { id:"m1l5", title:"Mise en situation : vous êtes Serre-File", duration:"15 min",
        body:`
        <p>Vous allez maintenant mettre en pratique. Lisez attentivement la situation, choisissez votre action, puis lisez le retour. Il n'y a pas de point compté ici : l'objectif est de <strong>réfléchir comme un serre-file</strong>.</p>

        <div class="callout danger"><div class="cot">⚠ La situation</div><p><strong>L'alarme retentit.</strong> Vous êtes le serre-file de votre étage. Vous effectuez la fouille de votre secteur quand, dans un bureau, vous trouvez un collègue assis qui vous dit calmement : « <em>Vas-y sans moi, je termine un mail urgent, je descends juste après.</em> » <strong>La personne refuse de sortir. Que faites-vous ?</strong></p></div>

        <div id="scenChoices" class="scen-choices">
          <button class="btn ghost scen-opt" onclick="evacScenario('a')">A — Vous la saisissez par le bras et la forcez physiquement à sortir.</button>
          <button class="btn ghost scen-opt" onclick="evacScenario('b')">B — Vous restez avec elle pour la convaincre, même si cela vous fait rester dans le bâtiment.</button>
          <button class="btn ghost scen-opt" onclick="evacScenario('c')">C — Vous l'informez fermement et calmement du danger, tentez une dernière fois de la décider, puis si elle refuse, vous évacuez et signalez immédiatement sa présence et sa localisation au responsable et aux secours.</button>
          <button class="btn ghost scen-opt" onclick="evacScenario('d')">D — Vous notez qu'elle refuse, vous l'ignorez et vous continuez votre ronde normalement.</button>
        </div>
        <div id="scenFeedback" class="scen-feedback" aria-live="polite"></div>`,
        vo:`Passons à la pratique. L'alarme retentit. Vous êtes le serre-file de votre étage. Pendant la fouille de votre secteur, vous trouvez un collègue assis qui vous dit : vas-y sans moi, je termine un mail urgent, je descends juste après. La personne refuse de sortir. Que faites-vous ? Prenez le temps de choisir votre action à l'écran, puis lisez le retour. L'idée n'est pas d'avoir des points, mais d'apprendre à réfléchir comme un serre-file. Souvenez-vous des deux principes que nous avons vus : on tente de convaincre fermement et calmement, mais on ne se met jamais soi-même en danger ; et si une personne reste malgré tout, l'information de sa présence et de sa localisation transmise aux secours peut lui sauver la vie.`,
        callouts:[
          {type:"key",title:"Le principe clé",text:"Convaincre fermement, mais ne jamais se mettre en danger soi-même — et SURTOUT signaler la personne restée et sa localisation aux secours. Cette information peut lui sauver la vie."}
        ] },

    ],
    quiz:[
      {q:"L'alarme retentit et une personne refuse d'évacuer. Quelle est la bonne conduite du serre-file ?",opts:["La forcer physiquement à sortir","Rester avec elle quoi qu'il arrive","Tenter de la convaincre fermement, puis si elle refuse, évacuer et signaler sa présence et sa localisation aux secours","L'ignorer et poursuivre sa ronde"],a:2,ex:"On convainc fermement sans se mettre en danger ; si la personne refuse, on évacue et on signale impérativement sa présence et sa localisation aux secours."},
      {q:"À quoi sert avant tout le point de rassemblement ?",opts:["À attendre la fin de la pause","À compter les présents et vérifier que tout le monde est sorti","À ranger le matériel","À s'abriter de la pluie"],a:1,ex:"Le point de rassemblement, à distance et sans gêner les secours, permet de compter les présents : c'est la seule façon de savoir s'il manque quelqu'un."},
      {q:"Pourquoi ne prend-on JAMAIS l'ascenseur lors d'une évacuation ?",opts:["Parce qu'il est trop lent","Parce qu'en cas de coupure ou de fumées il devient un piège mortel","Parce qu'il est réservé aux secours","Parce que c'est interdit par le règlement intérieur"],a:1,ex:"En évacuation, on emprunte toujours les escaliers : l'ascenseur peut tomber en panne ou se remplir de fumées et devenir un piège."}
    ] }

const STORE_KEY="guide_serre_file_progress_v1";
let state=loadState();
function shuffleQuiz(src){return src.map(function(q){var idx=q.opts.map(function(_,i){return i;});for(var i=idx.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=idx[i];idx[i]=idx[j];idx[j]=t;}return {q:q.q,ex:q.ex,opts:idx.map(function(i){return q.opts[i];}),a:idx.indexOf(q.a)};});}
function loadState(){try{const s=JSON.parse(localStorage.getItem(STORE_KEY))||{};return{done:s.done||{},quiz:s.quiz||{},viewed:s.viewed||{},name:s.name||""};}catch(e){return{done:{},quiz:{},viewed:{},name:""};}}
function saveState(){localStorage.setItem(STORE_KEY,JSON.stringify(state));}

/* ---- Voix off — sélection automatique des voix neuronales (Edge/Chrome en ligne), plus naturelles ---- */
const TTS_PREF_KEY="mcr_tts_pref";
function ttsPref(){try{return JSON.parse(localStorage.getItem(TTS_PREF_KEY))||{};}catch(e){return{};}}
function ttsSavePref(p){localStorage.setItem(TTS_PREF_KEY,JSON.stringify(p));}
const TTS={supported:('speechSynthesis'in window),voices:[],voice:null,rate:0.95,chunks:[],i:0,state:'idle',onstate:null,
  score(v){let s=0;const n=(v.name||'').toLowerCase();if(/fr[-_]?fr/i.test(v.lang))s+=20;else if(/^fr/i.test(v.lang))s+=8;if(n.includes('natural'))s+=100;if(n.includes('online'))s+=40;if(/(denise|vivienne|henri|remy|eloise|charline|yves|brigitte)/.test(n))s+=20;if(v.localService===false)s+=15;return s;},
  refresh(){const all=window.speechSynthesis.getVoices();const fr=all.filter(v=>/^fr/i.test(v.lang));this.voices=(fr.length?fr:all).slice().sort((a,b)=>this.score(b)-this.score(a));const p=ttsPref();this.voice=(p.voice&&this.voices.find(v=>v.name===p.voice))||this.voices[0]||null;this.rate=p.rate||0.95;},
  setVoice(name){this.voice=this.voices.find(v=>v.name===name)||this.voice;const p=ttsPref();p.voice=name;ttsSavePref(p);},
  setRate(r){this.rate=+r;const p=ttsPref();p.rate=this.rate;ttsSavePref(p);},
  _next(){if(this.i>=this.chunks.length){this.state='idle';this.onstate&&this.onstate('idle');return;}const u=new SpeechSynthesisUtterance(this.chunks[this.i]);u.lang=(this.voice&&this.voice.lang)||'fr-FR';if(this.voice)u.voice=this.voice;u.rate=this.rate;u.pitch=1;u.onend=()=>{if(this.state==='playing'){this.i++;this._next();}};u.onerror=()=>{if(this.state==='playing'){this.i++;this._next();}};window.speechSynthesis.speak(u);},
  play(text,onstate){this.stop();this.onstate=onstate;this.chunks=(text.replace(/\s+/g,' ').match(/[^.!?…:;]+[.!?…:;]*/g)||[text]).map(s=>s.trim()).filter(Boolean);this.i=0;this.state='playing';this.onstate&&this.onstate('playing');this._next();},
  pause(){if(this.state==='playing'){this.state='paused';window.speechSynthesis.pause();this.onstate&&this.onstate('paused');}},
  resume(){if(this.state==='paused'){this.state='playing';window.speechSynthesis.resume();this.onstate&&this.onstate('playing');}},
  stop(){this.state='idle';this.chunks=[];this.i=0;if(this.supported)window.speechSynthesis.cancel();}
};
if(TTS.supported){TTS.refresh();window.speechSynthesis.onvoiceschanged=()=>{TTS.refresh();if(typeof refreshVoiceUI==='function')refreshVoiceUI();};}
function lessonNarration(o){if(o.vo)return o.vo;const d=document.createElement('div');d.innerHTML=o.body;let x=o.title+'. '+d.textContent.replace(/\s+/g,' ').trim();(o.callouts||[]).forEach(c=>{x+=' '+c.title+'. '+c.text;});return x;}
function ttsUpdateBtn(s){const b=document.getElementById('ttsBtn');if(!b)return;b.classList.toggle('on',s!=='idle');b.innerHTML=s==='playing'?'⏸ Pause':(s==='paused'?'▶ Reprendre':'🔊 Écouter le cours');}
function refreshVoiceUI(){const vs=document.getElementById('ttsVoice');if(vs){vs.innerHTML=TTS.voices.map(v=>{const label=v.name.replace('Microsoft ','').replace(/ - .*$/,'').replace(/ \(.*\)$/,'');return '<option value="'+v.name.replace(/"/g,'&quot;')+'"'+(TTS.voice&&v.name===TTS.voice.name?' selected':'')+'>'+label+(/natural|online/i.test(v.name)?' ✨':'')+'</option>';}).join('');}const rs=document.getElementById('ttsRate');if(rs)rs.value=String(TTS.rate);const h=document.getElementById('ttsHint');if(h){const good=TTS.voice&&/natural|online/i.test(TTS.voice.name);h.innerHTML=good?'✨ Voix neuronale active':'Astuce : ouvrir dans Edge (en ligne) pour une voix plus naturelle';}}
function wireTts(getText){const tb=document.getElementById('ttsBtn');if(tb)tb.onclick=()=>{if(TTS.state==='idle')TTS.play(getText(),ttsUpdateBtn);else if(TTS.state==='playing')TTS.pause();else TTS.resume();};refreshVoiceUI();const vs=document.getElementById('ttsVoice');if(vs)vs.onchange=()=>{TTS.setVoice(vs.value);if(TTS.state!=='idle'){TTS.stop();ttsUpdateBtn('idle');}};const rs=document.getElementById('ttsRate');if(rs)rs.onchange=()=>{TTS.setRate(rs.value);if(TTS.state!=='idle'){TTS.stop();ttsUpdateBtn('idle');}};}

function isQuizId(id){return COURSE.modules.some(m=>m.id+'q'===id);}
function moduleDone(mid){return !!state.done[mid];}
function moduleUnlocked(mid){const i=moduleIndex(mid);return i<=0?true:moduleDone(COURSE.modules[i-1].id);}
function allComplete(){return COURSE.modules.every(m=>moduleDone(m.id));}
function stepIndex(id){return STEPS.findIndex(s=>s.id===id);}
function nextStep(id){const i=stepIndex(id);return i>=0&&i<STEPS.length-1?STEPS[i+1]:null;}
function prevStep(id){const i=stepIndex(id);return i>0?STEPS[i-1]:null;}
function totalSteps(){let n=0;COURSE.modules.forEach(m=>n+=m.lessons.length+1);return n;}
function doneSteps(){let n=0;COURSE.modules.forEach(m=>{m.lessons.forEach(l=>{if(state.viewed[l.id])n++;});if(moduleDone(m.id))n++;});return n;}
function globalProgress(){return Math.round(doneSteps()/totalSteps()*100);}

const appEl=document.getElementById("app");
document.getElementById("brandLogo").src=LOGO;

document.getElementById("menuBtn").onclick=()=>appEl.classList.toggle("menu-open");

toTop.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});

function renderNav(){
  nav.innerHTML="";
  COURSE.modules.forEach((m,i)=>{
    const ml=moduleUnlocked(m.id);
    const h=document.createElement("div");h.className="mod-h"+(ml?"":" locked");
    h.innerHTML=`<span class="num">${i+1}</span><span>${m.title}</span>`;
    nav.appendChild(h);
    m.lessons.forEach(l=>{
      const done=!!state.viewed[l.id];
      const b=document.createElement("button");
      b.className="t"+(current===l.id?" active":"")+(done?" done":"")+(ml?"":" locked");
      b.innerHTML=`<span class="dot">${done?"✓":""}</span><span>${l.title}</span>`+(ml?"":`<span class="lk">🔒</span>`);
      if(ml)b.onclick=()=>go(l.id);
      nav.appendChild(b);
    });
    const qid=m.id+'q', qdone=moduleDone(m.id);
    const qb=document.createElement("button");
    qb.className="t quiz"+(current===qid?" active":"")+(qdone?" done":"")+(ml?"":" locked");
    qb.innerHTML=`<span class="dot">${qdone?"✓":""}</span><span>★ Quiz du module</span>`+(ml?"":`<span class="lk">🔒</span>`);
    if(ml)qb.onclick=()=>go(qid);
    nav.appendChild(qb);
  });
  const pct=globalProgress();
  document.getElementById("ringFg").style.strokeDashoffset=157-(157*pct/100);
  document.getElementById("ringPct").textContent=pct+"%";
  document.getElementById("ringTxt").textContent=pct===0?"À démarrer":(pct===100?"Terminé 🎉":"En cours");
}
function go(id){TTS.stop();current=id;closeMenu();window.scrollTo(0,0);render();}

function render(){
  renderNav();
  if(current==="home")return renderHome();
  if(current==="cert")return renderCert();
  if(isQuizId(current))return renderModuleQuiz(quizModule(current));
  const f=findLesson(current);
  if(f)return renderLesson(f.m,f.l);
  renderHome();
}

        <div class="m"><div class="v">60%</div><div class="k">Seuil / module</div></div>
        <div class="m"><div class="v">${pct}%</div><div class="k">Progression</div></div>

}

function renderLesson(m,l){
  state.viewed[l.id]=true;saveState();
  const mi=moduleIndex(m.id)+1, li=m.lessons.indexOf(l)+1;
  const ns=nextStep(l.id), ps=prevStep(l.id);
  let callouts="";(l.callouts||[]).forEach(c=>{callouts+=`<div class="callout ${c.type}"><div class="cot">${c.type==='reg'?'§':(c.type==='danger'?'⚠':'★')} ${c.title}</div><p>${c.text}</p></div>`;});

      <button class="btn ghost narr" id="ttsBtn">🔊 Écouter le cours</button>

      <span class="narr-hint" id="ttsHint">🎧 Voix off</span>

      ${ttsBar}
      ${l.body}${callouts}
      <div class="nav-btns">
        ${ps?`<button class="btn ghost" id="prevBtn">← Précédent</button>`:`<button class="btn ghost" id="homeBtn">← Accueil</button>`}
        <button class="btn primary" id="nextBtn">${nextLabel}</button>

  if(TTS.supported)wireTts(()=>lessonNarration(l));

function renderModuleQuiz(m){
  const mi=moduleIndex(m.id)+1;
  let quiz=shuffleQuiz(m.quiz);
  let answers=new Array(quiz.length).fill(null);
  let submitted=false;
  function draw(){
    let qs="";
    quiz.forEach((q,qi)=>{
      let opts="";
      q.opts.forEach((o,oi)=>{
        let cls="opt";
        if(submitted){if(oi===q.a)cls+=" correct";else if(answers[qi]===oi)cls+=" wrong";cls+=" disabled";}
        else if(answers[qi]===oi)cls+=" sel";
        opts+=`<button class="${cls}" data-q="${qi}" data-o="${oi}"><span class="mk">${(submitted&&oi===q.a)?"✓":((submitted&&answers[qi]===oi)?"✕":"")}</span><span>${o}</span></button>`;
      });
      qs+=`<div class="quiz-q"><div class="qn">Question ${qi+1} / ${m.quiz.length}</div><div class="qt">${q.q}</div>${opts}${submitted?`<div class="explain">💡 ${q.ex}</div>`:""}</div>`;
    });
    let result="",footer="";
    if(submitted){
      const score=quiz.reduce((s,q,i)=>s+(answers[i]===q.a?1:0),0);
      const ratio=score/m.quiz.length, passed=ratio>=PASS, pc=Math.round(ratio*100);
      state.quiz[m.id]={score,total:m.quiz.length,passed};
      if(passed)state.done[m.id]=true;
      saveState();
      const off=314-(314*pc/100);
      const idx=moduleIndex(m.id), nextMod=COURSE.modules[idx+1];
      result=`<div class="result">
        <div class="ring-big"><svg width="118" height="118"><circle cx="59" cy="59" r="50" stroke="#dff0e5" stroke-width="9" fill="none"/>
        <circle cx="59" cy="59" r="50" stroke="${passed?'#15a05f':'#e23b2e'}" stroke-width="9" fill="none" stroke-linecap="round" stroke-dasharray="314" stroke-dashoffset="${off}" transform="rotate(-90 59 59)"/></svg>
        <div class="lbl" style="color:${passed?'#15a05f':'#e23b2e'}">${pc}%</div></div>
        <div class="msg ${passed?'pass':'fail'}">${score}/${m.quiz.length} bonnes réponses — ${passed?"<b>Module validé !</b> 🎉":"<b>Seuil de 60% non atteint.</b> Revoyez les cours et retentez."}</div></div>`;
      footer=`<div class="nav-btns">
        <button class="btn ghost" id="reviewBtn">← Revoir les cours</button>
        ${passed?`<button class="btn primary" id="nextBtn">${nextMod?"Module suivant →":(allComplete()?"Voir mon attestation 🏆":"Terminer →")}</button>`:`<button class="btn primary" id="retryBtn">Recommencer le quiz</button>`}
      </div>`;
    } else {
      const all=answers.every(a=>a!==null);
      footer=`<div class="nav-btns"><button class="btn ghost" id="reviewBtn">← Revoir les cours</button>
        <button class="btn primary" id="submitBtn" ${all?"":"disabled"}>Valider mes réponses</button></div>`;
    }
    main.innerHTML=`<div class="topbar"><button class="btn ghost" style="padding:6px 12px;font-size:13px" onclick="location.href='MCR_Academy.html'">← Menu principal</button><div class="crumb"><b>Module ${mi}</b> · ${m.title}</div><div class="pill q">★ Quiz · seuil 60%</div></div>
      <div class="card">
        <div class="subtitle">Quiz de validation du module — ${m.title}</div>
        <h2 class="title">Quiz · Module ${mi}</h2>
        <div class="subtitle" style="margin-bottom:18px">${submitted?"Résultat & corrigé":"Une réponse par question. Il faut 60% pour valider le module et débloquer le suivant."}</div>
        ${result}${qs}${footer}
      </div>`;
    if(!submitted){
      main.querySelectorAll(".opt").forEach(b=>{b.onclick=()=>{answers[+b.dataset.q]=+b.dataset.o;draw();};});
      const sb=document.getElementById("submitBtn");if(sb)sb.onclick=()=>{submitted=true;window.scrollTo(0,0);draw();};
    } else {
      const rb=document.getElementById("retryBtn");if(rb)rb.onclick=()=>{quiz=shuffleQuiz(m.quiz);answers=new Array(quiz.length).fill(null);submitted=false;window.scrollTo(0,0);draw();};
      const nb=document.getElementById("nextBtn");if(nb)nb.onclick=()=>{const idx=moduleIndex(m.id),nm=COURSE.modules[idx+1];renderNav();nm?go(nm.lessons[0].id):go(allComplete()?"cert":"home");};
    }
    const rv=document.getElementById("reviewBtn");if(rv)rv.onclick=()=>go(m.lessons[0].id);
  }
  draw();
}

window.evacScenario=function(choice){
  const fb=document.getElementById("scenFeedback");
  if(!fb)return;
  document.querySelectorAll("#scenChoices .scen-opt").forEach(b=>b.classList.remove("sel"));
  const btn=document.querySelector("#scenChoices .scen-opt[onclick*=\"'"+choice+"'\"]");
  if(btn)btn.classList.add("sel");
  const R={
    a:{ok:false,t:"Action à éviter.",x:"Vous n'avez ni le droit ni la formation pour contraindre physiquement une personne, et la lutte vous fait perdre un temps précieux et vous met tous les deux en danger. Le serre-file convainc, il ne force pas."},
    b:{ok:false,t:"Action dangereuse.",x:"Rester dans le bâtiment compromet votre propre sécurité, sans garantie de résultat. La règle d'or du serre-file est de ne jamais devenir une victime supplémentaire. Vous devez pouvoir évacuer et, surtout, transmettre l'information aux secours."},
    c:{ok:true,t:"Excellent — c'est la bonne conduite.",x:"Vous informez la personne fermement et calmement de la réalité du danger (« ce n'est pas un exercice, vous devez sortir maintenant »), vous tentez une dernière fois de la décider, puis, si elle refuse toujours, vous évacuez sans vous mettre en danger et vous signalez IMMÉDIATEMENT au responsable et aux secours : qui reste, et où exactement. Cette information peut lui sauver la vie."},
    d:{ok:false,t:"Action incomplète et risquée.",x:"Ignorer la personne sans tenter de la convaincre, et surtout sans signaler sa présence aux secours, c'est la laisser potentiellement piégée sans que personne ne le sache. Le réflexe vital est de transmettre sa localisation."}
  };
  const r=R[choice]; if(!r)return;
  fb.innerHTML='<div class="callout '+(r.ok?'key':'danger')+'"><div class="cot">'+(r.ok?'✓ ':'⚠ ')+r.t+'</div><p>'+r.x+'</p></div>'+(r.ok?'':'<p class="scen-retry">Essayez encore : quelle option respecte les deux principes — convaincre sans se mettre en danger, et signaler aux secours ?</p>');
  fb.scrollIntoView({behavior:"smooth",block:"nearest"});
};

<script>
/* ===== MCR Confort universel (autonome) ===== */
(function(){
  if(window.__mcrComfort)return; window.__mcrComfort=1;
  var K='mcr_comfort';
  function load(){try{return JSON.parse(localStorage.getItem(K))||{};}catch(e){return{};}}
  function save(){localStorage.setItem(K,JSON.stringify(c));}
  var c=load();
  if(typeof c.fs!=='number')c.fs=1;
  if(typeof c.dark!=='boolean')c.dark=false;
  if(typeof c.tts!=='boolean')c.tts=true;
  function apply(){
    document.documentElement.style.setProperty('--fs',c.fs);
    document.documentElement.setAttribute('data-theme',c.dark?'dark':'');
    document.documentElement.setAttribute('data-tts',c.tts?'on':'off');
  }
  function sync(){
    var fs=document.getElementById('cfgFs'); if(fs)fs.textContent=Math.round(c.fs*100)+'%';
    var d=document.querySelector('#cfgPanel [data-a=dark]'); if(d){d.classList.toggle('on',c.dark);d.textContent=c.dark?'Activ\u00e9':'D\u00e9sactiv\u00e9';}
    var t=document.querySelector('#cfgPanel [data-a=tts]'); if(t){t.classList.toggle('on',c.tts);t.textContent=c.tts?'Activ\u00e9e':'D\u00e9sactiv\u00e9e';}
  }
  function build(){
    if(document.getElementById('cfgBtn')){apply();return;}
    var btn=document.createElement('button'); btn.id='cfgBtn'; btn.className='cfg-btn'; btn.setAttribute('aria-label','R\u00e9glages de confort'); btn.title='Confort de lecture'; btn.textContent='\u2699';
    var p=document.createElement('div'); p.id='cfgPanel'; p.className='cfg-panel';
    p.innerHTML='<div class="cfg-h">\u2699 Confort de lecture</div>'
      +'<div class="cfg-row"><span>Taille du texte</span><span class="cfg-fs"><button data-a="minus" aria-label="R\u00e9duire">A\u2212</button><b id="cfgFs">100%</b><button data-a="plus" aria-label="Agrandir">A+</button></span></div>'
      +'<div class="cfg-row"><span>R\u00e9initialiser</span><button class="cfg-mini" data-a="reset">\u21ba</button></div>'
      +'<div class="cfg-row"><span>Mode sombre</span><button class="cfg-tog" data-a="dark">D\u00e9sactiv\u00e9</button></div>'
      +'<div class="cfg-row"><span>Voix off</span><button class="cfg-tog" data-a="tts">Activ\u00e9e</button></div>';
    document.body.appendChild(btn); document.body.appendChild(p);
    btn.addEventListener('click',function(e){e.stopPropagation();p.classList.toggle('open');});
    document.addEventListener('click',function(e){if(p.classList.contains('open')&&!p.contains(e.target)&&e.target!==btn)p.classList.remove('open');});
    p.addEventListener('click',function(e){
      var a=e.target.getAttribute&&e.target.getAttribute('data-a'); if(!a)return;
      if(a==='minus')c.fs=Math.max(0.85,Math.round((c.fs-0.1)*100)/100);
      else if(a==='plus')c.fs=Math.min(1.35,Math.round((c.fs+0.1)*100)/100);
      else if(a==='reset')c.fs=1;
      else if(a==='dark')c.dark=!c.dark;
      else if(a==='tts'){c.tts=!c.tts; if(!c.tts&&window.speechSynthesis)speechSynthesis.cancel();}
      save();apply();sync();
    });
    sync();
  }
  function init(){apply();build();}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init); else init();
  document.addEventListener('keydown',function(e){
    var tn=(e.target&&e.target.tagName)||''; if(/^(INPUT|SELECT|TEXTAREA)$/.test(tn))return;
    if(e.key==='ArrowRight'){var n=document.getElementById('nextBtn');if(n&&!n.disabled)n.click();}
    else if(e.key==='ArrowLeft'){var pv=document.getElementById('prevBtn');if(pv&&!pv.disabled)pv.click();}
  });
})();
</script>

<script>
(function(){
  /* Ajouter ici un code par entreprise plus tard, ex: "ACME-2026":"ACME SARL" */
  var CODES = { "MCR-ESSAI":"Essai", "PARIS-DEMO":"Collaborateur Paris" };
  var KEY = "mcrAccesOk";
  function ok(){ try{ return CODES[localStorage.getItem(KEY)] != null; }catch(e){ return false; } }
  if(ok()||localStorage.getItem('sb-mmaolkpsaroxqblthmhk-auth-token')) return;
  function build(){
    if(document.getElementById('mcrGate')) return;
    var o=document.createElement('div'); o.id='mcrGate';
    o.style.cssText='position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:radial-gradient(900px 600px at 50% -10%,#1a2230,#0b0e13);font-family:system-ui,Segoe UI,Roboto,sans-serif;padding:24px';
    o.innerHTML='<div style="width:min(380px,92vw);background:#12161c;border:1px solid #2b323b;border-radius:18px;padding:32px 28px;box-shadow:0 30px 80px -20px #000;text-align:center">'
      +'<div style="font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#d6a338;font-weight:800">MCR Academy</div>'
      +'<h2 style="margin:14px 0 6px;color:#fff;font-size:21px;font-weight:800">Espace d&rsquo;essai protege</h2>'
      +'<p style="margin:0 0 18px;color:#9aa6b2;font-size:13.5px;line-height:1.5">Saisissez le code d&rsquo;acces qui vous a ete communique.</p>'
      +'<input id="mcrCode" type="text" autocomplete="off" placeholder="Code d&rsquo;acces" style="width:100%;box-sizing:border-box;padding:13px 14px;border-radius:11px;border:1px solid #2b323b;background:#1b2127;color:#fff;font-size:15px;text-align:center;letter-spacing:1px">'
      +'<div id="mcrErr" style="color:#ff7a6e;font-size:12.5px;min-height:16px;margin:9px 0 4px"></div>'
      +'<button id="mcrGo" style="width:100%;padding:13px;border:0;border-radius:11px;background:linear-gradient(135deg,#d6a338,#b9842a);color:#1a1407;font-weight:800;font-size:15px;cursor:pointer">Entrer</button>'
      +'</div>';
    document.body.appendChild(o); document.body.style.overflow='hidden';
    var inp=o.querySelector('#mcrCode'), btn=o.querySelector('#mcrGo'), err=o.querySelector('#mcrErr');
    function go(){ var v=(inp.value||'').trim().toUpperCase(); if(CODES[v]){ try{localStorage.setItem(KEY,v);}catch(e){} o.remove(); document.body.style.overflow=''; } else { err.textContent='Code incorrect.'; inp.focus(); inp.select(); } }
    btn.onclick=go; inp.addEventListener('keydown',function(e){ if(e.key==='Enter') go(); }); setTimeout(function(){inp.focus();},60);
  }
  if(document.body) build(); else document.addEventListener('DOMContentLoaded',build);
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
window.MCR_saveAttestation=async function(rec){try{if(!window.supabase)return{error:"lib"};var sb=window.__mcrsb||(window.__mcrsb=window.supabase.createClient("https://mmaolkpsaroxqblthmhk.supabase.co","sb_publishable_6DNAf0gSz0b-tvwlQZ5g8A_5TjA-SGg"));try{var s=await sb.auth.getSession();var u=s&&s.data&&s.data.session?s.data.session.user:null;if(u){rec.user_id=u.id;var pr=await sb.from("profiles").select("entreprise_id").eq("id",u.id).maybeSingle();if(pr&&pr.data&&pr.data.entreprise_id)rec.entreprise_id=pr.data.entreprise_id;var stg=await sb.from("stagiaires").select("id").eq("user_id",u.id).maybeSingle();if(stg&&stg.data)rec.stagiaire_id=stg.data.id;}}catch(e){}var r=await sb.from("attestations").insert(rec);if(r&&!r.error){try{window.MCR_mountRating(rec.formation);}catch(e){}}return r;}catch(e){return{error:String(e)};}};
window.MCR_mountRating=function(formation){
  if(document.getElementById('mcrRateBox'))return;
  var anchor=document.getElementById('saveAttMsg');var host=anchor?anchor.parentNode:document.body;
  var box=document.createElement('div');box.id='mcrRateBox';
  box.style.cssText='width:100%;max-width:520px;margin:16px auto 0;padding:16px 18px;border:1px solid rgba(214,163,56,.35);border-radius:14px;background:rgba(214,163,56,.06);text-align:center;font-family:system-ui,Segoe UI,Roboto,sans-serif';
  box.innerHTML='<div style="font-weight:800;font-size:14px;margin-bottom:8px">Notez cette formation</div>'+
    '<div id="mcrStars" style="font-size:32px;letter-spacing:7px;cursor:pointer;user-select:none"></div>'+
    '<textarea id="mcrRateTxt" placeholder="Un commentaire ? (facultatif)" style="width:100%;margin-top:10px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.14);border-radius:10px;color:inherit;padding:9px 11px;font-family:inherit;font-size:13px;resize:vertical;min-height:46px"></textarea>'+
    '<button id="mcrRateSend" style="margin-top:10px;border:0;border-radius:10px;padding:10px 18px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,#d6a338,#b9842a);color:#1a1407;font-family:inherit">Envoyer ma note</button>'+
    '<div id="mcrRateMsg" style="font-size:12.5px;margin-top:8px;min-height:16px;color:#9aa6b2"></div>';
  host.appendChild(box);
  var cur=0;var st=box.querySelector('#mcrStars');
  function paint(n){var h='';for(var i=1;i<=5;i++){h+='<span data-n="'+i+'" style="color:'+(i<=n?'#f5c451':'#3a4250')+'">\u2605</span>';}st.innerHTML=h;}
  paint(0);
  st.addEventListener('click',function(e){var t=e.target.closest('[data-n]');if(t){cur=+t.getAttribute('data-n');paint(cur);}});
  st.addEventListener('mouseover',function(e){var t=e.target.closest('[data-n]');if(t)paint(+t.getAttribute('data-n'));});
  st.addEventListener('mouseout',function(){paint(cur);});
  box.querySelector('#mcrRateSend').onclick=async function(){
    var msg=box.querySelector('#mcrRateMsg');
    if(!cur){msg.textContent='Choisissez un nombre d\u2019\u00e9toiles.';return;}
    this.disabled=true;msg.textContent='Envoi\u2026';
    try{var sb=window.__mcrsb||(window.__mcrsb=window.supabase.createClient("https://mmaolkpsaroxqblthmhk.supabase.co","sb_publishable_6DNAf0gSz0b-tvwlQZ5g8A_5TjA-SGg"));
      var r=await sb.rpc('save_rating',{p_type:'formation',p_note:cur,p_commentaire:box.querySelector('#mcrRateTxt').value.trim(),p_formation:formation});
      if(r&&r.error){msg.textContent='Erreur : '+r.error.message;this.disabled=false;return;}
      box.innerHTML='<div style="font-weight:800;font-size:14px;color:#5ee9a0">\u2605 Merci pour votre note !</div>';
    }catch(e){msg.textContent='Erreur : '+e;this.disabled=false;}
  };
};
</script>
