<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sécurité Incendie · La théorie du feu — E-learning MCR Formations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#e11d2a;
  --accent-2:#f24430;
  --accent-3:#ff7a3d;
  --grad:linear-gradient(120deg,#b30f1c 0%,#e11d2a 50%,#ff7a3d 100%);
  --grad-soft:linear-gradient(120deg,#fdeceb 0%,#fff1ec 55%,#fff5ee 100%);
  --ink:#2a1714;
  --ink-2:#6b5650;
  --muted:#a99089;
  --line:#f0e3df;
  --line-2:#f7eeea;
  --ok:#15a05f;
  --bad:#e23b2e;
  --warn:#f59e0b;
  --glow:0 0 18px rgba(225,29,42,.42);
  --r:22px;
  --r-sm:14px;
  --shadow-sm:0 2px 8px rgba(180,40,30,.07);
  --shadow:0 12px 34px -16px rgba(150,40,25,.28);
  --shadow-lg:0 30px 70px -28px rgba(150,40,25,.42);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--ink);min-height:100vh;
  background:
    radial-gradient(1100px 620px at 88% -8%,rgba(255,122,61,.12),transparent 60%),
    radial-gradient(960px 600px at 4% 4%,rgba(225,29,42,.10),transparent 58%),
    radial-gradient(700px 500px at 50% 110%,rgba(255,122,61,.07),transparent 60%),
    #fdf8f6;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh;gap:0}

/* ---------- SIDEBAR (claire / rouge feu) ---------- */
.sidebar{
  background:rgba(255,255,255,.82);backdrop-filter:blur(14px);
  border-right:1px solid var(--line);
  padding:24px 18px;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:40
}
.brand{display:flex;align-items:center;gap:13px;padding:0 6px 4px}
.brand .logo{width:50px;height:auto;flex:none;filter:drop-shadow(0 6px 14px rgba(180,40,25,.22))}
.brand h1{font-size:14.5px;font-weight:800;line-height:1.15;color:var(--ink)}
.brand p{font-size:11px;color:var(--accent);margin-top:3px;font-weight:700;letter-spacing:.3px}
.ring-wrap{display:flex;align-items:center;gap:14px;background:var(--grad-soft);
  border:1px solid var(--line);border-radius:var(--r-sm);padding:14px;margin:18px 6px}
.ring{position:relative;width:58px;height:58px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .lbl{position:absolute;inset:0;display:grid;place-items:center;font-size:14px;font-weight:800;color:var(--accent)}
.ring-wrap .txt .k{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:700}
.ring-wrap .txt .v{font-size:13px;font-weight:700;color:var(--ink);margin-top:2px}
.nav{margin-top:6px}
.nav .mod-h{display:flex;align-items:center;gap:10px;padding:14px 8px 6px;font-size:11px;
  font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.nav .mod-h .num{width:20px;height:20px;border-radius:7px;background:var(--grad);color:#fff;
  display:grid;place-items:center;font-size:11px;flex:none;font-weight:800}
.nav .t{display:flex;align-items:center;gap:11px;width:100%;text-align:left;
  padding:10px 10px;border-radius:12px;color:var(--ink-2);font-size:13px;font-weight:600;transition:.16s;margin-bottom:2px}
.nav .t:hover{background:#fdeeec;color:var(--ink)}
.nav .t.active{background:var(--grad);color:#fff;box-shadow:0 8px 22px -8px rgba(225,29,42,.55),0 0 16px rgba(255,122,61,.35);font-weight:700}
.nav .t.locked{opacity:.42;cursor:not-allowed}
.nav .t.locked:hover{background:none;color:var(--ink-2)}
.nav .t .dot{width:20px;height:20px;border-radius:50%;border:2px solid #e7cfc9;flex:none;
  display:grid;place-items:center;font-size:10px;color:#fff;transition:.16s}
.nav .t.done .dot{background:var(--accent);border-color:var(--accent)}
.nav .t.active .dot{border-color:rgba(255,255,255,.6)}
.nav .t.active.done .dot{background:#fff;color:var(--accent);border-color:#fff}
.nav .t .lk{font-size:11px}
.reset{margin:16px 6px 6px;width:calc(100% - 12px);padding:10px;border-radius:11px;font-size:12px;
  font-weight:600;color:var(--muted);background:#faf4f2;border:1px solid var(--line)}
.reset:hover{color:var(--bad);border-color:#f6c9c4;background:#fff5f4}

/* ---------- MENU MOBILE ---------- */
.menu-btn{display:none;position:fixed;top:16px;left:16px;z-index:60;width:46px;height:46px;
  border-radius:13px;background:#fff;color:var(--accent);font-size:20px;
  align-items:center;justify-content:center;box-shadow:var(--shadow);border:1px solid var(--line)}
.scrim{display:none;position:fixed;inset:0;background:rgba(42,23,20,.45);z-index:35;backdrop-filter:blur(2px)}

/* ---------- MAIN ---------- */
.main{padding:40px 5vw;max-width:960px;margin:0 auto;width:100%}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.crumb{font-size:12px;color:var(--ink-2);font-weight:700}
.crumb b{color:var(--accent)}
.pill{font-size:11.5px;font-weight:800;padding:7px 14px;border-radius:99px;background:#fff;
  border:1px solid var(--line);color:var(--accent);box-shadow:var(--shadow-sm)}
.pill.q{background:var(--grad);color:#fff;border:none;box-shadow:0 0 16px rgba(225,29,42,.4)}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:40px 44px}
.phase-tabs{display:flex;gap:8px;margin-bottom:24px}
.phase-tabs .pt{flex:1;display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:14px;
  background:#fbf3f1;border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--muted)}
.phase-tabs .pt .n{width:24px;height:24px;border-radius:50%;background:#e6d2cd;color:#fff;
  display:grid;place-items:center;font-size:12px;font-weight:800;flex:none}
.phase-tabs .pt.on{background:var(--grad-soft);border-color:#ffd1c2;color:var(--ink)}
.phase-tabs .pt.on .n{background:var(--grad);color:#fff}
.phase-tabs .pt.ok .n{background:var(--ok)}

h2.title{font-size:30px;font-weight:800;letter-spacing:-.6px;line-height:1.12;margin-bottom:8px;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 14px rgba(225,29,42,.28))}
.subtitle{color:var(--ink-2);font-size:14.5px;margin-bottom:26px;font-weight:500}
.narrate-bar{display:flex;align-items:center;gap:14px;margin:0 0 22px;flex-wrap:wrap}
.narrate-bar .narr{padding:11px 20px;font-size:13.5px}
.narrate-bar .narr.on{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 0 16px rgba(225,29,42,.4)}
.narr-hint{font-size:12px;color:var(--muted);font-weight:600}
.lesson p{font-size:16px;line-height:1.8;color:#4a3a35;margin:0 0 17px}
.lesson h3{font-size:18px;font-weight:800;margin:30px 0 12px;color:var(--ink);letter-spacing:-.2px}
.lesson ul{margin:0 0 18px;padding:0;list-style:none}
.lesson ul li{position:relative;padding:7px 0 7px 30px;font-size:15.5px;line-height:1.65;color:#4a3a35}
.lesson ul li::before{content:"";position:absolute;left:2px;top:14px;width:9px;height:9px;border-radius:50%;background:var(--grad)}
.lesson strong{color:var(--ink);font-weight:700}
.lesson table{width:100%;border-collapse:collapse;margin:20px 0;font-size:13.5px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.lesson th,.lesson td{border:1px solid var(--line);padding:10px 12px;text-align:left;vertical-align:top;line-height:1.5}
.lesson th{background:var(--grad-soft);font-weight:800;color:var(--ink);font-size:12px;text-transform:uppercase;letter-spacing:.3px}
.lesson td{color:#4a3a35}
.lesson tr:nth-child(even) td{background:#fdf8f6}
.lesson td strong{color:var(--accent)}
.callout{border-radius:var(--r-sm);padding:18px 20px 18px 22px;margin:24px 0;border:1px solid var(--line);
  background:#fffaf8;position:relative;overflow:hidden}
.callout::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px}
.callout .cot{font-size:11px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.callout p{font-size:14px;line-height:1.65;margin:0;color:#6b5650}
.callout.reg{background:#fdeeeb}.callout.reg::before{background:linear-gradient(180deg,#e11d2a,#ff7a3d)}.callout.reg .cot{color:#c01521}
.callout.key{background:#eefaf2}.callout.key::before{background:linear-gradient(180deg,#1cb56c,#15a05f)}.callout.key .cot{color:#0f7a4c}
.defbox{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:24px 0}
.defbox .d{background:var(--grad-soft);border:1px solid var(--line);border-radius:var(--r-sm);padding:18px}
.defbox .d h4{font-size:13px;color:var(--accent);font-weight:800;margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px}
.defbox .d p{font-size:13px;line-height:1.55;color:#6b5650;margin:0}

.nav-btns{display:flex;justify-content:space-between;align-items:center;margin-top:30px;gap:12px}
.btn{display:inline-flex;align-items:center;gap:9px;padding:14px 26px;border-radius:14px;font-size:14.5px;font-weight:700;transition:.18s}
.btn.primary{background:var(--grad);color:#fff;box-shadow:0 14px 28px -12px rgba(225,29,42,.6),0 0 18px rgba(255,122,61,.32)}
.btn.primary:hover{transform:translateY(-2px);box-shadow:0 18px 36px -12px rgba(225,29,42,.7),0 0 24px rgba(255,122,61,.42)}
.btn.ghost{background:#f8efec;color:var(--ink-2);border:1px solid var(--line)}
.btn.ghost:hover{color:var(--ink);background:#f2e6e2}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none}

/* ---------- QUIZ ---------- */
.quiz-q{margin-bottom:24px}
.quiz-q .qn{font-size:11px;font-weight:800;color:var(--accent);letter-spacing:.6px;text-transform:uppercase}
.quiz-q .qt{font-size:17px;font-weight:800;margin:7px 0 15px;line-height:1.4}
.opt{display:flex;align-items:center;gap:14px;padding:15px 18px;border:1.5px solid var(--line);border-radius:14px;
  margin-bottom:11px;font-size:15px;transition:.15s;background:#fff;width:100%;text-align:left;font-weight:500}
.opt:hover{border-color:var(--accent);background:#fff6f4;transform:translateX(2px)}
.opt .mk{width:24px;height:24px;border-radius:8px;border:2px solid #e2cdc8;flex:none;display:grid;place-items:center;font-size:13px;color:#fff;transition:.15s;font-weight:800}
.opt.sel{border-color:var(--accent);background:#fdeeec}.opt.sel .mk{background:var(--accent);border-color:var(--accent)}
.opt.correct{border-color:var(--ok);background:#ecfdf3}.opt.correct .mk{background:var(--ok);border-color:var(--ok)}
.opt.wrong{border-color:var(--bad);background:#fef2f1}.opt.wrong .mk{background:var(--bad);border-color:var(--bad)}
.opt.disabled{pointer-events:none}
.explain{font-size:13.5px;color:#6b5650;background:var(--grad-soft);border-radius:12px;padding:13px 16px;margin-top:2px;line-height:1.6;border:1px solid var(--line)}
.result{text-align:center;padding:14px 0 24px}
.result .ring-big{width:120px;height:120px;margin:0 auto 14px;position:relative}
.result .ring-big .lbl{position:absolute;inset:0;display:grid;place-items:center;font-size:30px;font-weight:800}
.result .msg{font-size:15.5px;color:var(--ink-2);max-width:440px;margin:0 auto;line-height:1.55;font-weight:600}
.result .msg.pass b{color:var(--ok)}.result .msg.fail b{color:var(--bad)}

/* ---------- HOME ---------- */
.hero{background:linear-gradient(135deg,#1c0f0d 0%,#2e1410 52%,#3d160c 100%);color:#fff;border-radius:28px;padding:46px 44px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-80px;top:-80px;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(255,122,61,.26),transparent 70%)}
.hero::before{content:"";position:absolute;right:90px;bottom:-100px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(225,29,42,.24),transparent 70%)}
.hero .hlogo{width:64px;height:auto;margin-bottom:18px;position:relative;z-index:1;filter:drop-shadow(0 6px 18px rgba(255,122,61,.5))}
.hero .tag{font-size:11.5px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:#ffc8a6;
  background:rgba(255,122,61,.18);display:inline-block;padding:6px 13px;border-radius:99px;position:relative;z-index:1;border:1px solid rgba(255,122,61,.32)}
.hero h2{font-size:38px;font-weight:800;letter-spacing:-1px;margin:16px 0 12px;line-height:1.08;max-width:600px;position:relative;z-index:1;text-shadow:0 0 24px rgba(255,90,40,.55)}
.hero p{font-size:15.5px;line-height:1.65;opacity:.9;max-width:560px;position:relative;z-index:1}
.hero .meta{display:flex;gap:30px;margin-top:28px;flex-wrap:wrap;position:relative;z-index:1}
.hero .meta .m .v{font-size:24px;font-weight:800;color:#ff9b6b;text-shadow:0 0 16px rgba(255,122,61,.5)}
.hero .meta .m .k{font-size:11px;opacity:.78;text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-top:2px}
.sec-h{font-size:14px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:30px 4px 14px}
.grid-mods{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
.modcard{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:24px;box-shadow:var(--shadow);transition:.2s;cursor:pointer;position:relative;overflow:hidden}
.modcard:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:#ffd1c2}
.modcard .ic{width:50px;height:50px;border-radius:14px;background:var(--grad-soft);display:grid;place-items:center;font-size:23px;margin-bottom:15px}
.modcard h3{font-size:16.5px;font-weight:800;margin-bottom:7px;letter-spacing:-.2px}
.modcard p{font-size:13.5px;color:var(--ink-2);line-height:1.55;font-weight:500}
.modcard .ft{display:flex;justify-content:space-between;align-items:center;margin-top:16px;font-size:12px;color:var(--muted);font-weight:700}
.modcard .ft .st.ok{color:var(--ok)}
.modcard .mbar{height:6px;border-radius:99px;background:#f3e6e2;margin-top:12px;overflow:hidden}
.modcard .mbar>i{display:block;height:100%;background:var(--grad);width:0;transition:width .5s ease}

/* ---------- CERT ---------- */
.cert{text-align:center;padding:14px;border:2px solid transparent;background:
  linear-gradient(#fff,#fff) padding-box,var(--grad) border-box;border-radius:24px}
.cert .clogo{width:90px;height:auto;margin:6px auto 4px;filter:drop-shadow(0 6px 16px rgba(180,40,25,.22))}
.cert h2{font-size:27px;font-weight:800}
.cert .name{font-size:32px;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;margin:16px 0;filter:drop-shadow(0 0 14px rgba(225,29,42,.28))}
.cert input{font-size:16px;padding:11px 16px;border:1.5px solid var(--line);border-radius:12px;text-align:center;width:300px;max-width:90%;margin-bottom:6px;font-family:inherit}
.cert input:focus{outline:none;border-color:var(--accent)}
.cert .meta-cert{display:flex;justify-content:center;gap:26px;flex-wrap:wrap;margin:14px 0 4px;font-size:12px;color:var(--muted);font-weight:700}
.cert .meta-cert b{color:var(--accent);display:block;font-size:14px;margin-top:2px}
.locked-note{display:flex;gap:11px;align-items:center;justify-content:center;color:var(--ink-2);font-size:14.5px;
  background:var(--grad-soft);border-radius:14px;padding:22px;border:1px dashed #ffd1c2;font-weight:600}

/* ---------- BACK TO TOP ---------- */
.totop{position:fixed;bottom:26px;right:26px;width:48px;height:48px;border-radius:50%;background:var(--grad);
  color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-lg),0 0 20px rgba(255,122,61,.45);
  z-index:50;opacity:0;pointer-events:none;transform:translateY(12px);transition:.25s}
.totop.show{opacity:1;pointer-events:auto;transform:translateY(0)}

@media print{.sidebar,.nav-btns,.topbar,.menu-btn,.totop,.narrate-bar{display:none!important}.app{display:block}.main{max-width:100%}}
@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .menu-btn{display:flex}
  .main{padding:78px 22px 40px}
  .defbox,.grid-mods{grid-template-columns:1fr}
  .phase-tabs{flex-direction:column}
  .sidebar{position:fixed;top:0;left:0;width:280px;height:100vh;transform:translateX(-104%);transition:transform .28s ease}
  .app.menu-open .sidebar{transform:translateX(0)}
  .app.menu-open .scrim{display:block}
  .card{padding:28px 22px}
  .hero{padding:34px 26px}.hero h2{font-size:29px}
  .lesson table{font-size:12.5px}.lesson th,.lesson td{padding:7px 8px}
}

/* ===== MCR Confort universel ===== */
#main{zoom:var(--fs,1)}
.cfg-btn{position:fixed;right:18px;bottom:80px;z-index:80;width:54px;height:54px;border-radius:50%;background:var(--accent,#333);color:#fff;font-size:24px;box-shadow:0 10px 26px -6px rgba(0,0,0,.45);border:2px solid #fff;display:flex;align-items:center;justify-content:center;cursor:pointer;animation:cfgpop 2.4s ease-in-out infinite}
@keyframes cfgpop{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.cfg-panel{position:fixed;right:18px;bottom:142px;z-index:81;width:272px;background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:16px;box-shadow:0 24px 60px -18px rgba(0,0,0,.5);padding:14px 16px;display:none;font-family:inherit;color:#222}
.cfg-panel.open{display:block}
.cfg-h{font-weight:800;font-size:14px;margin-bottom:10px}
.cfg-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;font-size:13px;font-weight:600}
.cfg-row+.cfg-row{border-top:1px solid rgba(0,0,0,.08)}
.cfg-fs{display:flex;align-items:center;gap:8px}
.cfg-fs button,.cfg-mini{width:30px;height:30px;border-radius:9px;border:1px solid rgba(0,0,0,.15);background:#fff;font-weight:800;color:var(--accent,#333);cursor:pointer}
.cfg-fs b{min-width:42px;text-align:center;font-size:12px}
.cfg-tog{padding:6px 12px;border-radius:99px;border:1px solid rgba(0,0,0,.15);background:#eee;font-weight:700;font-size:12px;cursor:pointer}
.cfg-tog.on{background:var(--accent,#333);color:#fff;border-color:var(--accent,#333)}
/* mode sombre universel */
html[data-theme="dark"] body{background:#14181d!important;color:#e8edf2!important}
html[data-theme="dark"] .sidebar{background:#161b21!important;border-color:#262c34!important}
html[data-theme="dark"] .card,html[data-theme="dark"] .cfg-panel,html[data-theme="dark"] .pill,html[data-theme="dark"] .opt,html[data-theme="dark"] .menu-btn,html[data-theme="dark"] .totop,html[data-theme="dark"] .narrate-bar,html[data-theme="dark"] .narr-sel{background:#1b2127!important;border-color:#2b323b!important;color:#e8edf2!important}
html[data-theme="dark"] .cfg-panel{color:#e8edf2!important}
html[data-theme="dark"] .cfg-tog{background:#222932!important;color:#cdd6df!important}
html[data-theme="dark"] h1,html[data-theme="dark"] h2,html[data-theme="dark"] h3,html[data-theme="dark"] .title,html[data-theme="dark"] .crumb,html[data-theme="dark"] .nav .t{color:#e8edf2!important}
html[data-theme="dark"] .subtitle,html[data-theme="dark"] p,html[data-theme="dark"] li{color:#b9c3cd!important}
/* voix off */
html[data-tts="off"] .narrate-bar{display:none!important}

/* dark mode : cartes d'accueil des modules */
html[data-theme="dark"] .modcard{background:#1b2127!important;border-color:#2b323b!important}
html[data-theme="dark"] .modcard h3{color:#e8edf2!important}
html[data-theme="dark"] .modcard p,html[data-theme="dark"] .modcard .ft,html[data-theme="dark"] .modcard .mnum{color:#b9c3cd!important}
html[data-theme="dark"] .modcard .mbar{background:#2b323b!important}
html[data-theme="dark"] .defbox,html[data-theme="dark"] .defbox .d{background:#1b2127!important;border-color:#2b323b!important}
html[data-theme="dark"] .callout{background:#222932!important;border-color:#2b323b!important;color:#d7dee6!important}

html[data-theme="dark"] .callout li{color:#dbe3ec!important}

html[data-theme="dark"] .defbox .d{background:#1b2229!important;border-color:#2b323b!important}

html[data-theme="dark"] .defbox .d p{color:#cfd9e3!important}

  { id:"m1", icon:"🔺", title:"Le triangle du feu",
    desc:"Les 3 éléments indispensables au départ d'un feu.", duration:"15 min",
    themes:[
      { id:"m1t1", title:"Le triangle du feu", duration:"15 min",
        body:`
        <p>Le feu est le résultat visible d'une <strong>combustion</strong> : une réaction chimique d'oxydation, rapide et exothermique (qui dégage de la chaleur), entre un combustible et un comburant, déclenchée par une énergie d'activation.</p>
        <h3>Les trois éléments indispensables</h3>
        <div class="defbox">
          <div class="d"><h4>Combustible</h4><p>Ce qui brûle : bois, papier, carton, plastiques, essence, solvants, gaz… Plus il est divisé (poussières, vapeurs), plus il s'enflamme vite.</p></div>
          <div class="d"><h4>Comburant</h4><p>Ce qui entretient la combustion : le plus souvent le dioxygène de l'air (≈ 21 %). Sous ~15 % d'O₂, la plupart des feux s'étouffent.</p></div>
          <div class="d"><h4>Énergie d'activation</h4><p>Le déclencheur : flamme, étincelle, point chaud (soudure, meulage), surface chaude, friction, électricité statique, cigarette…</p></div>
        </div>
        <p>Réunissez ces trois éléments et le feu prend : c'est le <strong>triangle du feu</strong>. Une fois la combustion lancée, une 4ᵉ composante — la <strong>réaction en chaîne</strong> — l'auto-entretient : on parle alors de <strong>tétraèdre du feu</strong>.</p>
        <h3>Conséquence directe : comment on éteint</h3>
        <p>Supprimer un seul côté du triangle suffit à éteindre le feu :</p>
        <table>
          <tr><th>Action</th><th>Côté supprimé</th><th>Exemple</th></tr>
          <tr><td><strong>Refroidir</strong></td><td>Énergie / chaleur</td><td>Eau sur un feu de bois</td></tr>
          <tr><td><strong>Étouffer</strong></td><td>Comburant (oxygène)</td><td>Couverture anti-feu, CO₂, mousse</td></tr>
          <tr><td><strong>Isoler</strong></td><td>Combustible</td><td>Couper l'arrivée de gaz</td></tr>
          <tr><td><strong>Inhiber</strong></td><td>Réaction en chaîne</td><td>Poudre extinctrice</td></tr>
        </table>`,
        vo:`Le feu est le résultat visible d'une réaction chimique : la combustion. C'est une oxydation rapide et exothermique entre un combustible et un comburant, déclenchée par une énergie d'activation. Premier élément, le combustible : la matière qui brûle. En entreprise, les combustibles sont partout — bois, carton, papier, plastiques, essence, solvants, gaz. Retenez que plus un combustible est divisé, en poussières ou en vapeurs, plus il s'enflamme facilement. Deuxième élément, le comburant : l'élément qui entretient la combustion. Dans la majorité des cas, c'est l'oxygène de l'air, présent à environ vingt-et-un pour cent ; en dessous d'environ quinze pour cent, la plupart des feux s'étouffent. Troisième élément, l'énergie d'activation : l'apport de chaleur qui déclenche la réaction — une flamme, une étincelle, un point chaud de soudure ou de meulage, une surface chaude, une friction, l'électricité statique ou une cigarette. Réunissez ces trois éléments et le feu prend : c'est le triangle du feu. Une fois la combustion lancée, une quatrième composante, la réaction en chaîne, l'entretient toute seule ; on parle alors de tétraèdre du feu. La bonne nouvelle, c'est qu'il suffit de supprimer un seul côté du triangle pour éteindre : refroidir avec de l'eau retire la chaleur, étouffer prive d'oxygène, isoler supprime le combustible, et la poudre brise la réaction en chaîne.`,
        callouts:[
          {type:"reg",title:"Définition",text:"Combustion = oxydation rapide et exothermique. Elle dégage chaleur et lumière, mais aussi des fumées et des gaz souvent toxiques."},
          {type:"key",title:"À retenir",text:"Trois éléments réunis = un feu. Enlever un seul côté du triangle = extinction."}],
        quiz:[

          {q:"Pour éteindre un feu, il suffit de…",opts:["réunir les trois côtés du triangle","supprimer un seul des trois côtés du triangle","augmenter l'apport d'oxygène","ajouter du combustible"],a:1,ex:"Puisqu'il faut trois éléments réunis, en supprimer un seul stoppe le feu : refroidir (chaleur), étouffer (comburant), isoler (combustible) ou inhiber la réaction en chaîne."}]

        body:`

          <tr><td><strong>C</strong></td><td>Gaz</td><td>Propane, butane, gaz naturel, acétylène, hydrogène</td><td>Poudre — couper d'abord le gaz</td><td>Éteindre sans couper la source</td></tr>
          <tr><td><strong>D</strong></td><td>Métaux</td><td>Magnésium, aluminium en poudre, sodium, lithium, titane</td><td>Poudres spéciales D, sable sec</td><td>Eau, CO₂</td></tr>
          <tr><td><strong>F</strong></td><td>Huiles &amp; graisses de cuisson</td><td>Friteuses, sauteuses, cuisines de restaurant d'entreprise</td><td>Extincteur classe F, couverture anti-feu</td><td>Eau</td></tr>
        </table>
        <p>Il n'existe pas de « <strong>classe E</strong> » : les feux d'origine électrique ne sont pas une classe (l'électricité est une <em>cause</em>). On coupe le courant, puis on traite selon le combustible (le CO₂ et la poudre conviennent sur matériel sous tension).</p>`,
        vo:`Tous les feux ne s'éteignent pas de la même façon. La norme NF EN 2 les classe selon la nature de ce qui brûle, et c'est essentiel : utiliser le mauvais agent peut être inefficace, voire dangereux. La classe A, ce sont les solides qui forment des braises : bois, papier, carton, tissus — on les éteint idéalement à l'eau. La classe B, les liquides inflammables : essence, solvants, peintures — jamais de jet d'eau, qui étend le feu ; on utilise la mousse, le dioxyde de carbone ou la poudre. La classe C, les gaz : propane, butane, gaz naturel — le réflexe n'est pas d'éteindre la flamme mais de couper l'arrivée de gaz, sous peine d'accumulation puis d'explosion. La classe D, les métaux comme le magnésium, le sodium ou le lithium : surtout pas d'eau, qui provoque une réaction violente ; on emploie des poudres spéciales. Enfin la classe F, les huiles et graisses de cuisson, typiquement les friteuses : jamais d'eau, qui projetterait l'huile enflammée en boule de feu ; on utilise un extincteur de classe F ou une couverture anti-feu. Notez qu'il n'existe pas de classe E : un feu électrique n'est pas une classe, l'électricité est une cause. On coupe le courant, puis on traite selon ce qui brûle.`,
        callouts:[
          {type:"reg",title:"Norme NF EN 2",text:"5 classes : A solides · B liquides · C gaz · D métaux · F huiles et graisses de cuisson."},
          {type:"key",title:"À retenir",text:"Jamais d'eau sur un feu d'huile (F) ni de métaux (D). Sur un feu de gaz (C), couper d'abord l'arrivée de gaz."}],
        quiz:[
          {q:"Dans la cuisine du restaurant d'entreprise, l'huile d'une friteuse s'enflamme. Quelle classe, et quel geste est interdit ?",opts:["Classe B — pas de mousse","Classe A — pas d'eau","Classe F — surtout pas d'eau","Classe C — couper le gaz d'abord"],a:2,ex:"Une huile de cuisson est un feu de classe F. Interdiction d'utiliser de l'eau : elle se vaporise et projette l'huile enflammée en boule de feu. On utilise un extincteur de classe F ou une couverture anti-feu."},
          {q:"Sur un feu de gaz (classe C), le tout premier geste est de…",opts:["jeter de l'eau sur la flamme","couper l'arrivée de gaz","éteindre la flamme immédiatement","ouvrir toutes les fenêtres"],a:1,ex:"On coupe d'abord la source. Éteindre la flamme alors que le gaz fuit le laisse s'accumuler, puis exploser. Tant que le gaz brûle de façon contrôlée, il ne s'accumule pas."}]
      }
    ]},
  { id:"m3", icon:"💨", title:"Propagation & causes",
    desc:"Les 4 modes de propagation et les causes en entreprise.", duration:"12 min",
    themes:[
      { id:"m3t1", title:"Propagation du feu & causes en entreprise", duration:"12 min",
        body:`
        <p>Un départ de feu maîtrisé reste un incident ; non maîtrisé, il devient un incendie en se propageant par <strong>quatre mécanismes</strong>.</p>
        <table>
          <tr><th>Mode</th><th>Mécanisme</th><th>Exemple en entreprise</th></tr>
          <tr><td><strong>Conduction</strong></td><td>La chaleur traverse un matériau solide</td><td>Une poutre métallique chauffée enflamme la pièce voisine</td></tr>
          <tr><td><strong>Convection</strong></td><td>Les fumées chaudes montent</td><td>Les fumées s'engouffrent dans une cage d'escalier et embrasent l'étage</td></tr>
          <tr><td><strong>Rayonnement</strong></td><td>La chaleur se transmet à distance, sans contact</td><td>Un bâtiment voisin s'enflamme sous l'effet du rayonnement</td></tr>
          <tr><td><strong>Projection</strong></td><td>Transport de particules incandescentes</td><td>Étincelles de soudure/meulage, débris projetés par une explosion</td></tr>
        </table>
        <h3>Les principales causes d'incendie en entreprise</h3>
        <ul>
          <li><strong>Causes électriques (1ʳᵉ cause) :</strong> installations vétustes, surcharges, courts-circuits, multiprises.</li>
          <li><strong>Travaux par point chaud :</strong> soudage, meulage, découpage → <strong>permis de feu</strong> obligatoire.</li>
          <li><strong>Cigarettes :</strong> mégots mal éteints.</li>
          <li><strong>Mauvais stockage</strong> de produits inflammables, encombrement.</li>
          <li><strong>Défaut d'entretien</strong> des appareils de chauffage, machines, ventilation.</li>
          <li><strong>Électricité statique &amp; frictions</strong> mécaniques.</li>
          <li><strong>Malveillance</strong> (incendie volontaire).</li>
        </ul>
        <p>La majorité de ces causes sont d'origine <strong>humaine ou technique</strong> — donc <strong>évitables</strong> par l'ordre, la propreté, l'entretien et le respect des consignes.</p>`,
        vo:`Un départ de feu non maîtrisé devient un incendie en se propageant par quatre mécanismes. La conduction : la chaleur voyage à travers les matériaux solides, surtout les métaux. La convection, la plus fréquente dans les bâtiments : les fumées et gaz chauds montent et s'engouffrent dans les cages d'escalier et les gaines, embrasant les étages supérieurs. Le rayonnement : comme le soleil, un foyer chauffe à distance, sans contact, et enflamme les matériaux voisins ; c'est lui qui provoque les embrasements généralisés. La projection : des particules incandescentes — étincelles de soudure, escarbilles, débris — créent de nouveaux foyers plus loin. Côté causes, en entreprise, la première est d'origine électrique : installations vétustes, surcharges, courts-circuits. Viennent ensuite les travaux par point chaud, qui imposent un permis de feu, le tabagisme, le mauvais stockage de produits inflammables, le défaut d'entretien, l'électricité statique et la malveillance. L'essentiel à retenir : la plupart de ces causes sont humaines ou techniques, donc évitables par l'ordre, la propreté, l'entretien et le respect des consignes.`,
        callouts:[
          {type:"key",title:"À retenir",text:"Conduction (solides) · convection (fumées qui montent) · rayonnement (à distance) · projection (étincelles). La convection est le vecteur le plus fréquent dans les bâtiments."},
          {type:"reg",title:"Bon réflexe",text:"Les travaux par point chaud (soudage, meulage) exigent un permis de feu et une surveillance après travaux."}],
        quiz:[
          {q:"Les fumées chaudes montent dans la cage d'escalier et embrasent l'étage supérieur. Quel mode de propagation ?",opts:["La conduction","La convection","Le rayonnement","La projection"],a:1,ex:"C'est la convection : les fumées et gaz chauds, plus légers, s'élèvent et se propagent dans les volumes verticaux. D'où l'importance du compartimentage et du désenfumage."},
          {q:"En entreprise, la première cause d'incendie est…",opts:["la foudre","les causes électriques","les risques psychosociaux","le bruit"],a:1,ex:"Les causes électriques (installations vétustes, surcharges, courts-circuits) sont la première cause. La plupart des causes d'incendie sont évitables."}]
      }
    ]}

};

const STORE_KEY="incendie_theorie_progress_v1";
let state=loadState();
function shuffleQuiz(src){return src.map(function(q){var idx=q.opts.map(function(_,i){return i;});for(var i=idx.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=idx[i];idx[i]=idx[j];idx[j]=t;}return {q:q.q,ex:q.ex,opts:idx.map(function(i){return q.opts[i];}),a:idx.indexOf(q.a)};});}
function loadState(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||{done:{},quiz:{},name:""};}catch(e){return{done:{},quiz:{},name:""};}}
function saveState(){localStorage.setItem(STORE_KEY,JSON.stringify(state));}

/* ---- Voix off (synthèse vocale du navigateur, voix FR, gratuite & hors-ligne) ---- */
const TTS={supported:('speechSynthesis'in window),voice:null,chunks:[],i:0,state:'idle',onstate:null,
  pick(){const vs=window.speechSynthesis.getVoices();this.voice=vs.find(v=>/fr[-_]?FR/i.test(v.lang))||vs.find(v=>/^fr/i.test(v.lang))||this.voice;},
  _next(){if(this.i>=this.chunks.length){this.state='idle';this.onstate&&this.onstate('idle');return;}
    const u=new SpeechSynthesisUtterance(this.chunks[this.i]);u.lang='fr-FR';if(this.voice)u.voice=this.voice;u.rate=1;u.pitch=1;
    u.onend=()=>{if(this.state==='playing'){this.i++;this._next();}};
    u.onerror=()=>{if(this.state==='playing'){this.i++;this._next();}};
    window.speechSynthesis.speak(u);},
  play(text,onstate){this.stop();this.onstate=onstate;this.chunks=(text.replace(/\s+/g,' ').match(/[^.!?…]+[.!?…]*/g)||[text]).map(s=>s.trim()).filter(Boolean);this.i=0;this.state='playing';this.onstate&&this.onstate('playing');this._next();},
  pause(){if(this.state==='playing'){this.state='paused';window.speechSynthesis.pause();this.onstate&&this.onstate('paused');}},
  resume(){if(this.state==='paused'){this.state='playing';window.speechSynthesis.resume();this.onstate&&this.onstate('playing');}},
  stop(){this.state='idle';this.chunks=[];this.i=0;if(this.supported)window.speechSynthesis.cancel();}
};
if(TTS.supported){TTS.pick();window.speechSynthesis.onvoiceschanged=()=>TTS.pick();}
function lessonNarration(t){if(t.vo)return t.vo;const d=document.createElement('div');d.innerHTML=t.body;let x=t.title+'. '+d.textContent.replace(/\s+/g,' ').trim();(t.callouts||[]).forEach(c=>{x+=' '+c.title+'. '+c.text;});return x;}
function ttsUpdateBtn(state){const b=document.getElementById('ttsBtn');if(!b)return;b.classList.toggle('on',state!=='idle');b.innerHTML=state==='playing'?'⏸ Pause':(state==='paused'?'▶ Reprendre la voix off':'🔊 Écouter le cours');}

const FLAT=[]; // séquence des thèmes
COURSE.modules.forEach(m=>m.themes.forEach(t=>FLAT.push({mod:m.id,theme:t.id})));
const ALL_THEMES=FLAT.length;
let current="home"; // "home" | "cert" | themeId

function findTheme(id){for(const m of COURSE.modules){const t=m.themes.find(x=>x.id===id);if(t)return{m,t};}return null;}
function themeDone(id){return !!state.done[id];}
function themeUnlocked(id){
  const i=FLAT.findIndex(f=>f.theme===id);
  if(i<=0)return true;
  return themeDone(FLAT[i-1].theme);
}
function moduleComplete(m){return m.themes.every(t=>themeDone(t.id));}
function allComplete(){return COURSE.modules.every(moduleComplete);}
function nextTheme(id){const i=FLAT.findIndex(f=>f.theme===id);return i<FLAT.length-1?FLAT[i+1].theme:null;}
function prevTheme(id){const i=FLAT.findIndex(f=>f.theme===id);return i>0?FLAT[i-1].theme:null;}
function globalProgress(){let d=0;FLAT.forEach(f=>{if(themeDone(f.theme))d++;});return Math.round(d/ALL_THEMES*100);}

const main=document.getElementById("main");
const nav=document.getElementById("nav");
const appEl=document.getElementById("app");
document.getElementById("brandLogo").src=LOGO;

function closeMenu(){appEl.classList.remove("menu-open");}
document.getElementById("menuBtn").onclick=()=>appEl.classList.toggle("menu-open");
document.getElementById("scrim").onclick=closeMenu;

const toTop=document.getElementById("toTop");
window.addEventListener("scroll",()=>{toTop.classList.toggle("show",window.scrollY>320);});
toTop.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});

function renderNav(){
  nav.innerHTML="";
  COURSE.modules.forEach((m,i)=>{
    const h=document.createElement("div");h.className="mod-h";
    h.innerHTML=`<span class="num">${i+1}</span><span>${m.title}</span>`;
    nav.appendChild(h);
    m.themes.forEach(t=>{
      const unlocked=themeUnlocked(t.id),done=themeDone(t.id);
      const b=document.createElement("button");
      b.className="t"+(current===t.id?" active":"")+(done?" done":"")+(unlocked?"":" locked");
      b.innerHTML=`<span class="dot">${done?"✓":""}</span><span>${t.title}</span>`+(unlocked?"":`<span class="lk" style="margin-left:auto">🔒</span>`);
      if(unlocked)b.onclick=()=>go(t.id);
      nav.appendChild(b);
    });
  });
  const pct=globalProgress();
  const off=157-(157*pct/100);
  document.getElementById("ringFg").style.strokeDashoffset=off;
  document.getElementById("ringPct").textContent=pct+"%";
  document.getElementById("ringTxt").textContent=pct===0?"À démarrer":(pct===100?"Terminé 🎉":"En cours");
}
function go(id){TTS.stop();current=id;closeMenu();window.scrollTo(0,0);render();}

function render(){
  renderNav();
  if(current==="home")return renderHome();
  if(current==="cert")return renderCert();
  const tt=findTheme(current);
  if(tt)return renderTheme(tt.m,tt.t);
  renderHome();
}

function renderHome(){
  const pct=globalProgress();
  let cards="";
  COURSE.modules.forEach((m,i)=>{
    const done=m.themes.filter(t=>themeDone(t.id)).length;
    const complete=done===m.themes.length;
    const unlocked=i===0||moduleComplete(COURSE.modules[i-1]);
    const p=Math.round(done/m.themes.length*100);
    cards+=`<div class="modcard" data-first="${m.themes[0].id}" data-unlocked="${unlocked}">
      <div class="ic">${m.icon}</div>
      <h3>Étape ${i+1} · ${m.title}</h3>
      <p>${m.desc}</p>
      <div class="mbar"><i style="width:${p}%"></i></div>
      <div class="ft"><span>⏱ ${m.duration}</span>
        <span class="st ${complete?'ok':''}">${complete?"✓ Validé":(unlocked?(done>0?"En cours":"Commencer →"):"🔒 Verrouillé")}</span></div>
    </div>`;
  });
  main.innerHTML=`
    <div class="hero">
      <img class="hlogo" src="${LOGO}" alt="MCR Formations">
      <span class="tag">Sécurité incendie · Conforme NF EN 2</span>
      <h2>La théorie du feu et la naissance d'un incendie</h2>
      <p>Comprendre le feu pour mieux le prévenir : le triangle du feu, les classes de feux réglementaires, et les modes de propagation. Un cours par étape, puis un quiz à valider (60 %).</p>
      <div class="meta">
        <div class="m"><div class="v">45 min</div><div class="k">Durée</div></div>
        <div class="m"><div class="v">3</div><div class="k">Étapes</div></div>
        <div class="m"><div class="v">🔊</div><div class="k">Voix off</div></div>
        <div class="m"><div class="v">60%</div><div class="k">Seuil</div></div>
        <div class="m"><div class="v">${pct}%</div><div class="k">Progression</div></div>
      </div>
    </div>
    <div class="sec-h">Programme</div>
    <div class="grid-mods">${cards}</div>
    <div class="nav-btns"><span></span>
      <button class="btn primary" id="startBtn">${pct>0?"Reprendre ▶":"Démarrer la formation ▶"}</button></div>`;
  main.querySelectorAll(".modcard").forEach(c=>{if(c.dataset.unlocked==="true")c.onclick=()=>go(c.dataset.first);});
  document.getElementById("startBtn").onclick=()=>{
    for(const f of FLAT){if(!themeDone(f.theme)&&themeUnlocked(f.theme))return go(f.theme);}
    if(allComplete())return go("cert");
    go(FLAT[0].theme);
  };
}

function renderTheme(m,t){
  const mi=COURSE.modules.indexOf(m)+1;
  let phase="lesson";
  let quiz=shuffleQuiz(t.quiz);
  let answers=new Array(quiz.length).fill(null);
  let submitted=false;

  function header(phaseName){
    return `<div class="topbar">
      <button class="btn ghost" style="padding:6px 12px;font-size:13px" onclick="location.href='MCR_Academy.html'">← Menu principal</button>
      <div class="crumb"><b>Étape ${mi}</b> · ${m.title}</div>
      <div class="pill ${phaseName==='quiz'?'q':''}">${phaseName==='quiz'?'★ Quiz · seuil 60%':'⏱ '+t.duration}</div>
    </div>`;
  }
  function tabs(active){
    const okLesson=active!=='lesson';
    const okQuiz=themeDone(t.id);
    return `<div class="phase-tabs">
      <div class="pt ${active==='lesson'?'on':''} ${okLesson?'ok':''}"><span class="n">${okLesson?'✓':'1'}</span> Cours</div>
      <div class="pt ${active==='quiz'?'on':''} ${okQuiz?'ok':''}"><span class="n">${okQuiz?'✓':'2'}</span> Quiz</div>
    </div>`;
  }

  function drawLesson(){
    TTS.stop();
    let callouts="";(t.callouts||[]).forEach(c=>{callouts+=`<div class="callout ${c.type}"><div class="cot">${c.type==='reg'?'§':'★'} ${c.title}</div><p>${c.text}</p></div>`;});
    const pv=prevTheme(t.id);
    const ttsBar=TTS.supported?`<div class="narrate-bar"><button class="btn ghost narr" id="ttsBtn">🔊 Écouter le cours</button><span class="narr-hint">🎧 Voix off — lecture audio du cours</span></div>`:``;
    main.innerHTML=header('lesson')+`
      <div class="card lesson">
        ${tabs('lesson')}
        <h2 class="title">${t.title}</h2>
        <div class="subtitle">${m.title}</div>
        ${ttsBar}
        ${t.body}${callouts}
        <div class="nav-btns">
          ${pv?`<button class="btn ghost" id="prevBtn">← Étape précédente</button>`:`<button class="btn ghost" id="homeBtn">← Accueil</button>`}
          <button class="btn primary" id="toQuiz">Passer au quiz →</button>
        </div>
      </div>`;
    const tb=document.getElementById("ttsBtn");
    if(tb)tb.onclick=()=>{if(TTS.state==='idle')TTS.play(lessonNarration(t),ttsUpdateBtn);else if(TTS.state==='playing')TTS.pause();else TTS.resume();};
    const pb=document.getElementById("prevBtn");if(pb)pb.onclick=()=>go(pv);
    const hb=document.getElementById("homeBtn");if(hb)hb.onclick=()=>go("home");
    document.getElementById("toQuiz").onclick=()=>{phase="quiz";quiz=shuffleQuiz(t.quiz);answers=new Array(quiz.length).fill(null);submitted=false;window.scrollTo(0,0);drawQuiz();};
  }

  function drawQuiz(){
    TTS.stop();
    let qs="";
    quiz.forEach((q,qi)=>{
      let opts="";
      q.opts.forEach((o,oi)=>{
        let cls="opt";
        if(submitted){if(oi===q.a)cls+=" correct";else if(answers[qi]===oi)cls+=" wrong";cls+=" disabled";}
        else if(answers[qi]===oi)cls+=" sel";
        opts+=`<button class="${cls}" data-q="${qi}" data-o="${oi}"><span class="mk">${(submitted&&oi===q.a)?"✓":((submitted&&answers[qi]===oi)?"✕":"")}</span><span>${o}</span></button>`;
      });
      qs+=`<div class="quiz-q"><div class="qn">Question ${qi+1} / ${t.quiz.length}</div><div class="qt">${q.q}</div>${opts}${submitted?`<div class="explain">💡 ${q.ex}</div>`:""}</div>`;
    });
    let result="",footer="";
    if(submitted){
      const score=quiz.reduce((s,q,i)=>s+(answers[i]===q.a?1:0),0);
      const ratio=score/t.quiz.length, passed=ratio>=PASS, pc=Math.round(ratio*100);
      state.quiz[t.id]={score,total:t.quiz.length,passed};
      if(passed)state.done[t.id]=true;
      saveState();
      const off=314-(314*pc/100);
      const nx=nextTheme(t.id);
      result=`<div class="result">
        <div class="ring-big"><svg width="120" height="120"><circle cx="60" cy="60" r="50" stroke="#f0e3df" stroke-width="9" fill="none"/>
        <circle cx="60" cy="60" r="50" stroke="${passed?'#15a05f':'#e23b2e'}" stroke-width="9" fill="none" stroke-linecap="round" stroke-dasharray="314" stroke-dashoffset="${off}" transform="rotate(-90 60 60)"/></svg>
        <div class="lbl" style="color:${passed?'#15a05f':'#e23b2e'}">${pc}%</div></div>
        <div class="msg ${passed?'pass':'fail'}">${score}/${t.quiz.length} bonnes réponses — ${passed?"<b>Réussi !</b> 🎉 Étape validée.":"<b>Seuil de 60% non atteint.</b> Relisez le cours et retentez."}</div>
      </div>`;
      footer=`<div class="nav-btns">
        ${passed?`<button class="btn ghost" id="reviewBtn">↺ Revoir le cours</button>`:`<button class="btn ghost" id="reviewBtn">← Revoir le cours</button>`}
        ${passed?`<button class="btn primary" id="nextBtn">${nx?"Étape suivante →":(allComplete()?"Voir mon attestation 🏆":"Terminer →")}</button>`
                :`<button class="btn primary" id="retryBtn">Recommencer le quiz</button>`}
      </div>`;
    } else {
      const all=answers.every(a=>a!==null);
      footer=`<div class="nav-btns"><button class="btn ghost" id="backLesson">← Revoir le cours</button>
        <button class="btn primary" id="submitBtn" ${all?"":"disabled"}>Valider mes réponses</button></div>`;
    }
    main.innerHTML=header('quiz')+`
      <div class="card">
        ${tabs('quiz')}
        <h2 class="title">Quiz · ${t.title}</h2>
        <div class="subtitle">${submitted?"Résultat & corrigé":"Une réponse par question. Il faut 60% pour valider cette étape."}</div>
        ${result}${qs}${footer}
      </div>`;
    if(!submitted){
      main.querySelectorAll(".opt").forEach(b=>{b.onclick=()=>{answers[+b.dataset.q]=+b.dataset.o;drawQuiz();};});
      const sb=document.getElementById("submitBtn");if(sb)sb.onclick=()=>{submitted=true;window.scrollTo(0,0);drawQuiz();};
      document.getElementById("backLesson").onclick=()=>{phase="lesson";drawLesson();};
    } else {
      const rb=document.getElementById("retryBtn");if(rb)rb.onclick=()=>{quiz=shuffleQuiz(t.quiz);answers=new Array(quiz.length).fill(null);submitted=false;window.scrollTo(0,0);drawQuiz();};
      const rv=document.getElementById("reviewBtn");if(rv)rv.onclick=()=>{phase="lesson";drawLesson();};
      const nb=document.getElementById("nextBtn");if(nb)nb.onclick=()=>{const nx=nextTheme(t.id);renderNav();nx?go(nx):go(allComplete()?"cert":"home");};
    }
  }

  drawLesson();
}

function renderCert(){
  if(!allComplete()){
    main.innerHTML=`<div class="topbar"><div class="crumb">Attestation</div></div>
      <div class="card"><h2 class="title">Attestation de réussite</h2>
      <div class="subtitle">Disponible une fois toutes les étapes validées.</div>
      <div class="locked-note">🔒 Validez le cours + quiz (60%) des 3 étapes pour débloquer votre attestation.</div>

<script>
/* ===== MCR Confort universel (autonome) ===== */
(function(){
  if(window.__mcrComfort)return; window.__mcrComfort=1;
  var K='mcr_comfort';
  function load(){try{return JSON.parse(localStorage.getItem(K))||{};}catch(e){return{};}}
  function save(){localStorage.setItem(K,JSON.stringify(c));}
  var c=load();
  if(typeof c.fs!=='number')c.fs=1;
  if(typeof c.dark!=='boolean')c.dark=false;
  if(typeof c.tts!=='boolean')c.tts=true;
  function apply(){
    document.documentElement.style.setProperty('--fs',c.fs);
    document.documentElement.setAttribute('data-theme',c.dark?'dark':'');
    document.documentElement.setAttribute('data-tts',c.tts?'on':'off');
  }
  function sync(){
    var fs=document.getElementById('cfgFs'); if(fs)fs.textContent=Math.round(c.fs*100)+'%';
    var d=document.querySelector('#cfgPanel [data-a=dark]'); if(d){d.classList.toggle('on',c.dark);d.textContent=c.dark?'Activ\u00e9':'D\u00e9sactiv\u00e9';}
    var t=document.querySelector('#cfgPanel [data-a=tts]'); if(t){t.classList.toggle('on',c.tts);t.textContent=c.tts?'Activ\u00e9e':'D\u00e9sactiv\u00e9e';}
  }
  function build(){
    if(document.getElementById('cfgBtn')){apply();return;}
    var btn=document.createElement('button'); btn.id='cfgBtn'; btn.className='cfg-btn'; btn.setAttribute('aria-label','R\u00e9glages de confort'); btn.title='Confort de lecture'; btn.textContent='\u2699';
    var p=document.createElement('div'); p.id='cfgPanel'; p.className='cfg-panel';
    p.innerHTML='<div class="cfg-h">\u2699 Confort de lecture</div>'
      +'<div class="cfg-row"><span>Taille du texte</span><span class="cfg-fs"><button data-a="minus" aria-label="R\u00e9duire">A\u2212</button><b id="cfgFs">100%</b><button data-a="plus" aria-label="Agrandir">A+</button></span></div>'
      +'<div class="cfg-row"><span>R\u00e9initialiser</span><button class="cfg-mini" data-a="reset">\u21ba</button></div>'
      +'<div class="cfg-row"><span>Mode sombre</span><button class="cfg-tog" data-a="dark">D\u00e9sactiv\u00e9</button></div>'
      +'<div class="cfg-row"><span>Voix off</span><button class="cfg-tog" data-a="tts">Activ\u00e9e</button></div>';
    document.body.appendChild(btn); document.body.appendChild(p);
    btn.addEventListener('click',function(e){e.stopPropagation();p.classList.toggle('open');});
    document.addEventListener('click',function(e){if(p.classList.contains('open')&&!p.contains(e.target)&&e.target!==btn)p.classList.remove('open');});
    p.addEventListener('click',function(e){
      var a=e.target.getAttribute&&e.target.getAttribute('data-a'); if(!a)return;
      if(a==='minus')c.fs=Math.max(0.85,Math.round((c.fs-0.1)*100)/100);
      else if(a==='plus')c.fs=Math.min(1.35,Math.round((c.fs+0.1)*100)/100);
      else if(a==='reset')c.fs=1;
      else if(a==='dark')c.dark=!c.dark;
      else if(a==='tts'){c.tts=!c.tts; if(!c.tts&&window.speechSynthesis)speechSynthesis.cancel();}
      save();apply();sync();
    });
    sync();
  }
  function init(){apply();build();}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init); else init();
  document.addEventListener('keydown',function(e){
    var tn=(e.target&&e.target.tagName)||''; if(/^(INPUT|SELECT|TEXTAREA)$/.test(tn))return;
    if(e.key==='ArrowRight'){var n=document.getElementById('nextBtn');if(n&&!n.disabled)n.click();}
    else if(e.key==='ArrowLeft'){var pv=document.getElementById('prevBtn');if(pv&&!pv.disabled)pv.click();}
  });
})();
</script>
